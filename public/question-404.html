<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 404 - VXLAN benefits (choose two)</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
  </style>
</head>
<body class="ccnp-practice-ui">
  <main class="card">
    <h1>What are two benefits of using VXLAN? (Choose two)</h1>

    <label class="choice">
      <input type="checkbox" name="q404" value="A" />
      <strong>A.</strong> It allows for an unlimited number of segments.
    </label>
    <label class="choice">
      <input type="checkbox" name="q404" value="B" />
      <strong>B.</strong> It allows multi-tenanted segmentation.
    </label>
    <label class="choice">
      <input type="checkbox" name="q404" value="C" />
      <strong>C.</strong> It has fewer devices to manage.
    </label>
    <label class="choice">
      <input type="checkbox" name="q404" value="D" />
      <strong>D.</strong> It uses a MAC in IP/TCP encapsulation technique.
    </label>
    <label class="choice">
      <input type="checkbox" name="q404" value="E" />
      <strong>E.</strong> It uses all available Layer 3 paths in the underlying network.
    </label>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-405.html">Next</a>
    </div>
  </main>

  <script>
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q404"]');
    const correct = new Set(["B", "E"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = new Set(
        [...options].filter((o) => o.checked).map((o) => o.value)
      );

      answerBox.style.display = "block";

      if (selected.size !== 2) {
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select exactly two answers, then check again.";
        nextWrap.style.display = "none";
        return;
      }

      const isCorrect = [...correct].every((v) => selected.has(v));

      if (isCorrect) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. B and E. VXLAN supports tenant-style segmentation with VNIs and can leverage ECMP across the Layer 3 underlay so traffic uses all available paths.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct answers are B and E. (VXLAN encapsulates over UDP, not TCP; segment scale is large but not literally unlimited.)";
      }
      nextWrap.style.display = "inline-block";
    });

    resetBtn.addEventListener("click", () => {
      options.forEach((o) => {
        o.checked = false;
      });
      answerBox.style.display = "none";
      answerBox.textContent = "";
      nextWrap.style.display = "none";
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/BCT-CCNP-Encore-Training.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
