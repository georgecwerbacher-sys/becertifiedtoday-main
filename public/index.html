<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming soon</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(520px, 88vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0;
      color: #9fb0cc;
      line-height: 1.55;
      font-size: 1.02rem;
    }
    .card p a {
      color: inherit;
      text-decoration: none;
      cursor: inherit;
    }
    .card p a:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Coming soon">
    <h1>Coming soon</h1>
    <p>We are preparing something <a href="/practice-launcher.html">new</a>. Check back later.</p>
  </main>
</body>
</html>
