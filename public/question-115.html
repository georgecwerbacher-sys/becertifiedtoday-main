<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 115 - Catalyst Center discovery</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(920px, 94vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .actions {
      margin-top: 14px;
    }
    .check-btn {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .answer {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Which three methods does Cisco Catalyst Center (formerly DNA Center) use to discover devices? (Choose three)</h1>

    <label class="choice"><input type="checkbox" name="q115" value="A" />A. CDP</label>
    <label class="choice"><input type="checkbox" name="q115" value="B" />B. LLDP</label>
    <label class="choice"><input type="checkbox" name="q115" value="C" />C. SNMP</label>
    <label class="choice"><input type="checkbox" name="q115" value="D" />D. ping</label>
    <label class="choice"><input type="checkbox" name="q115" value="E" />E. NETCONF</label>
    <label class="choice"><input type="checkbox" name="q115" value="F" />F. a specified range of IP addresses</label>

    <div class="actions">
      <button id="checkBtn" class="check-btn" type="button">Check Answer</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-116.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const checkBtn = document.getElementById("checkBtn");
    const options = document.querySelectorAll('input[name="q115"]');
    const correctSet = new Set(["A", "B", "F"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = [...options].filter((o) => o.checked).map((o) => o.value);
      if (selected.length === 0) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select at least one option.";
        return;
      }

      answerBox.style.display = "block";
      nextWrap.style.display = "block";

      const selectedSet = new Set(selected);
      const isCorrect =
        selectedSet.size === correctSet.size &&
        [...correctSet].every((value) => selectedSet.has(value));

      if (isCorrect) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. A, B, and F. Catalyst Center can discover from CDP/LLDP topology and from a configured IP range (scan). SNMP is used heavily for inventory after reachability; NETCONF is southbound management, not a discovery mode in this exam framing; ping is not listed as a separate discovery method.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct answers: A, B, and F — CDP, LLDP, and a specified range of IP addresses.";
      }
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/BCT-CCNP-Encore-Training.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
