<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 233 - BGP local preference AS 65010 exit R2-R4</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 4px;
    }
    .choice .cmd {
      display: inline-block;
      margin-top: 6px;
      margin-left: 22px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      white-space: pre-wrap;
      color: #c9d1d9;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question233-bgp-as65010-exit-exhibit.png"
        alt="AS 65010 R1 R2 R3; AS 65020 R4 R5; eBGP R2-R4 and R1-R5"
      />
    </div>
    <h1>Which configuration must be applied to ensure that the preferred path for traffic from AS 65010 toward AS 65020 uses the R2 to R4 path?</h1>

    <label class="choice"
      ><input type="radio" name="q233" value="A" />A. <span class="cmd">R4(config)# router bgp 65020
R4(config-router)# bgp default local-preference 300

R5(config)# router bgp 65020
R5(config-router)# bgp default local-preference 200</span></label
    >
    <label class="choice"
      ><input type="radio" name="q233" value="B" />B. <span class="cmd">R2(config)# router bgp 65010
R2(config-router)# bgp default local-preference 300

R1(config)# router bgp 65010
R1(config-router)# bgp default local-preference 200</span></label
    >
    <label class="choice"
      ><input type="radio" name="q233" value="C" />C. <span class="cmd">R2(config)# router bgp 65010
R2(config-router)# bgp default local-preference 200

R1(config)# router bgp 65010
R1(config-router)# bgp default local-preference 300</span></label
    >
    <label class="choice"
      ><input type="radio" name="q233" value="D" />D. <span class="cmd">R4(config)# router bgp 65020
R4(config-router)# bgp default local-preference 200

R5(config)# router bgp 65020
R5(config-router)# bgp default local-preference 300</span></label
    >

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-234.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q233"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "B") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. B. Local preference is propagated inside an AS and steers outbound traffic among multiple learned paths. On AS 65010, give R2 a higher default local preference (300) and R1 a lower one (200) so iBGP updates prefer the R2–R4 eBGP exit over R1–R5. Changing default local preference on R4/R5 (A or D) only affects routing inside AS 65020, not how AS 65010 picks its exit. Option C reverses the priorities.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: B. Tune default local preference on R1 and R2 inside AS 65010.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/BCT-CCNP-ENCOR-Training.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
