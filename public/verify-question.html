<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Confirm your question | Be Certified Today</title>
  <link rel="icon" href="/images/logo/becertifiedtoday_logo_trans.png" type="image/png" />
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --page-bg: #ffffff;
      --page-text: #0b1020;
      --page-muted: #475569;
      --border: #2d3b5a;
      --accent: #2f66bf;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--page-bg);
      color: var(--page-text);
      line-height: 1.55;
      padding: clamp(24px, 5vw, 48px) clamp(18px, 4vw, 32px);
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.25rem, 3.5vw, 1.5rem);
      font-weight: 800;
    }
    p { margin: 0 0 14px; color: var(--page-muted); }
    .status {
      margin: 0 0 16px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(18, 26, 43, 0.06);
      font-size: 0.95rem;
    }
    .status--ok {
      border-color: rgba(74, 224, 146, 0.45);
      color: #166534;
      background: rgba(74, 224, 146, 0.08);
    }
    .status--err {
      border-color: rgba(248, 113, 113, 0.45);
      color: #991b1b;
      background: rgba(248, 113, 113, 0.08);
    }
    a.link-muted {
      display: inline-block;
      margin-top: 18px;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Confirm your question</h1>
    <p>We are verifying your email address before your message is sent to our team.</p>
    <div id="status" class="status" role="status" aria-live="polite">Verifying…</div>
    <p id="nextWrap" hidden>
      <a class="link-muted" href="/ccna-home.html">&larr; Back to home</a>
    </p>
  </div>
  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var nextWrap = document.getElementById("nextWrap");
      var params = new URLSearchParams(location.search);
      var token = params.get("token") || "";

      function showErr(msg) {
        statusEl.textContent = msg;
        statusEl.className = "status status--err";
        if (nextWrap) nextWrap.hidden = false;
      }

      function showOk(email) {
        statusEl.textContent =
          "Thanks — your email is verified and your question was submitted. We will follow up at " +
          (email || "the address you provided") +
          ".";
        statusEl.className = "status status--ok";
        if (nextWrap) nextWrap.hidden = false;
      }

      if (!token) {
        showErr("This verification link is missing a token. Open Ask a question from the site footer and try again.");
        return;
      }

      fetch("/api/sample-lead", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "confirm_question", token: token }),
      })
        .then(function (r) {
          return r.json().then(function (j) {
            return { ok: r.ok, body: j };
          });
        })
        .then(function (res) {
          if (!res.ok || !res.body || res.body.ok === false) {
            showErr(
              (res.body && (res.body.error || res.body.reason)) ||
                "This link is invalid or has expired. Submit your question again from the site footer."
            );
            return;
          }
          showOk(res.body.email);
        })
        .catch(function () {
          showErr("Could not reach the server. Check your connection and try again.");
        });
    })();
  </script>
</body>
</html>
