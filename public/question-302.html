<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 302 - SSH login privilege level 15 local user</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 920px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin:0 0 8px;font-size:0.95rem;color:#9fb0cc;">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question302-vty-login-local-username.png"
        alt="show running-config section line vty with login local; username cisco secret type 5"
      />
    </div>
    <h1>Which action automatically enables privilege exec mode when logging in via SSH?</h1>

    <label class="choice"><input type="radio" name="q302" value="A" />A. Configure a password under the line configuration.</label>
    <label class="choice"><input type="radio" name="q302" value="B" />B. Configure the enable secret to be the same as the secret for user &ldquo;Cisco&rdquo;.</label>
    <label class="choice"><input type="radio" name="q302" value="C" />C. Configure privilege level 15 under the line configuration.</label>
    <label class="choice"><input type="radio" name="q302" value="D" />D. Configure user &ldquo;cisco&rdquo; with privilege level 15.</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-303.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q302"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "D") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. D. Assigning privilege 15 to the local username places that user directly in privileged EXEC after authentication (including SSH on VTY). A line password only secures the login, not the privilege level. Matching enable secret to the user password still requires the enable step. Option C (privilege level 15 on line vty) can also auto-raise privilege for sessions on those lines, but the exhibit highlights the local user account without a privilege level—the targeted fix is on the username.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: D. Use username … privilege 15 … for automatic privileged EXEC on login for that account.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
