<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 97 - OSPF vs EIGRP</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(920px, 94vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .actions {
      margin-top: 14px;
    }
    .check-btn {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .answer {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>In which two ways does the routing protocol OSPF differ from EIGRP? (Choose two)</h1>

    <label class="choice"><input type="checkbox" name="q97" value="A" />A. OSPF supports only equal-cost load balancing. EIGRP supports unequal-cost load balancing</label>
    <label class="choice"><input type="checkbox" name="q97" value="B" />B. OSPF supports an unlimited number of hops. EIGRP supports a maximum of 255 hops</label>
    <label class="choice"><input type="checkbox" name="q97" value="C" />C. OSPF is distance vector protocol. EIGRP is a link-state protocol</label>
    <label class="choice"><input type="checkbox" name="q97" value="D" />D. OSPF provides shorter convergence time than EIGRP</label>
    <label class="choice"><input type="checkbox" name="q97" value="E" />E. OSPF supports unequal-cost load balancing. EIGRP supports only equal-cost load balancing</label>

    <div class="actions">
      <button id="checkBtn" class="check-btn" type="button">Check Answer</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-98.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const checkBtn = document.getElementById("checkBtn");
    const options = document.querySelectorAll('input[name="q97"]');
    const correctSet = new Set(["A", "B"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = [...options].filter((o) => o.checked).map((o) => o.value);
      if (selected.length === 0) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select at least one option.";
        return;
      }

      answerBox.style.display = "block";
      nextWrap.style.display = "block";

      const selectedSet = new Set(selected);
      const isCorrect =
        selectedSet.size === correctSet.size &&
        [...correctSet].every((value) => selectedSet.has(value));

      if (isCorrect) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. A and B. OSPF load-balances across equal-cost paths only; EIGRP can use variance for unequal-cost paths. OSPF has no hop-count limit like RIP; EIGRP uses hop count (default 100, maximum 255) as part of feasibility. C reverses the protocol types; D and E are not generally true.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct answers: A and B. OSPF is link-state and uses cost, not hop count; EIGRP caps hop count (up to 255). EIGRP alone supports unequal-cost load balancing via variance.";
      }
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
