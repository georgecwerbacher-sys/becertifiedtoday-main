<body>
  <main class="card">
    <div class="exhibit-region">
      <p class="exhibit-ref">Refer to the exhibit.</p>
      <div class="exhibit-light" role="region" aria-label="Python Paramiko SSH client show ip bgp">
        <div class="exhibit-light-label">Python</div>
        <pre class="exhibit-cli">client.connect(ip, port=22, username=usr, password=pswd)
stdin, stdout, stderr = client.exec_command('show ip bgp 192.168.10.100 bestpath\n')
print(stdout)</pre>
      </div>
    </div>
    <h1>Which action does the Python script accomplish?</h1>

    <label class="choice"><input type="radio" name="q110" value="A" />A. displays the output of the show command in a formatted way</label>
    <label class="choice"><input type="radio" name="q110" value="B" />B. connects to a Cisco device using SSH and exports the routing table information</label>
    <label class="choice"><input type="radio" name="q110" value="C" />C. connects to a Cisco device using Telnet and exports the routing table information</label>
    <label class="choice"><input type="radio" name="q110" value="D" />D. displays the output of the show command in an unformatted way</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-111.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q110"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "D") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. D. Port 22 is SSH (not Telnet). The command is show ip bgp … bestpath for one prefix, not the full routing table. The script does not apply extra structure (no JSON pretty-print, etc.); exam framing treats the CLI stream as unformatted versus a formatted presentation.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: D. SSH (port 22); output is not specially formatted in the script.";
        }
      });
    });
  </script>
