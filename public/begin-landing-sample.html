<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Starting sample…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script>
    (function () {
      function shuffleInPlace(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      var track = (new URLSearchParams(location.search).get("track") || "questions").toLowerCase();

      if (track === "labs") {
        location.replace("/cli-lab-rapid-pvst-lacp.html");
        return;
      }

      var ids;
      if (track === "drag") {
        ids = [58];
      } else {
        ids = [1, 3, 4, 5, 6];
      }

      if (ids.length > 1) shuffleInPlace(ids);

      try {
        sessionStorage.removeItem("ccnpLinearScope");
        sessionStorage.removeItem("ccnpReviewMode");
        sessionStorage.removeItem("ccnpReviewQueue");
        sessionStorage.removeItem("ccnpQuestionQueueIndex");
        sessionStorage.removeItem("ccnpUrlMaskPath");
        sessionStorage.removeItem("ccnpMaskedPageQid");
        sessionStorage.setItem("ccnpQuestionQueue", JSON.stringify(ids));
        sessionStorage.setItem("ccnpQuestionQueueIndex", "0");
        sessionStorage.setItem("ccnpQueueExitHref", "/");
        sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
      } catch (e) {}

      location.replace("/question-" + ids[0] + ".html");
    })();
  </script>
</body>
</html>
