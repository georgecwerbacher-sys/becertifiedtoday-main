<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — renew library access</title>
  <style>
    :root {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --bg: #0b1020;
      --surface: #121a2b;
      --border: #2d3b5a;
      --text: #e6edf3;
      --muted: #9fb0cc;
      --accent: #2f66bf;
      --accent-border: #4f84d8;
      --danger: #f08888;
      --ok: #8fd99a;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: min(440px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      font-weight: 800;
    }
    .sub {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1020;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 14px;
    }
    input:focus-visible {
      outline: 2px solid var(--accent-border);
      outline-offset: 2px;
    }
    button {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--accent-border);
      background: var(--accent);
      color: #f0f4fc;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover {
      filter: brightness(1.08);
    }
    .msg {
      margin: 14px 0 0;
      font-size: 0.92rem;
    }
    .msg.err {
      color: var(--danger);
    }
    .msg.ok {
      color: var(--ok);
    }
    .footer {
      margin-top: 18px;
      text-align: center;
    }
    .footer a {
      color: var(--muted);
      font-size: 0.88rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Renew library access</h1>
    <p class="sub">
      Admin-only. Issues a new access period (90 days by default). You can submit again after the
      cooldown (90 days by default) from your last renewal.
    </p>
    <form id="form" novalidate>
      <label for="email">Admin email</label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="username"
        required
        maxlength="320"
        placeholder="you@example.com"
      />
      <label for="adminKey">Admin key</label>
      <input
        id="adminKey"
        name="adminKey"
        type="password"
        autocomplete="current-password"
        required
        maxlength="500"
        placeholder="ENCOR_ADMIN_RENEW_SECRET"
      />
      <button type="submit">Issue access</button>
      <p id="msg" class="msg" hidden></p>
    </form>
    <p class="footer"><a href="/CCNP_Encor.html">Open portal</a></p>
  </div>
  <script>
    (function () {
      var form = document.getElementById("form");
      var msg = document.getElementById("msg");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        msg.hidden = true;
        msg.className = "msg";
        var email = (document.getElementById("email").value || "").trim();
        var adminKey = document.getElementById("adminKey").value || "";
        fetch("/api/admin-renew-access", {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ email: email, adminKey: adminKey }),
        })
          .then(function (r) {
            return r.text().then(function (t) {
              var d = {};
              try {
                d = t ? JSON.parse(t) : {};
              } catch (ex) {}
              return { ok: r.ok, status: r.status, d: d };
            });
          })
          .then(function (x) {
            msg.hidden = false;
            if (x.ok) {
              msg.className = "msg ok";
              msg.textContent =
                "Access updated. Redirecting to the portal…";
              setTimeout(function () {
                window.location.href = "/CCNP_Encor.html";
              }, 1200);
              return;
            }
            msg.className = "msg err";
            var t =
              (x.d && x.d.error) || "Request failed.";
            if (x.d && x.d.hint) t += " " + x.d.hint;
            msg.textContent = t;
          })
          .catch(function () {
            msg.hidden = false;
            msg.className = "msg err";
            msg.textContent = "Network error.";
          });
      });
    })();
  </script>
</body>
</html>
