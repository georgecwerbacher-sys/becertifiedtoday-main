<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="index, follow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 428 - Cisco Catalyst SD-WAN characteristics</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .instructions {
      margin: 0 0 12px;
      color: #b8c3d6;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(2px);
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    #nextWrap {
      display: none;
    }
  </style>
</head>
<body class="ccnp-practice-ui">
  <main class="card">
    <h1>What are two characteristics of Cisco Catalyst SD-WAN? (Choose two)</h1>
    <p class="instructions">Select exactly two answers, then click Check Answer.</p>

    <label class="choice">
      <input type="checkbox" name="q428" value="A" />
      <strong>A.</strong> control plane operates over DTLS/TLS authenticated and secured tunnels
    </label>

    <label class="choice">
      <input type="checkbox" name="q428" value="B" />
      <strong>B.</strong> time-consuming configuration and maintenance
    </label>

    <label class="choice">
      <input type="checkbox" name="q428" value="C" />
      <strong>C.</strong> distributed control plane
    </label>

    <label class="choice">
      <input type="checkbox" name="q428" value="D" />
      <strong>D.</strong> unified data plane and control plane
    </label>

    <label class="choice">
      <input type="checkbox" name="q428" value="E" />
      <strong>E.</strong> centralized reachability, security, and application policies
    </label>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
      <button id="resetBtn" type="button">Reset</button>
      <span id="nextWrap"><a class="next-link" href="/question-429.html">Next</a></span>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>

  <script>
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const boxes = document.querySelectorAll('input[name="q428"]');
    const correct = new Set(["A", "E"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const picked = new Set([...boxes].filter((b) => b.checked).map((b) => b.value));
      if (picked.size !== 2) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          picked.size === 0
            ? "Select exactly two answers before checking."
            : "Select exactly two answers (you currently have a different number selected).";
        nextWrap.style.display = "none";
        return;
      }

      const ok = [...correct].every((v) => picked.has(v));
      answerBox.style.display = "block";
      nextWrap.style.display = "inline-block";

      if (ok) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. A and E. Catalyst SD-WAN carries the overlay control plane (for example OMP) over mutually authenticated, encrypted channels—DTLS to the SD-WAN controllers and TLS where used—so signaling stays protected. Reachability, segmentation, security, and application-aware policy are pushed from the centralized SD-WAN Manager / vSmart policy domain rather than being fully distributed per device. The architecture separates data plane (WAN Edge) from centralized policy control; it aims to reduce manual churn, so B is wrong. C and D misstate the control/data-plane model.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct pair is A and E: secured control-plane tunnels plus centralized reachability and policy.";
      }
    });

    resetBtn.addEventListener("click", () => {
      boxes.forEach((b) => {
        b.checked = false;
      });
      answerBox.style.display = "none";
      answerBox.textContent = "";
      nextWrap.style.display = "none";
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/CCNP-ENCOR-Study/ENCOR_Training_Portal.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
