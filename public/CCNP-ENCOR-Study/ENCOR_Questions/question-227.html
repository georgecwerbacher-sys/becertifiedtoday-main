<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="index, follow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 227 - SD-Access control plane characteristic</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>What is one characteristic of the Cisco SD-Access control plane?</h1>

    <label class="choice"><input type="radio" name="q227" value="A" />A. It stores remote routes in a centralized database server</label>
    <label class="choice"><input type="radio" name="q227" value="B" />B. Each router processes every possible destination and route</label>
    <label class="choice"><input type="radio" name="q227" value="C" />C. It allows host mobility only in the wireless network</label>
    <label class="choice"><input type="radio" name="q227" value="D" />D. It is based on VXLAN technology</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-228.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q227"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "A") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. A. SD-Access uses a LISP-based control plane: map servers maintain a centralized repository of EID-to-RLOC mappings (where endpoints live in the fabric), so edge nodes resolve reachability instead of each holding full traditional route tables for every host. B describes classic hop-by-hop full knowledge. C is false—mobility applies to wired and wireless in the fabric. D conflates the VXLAN overlay data plane with the LISP mapping control plane.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: A. The control plane centers on a mapping database (LISP map server) for reachability.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/CCNP-ENCOR-Study/ENCOR_Training_Portal.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
