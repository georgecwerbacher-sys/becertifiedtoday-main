<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 180 - Static NAT inside/outside interfaces</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 0 auto;
    }
    .exhibit-option {
      margin-bottom: 14px;
      background: #000;
      color: #fff;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      padding: 10px 12px 12px;
      min-width: 0;
    }
    .exhibit-option-label {
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .exhibit-cli {
      margin: 0;
      padding: 8px 10px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.68rem, 1.2vw, 0.8rem);
      line-height: 1.45;
      white-space: pre;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .choice .cfg {
      display: block;
      margin: 8px 0 0 26px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      color: #d1dae8;
      white-space: pre-wrap;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img src="/assets/question180-nat-static-interfaces-v2.png" alt="R1 Gi0/1 to host 192.168.10.17, Gi0/0 to outside; static NAT to 192.168.27.42" />
    </div>
    <div class="exhibit-option">
      <div class="exhibit-option-label">R1</div>
      <pre class="exhibit-cli" role="region" aria-label="R1 static NAT command in global configuration mode">R1(config)# ip nat inside source static 192.168.10.17 192.168.27.42</pre>
    </div>
    <h1>A BeCertifiedToday.com engineer applies this configuration to R1:<span class="cfg" style="margin-top:10px;display:block;margin-left:0"
>ip nat inside source static 192.168.10.17 192.168.27.42</span>Which command set should be added to complete the configuration?</h1>

    <label class="choice"
      ><input type="radio" name="q180" value="A" />A. Option A<span class="cfg"
>R1(config)# interface GigabitEthernet 0/0
R1(config-if)# ip nat outside

R1(config)# interface GigabitEthernet 0/1
R1(config-if)# ip nat inside</span></label
    >

    <label class="choice"
      ><input type="radio" name="q180" value="B" />B. Option B<span class="cfg"
>R1(config)# interface GigabitEthernet 0/0
R1(config)# ip pat outside

R1(config)# interface GigabitEthernet 0/1
R1(config)# ip pat inside</span></label
    >

    <label class="choice"
      ><input type="radio" name="q180" value="C" />C. Option C<span class="cfg"
>R1(config)# interface GigabitEthernet 0/0
R1(config)# ip pat inside

R1(config)# interface GigabitEthernet 0/1
R1(config)# ip pat outside</span></label
    >

    <label class="choice"
      ><input type="radio" name="q180" value="D" />D. Option D<span class="cfg"
>R1(config)# interface GigabitEthernet 0/0
R1(config-if)# ip nat inside

R1(config)# interface GigabitEthernet 0/1
R1(config-if)# ip nat outside</span></label
    >

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-181.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q180"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "A") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. A. Mark Gi0/1 (LAN with 192.168.10.17) as `ip nat inside` and Gi0/0 toward the other network as `ip nat outside`. Option D reverses inside/outside. B and C use invalid `ip pat` interface commands.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: A. Inside on the private segment, outside on the exit interface.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="https://becertifiedtoday-encor.vercel.app/CCNP_Encor.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
