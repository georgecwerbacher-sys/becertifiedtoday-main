<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="index, follow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 282 - VTY SSH only RSA keys transport input</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 920px;
      height: auto;
      margin: 0 auto;
    }
    .cli-exhibit {
      margin-bottom: 14px;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: #000;
      padding: 10px 12px 12px;
    }
    .cli-exhibit-label {
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .cli-exhibit-pre {
      margin: 0;
      padding: 8px 10px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.68rem, 1.2vw, 0.8rem);
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .choice {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-top: 4px;
      flex-shrink: 0;
    }
    .choice-body {
      min-width: 0;
      flex: 1;
    }
    .ios-snippet {
      margin: 8px 0 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.4;
      color: #c9d6ec;
      white-space: pre;
      overflow-x: auto;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin:0 0 8px;font-size:0.95rem;color:#9fb0cc;">Refer to the exhibit.</p>
    <div class="cli-exhibit" role="region" aria-label="Router configuration exhibit">
      <div class="cli-exhibit-label">Router</div>
      <pre class="cli-exhibit-pre">hostname router
ip domain-name cisco.com

line vty 0 15
 session-timeout 30
 exec-timeout 120 0
 login local</pre>
    </div>
    <h1>Which configuration must be added to enable remote access only using SSHv1 or SSHv2 to this router?</h1>

    <label class="choice">
      <input type="radio" name="q282" value="A" />
      <span class="choice-body">
        <strong>A. Option A</strong>
        <span class="ios-snippet">R1(config)# crypto key generate rsa modulus 2048
R1(config)# line vty 0 15
R1(config-line)# transport input ssh</span>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q282" value="B" />
      <span class="choice-body">
        <strong>B. Option B</strong>
        <span class="ios-snippet">R1(config)# ip ssh version 2
R1(config)# line vty 0 15
R1(config-line)# transport input ssh
R1(config-line)# transport output ssh</span>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q282" value="C" />
      <span class="choice-body">
        <strong>C. Option C</strong>
        <span class="ios-snippet">R1(config)# crypto key generate rsa modulus 2048
R1(config)# ip ssh version 2
R1(config)# line vty 0 15
R1(config-line)# transport input all</span>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q282" value="D" />
      <span class="choice-body">
        <strong>D. Option D</strong>
        <span class="ios-snippet">R1(config)# line vty 0 15
R1(config-line)# transport input ssh
R1(config-line)# transport output ssh</span>
      </span>
    </label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-283.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q282"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "A") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. A. SSH needs RSA host keys (crypto key generate rsa) before VTY SSH sessions work. transport input ssh restricts inbound VTY to SSH only (no Telnet). Option B and D omit key generation. Option C uses transport input all, which still allows Telnet and other protocols.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: A. Generate RSA keys, then on the VTY lines use transport input ssh for SSH-only remote access.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/CCNP-ENCOR-Study/ENCOR_Training_Portal.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
