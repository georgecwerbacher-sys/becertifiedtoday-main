  <title>Question 277 - OSPF CR1 selective networks passive Gi0/2</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(1040px, 98vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 920px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
      vertical-align: top;
      margin-top: 6px;
    }
    .choice pre {
      margin: 8px 0 0 28px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0d1424;
      border: 1px solid #2c3f62;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.72rem;
      line-height: 1.35;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;

    }

    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>

<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question277-ospf-topology-v2.png"
        alt="CR1 Gi0/0 10.165.231.0/24 to CR2; Gi0/1 172.24.206.0/24 to CR3; Gi0/2 172.27.206.0/24 to SW1"
      />
    </div>
    <h1>
      CR2 and CR3 are configured with OSPF. Which configuration, when applied to CR1, allows CR1 to exchange OSPF information with CR2 and CR3 but not with other network devices or on new interfaces that are added to CR1?
    </h1>

    <label class="choice"
      ><input type="radio" name="q277" value="A" />A.
      <pre>router ospf 1
network 0.0.0.0 255.255.255.255 area 0
passive-interface GigabitEthernet0/2</pre></label>

    <label class="choice"
      ><input type="radio" name="q277" value="B" />B.
      <pre>router ospf 1
network 10.0.0.0 0.255.255.255 area 0
network 172.16.0.0 0.15.255.255 area 0
passive-interface GigabitEthernet0/2</pre></label>

    <label class="choice"
      ><input type="radio" name="q277" value="C" />C.
      <pre>interface Gi0/2
ip ospf 1 area 0
!
router ospf 1
passive-interface GigabitEthernet0/2</pre></label>

    <label class="choice"
      ><input type="radio" name="q277" value="D" />D.
      <pre>router ospf 1
network 10.165.231.0 0.0.0.255 area 0
network 172.27.206.0 0.0.0.255 area 0
network 172.24.206.0 0.0.0.255 area 0
passive-interface GigabitEthernet0/2</pre></label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-278.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q277"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "D") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. D. Tight network statements (each /24 with 0.0.0.255 wildcard) enable OSPF only on those subnets, so arbitrary new interfaces are not automatically included. Gi0/0 and Gi0/1 peer toward CR2 and CR3; passive-interface GigabitEthernet0/2 still advertises 172.27.206.0/24 but suppresses neighbor formation on the access side. Option A enables OSPF on every interface present or future; B’s broad 10/8-style and 172.16–172.31-style wildcards would also pull in many future addresses; C never enables OSPF on Gi0/0/Gi0/1 for CR2/CR3.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: D. Use explicit network statements for the three /24s on CR1 plus passive-interface on Gi0/2.";
        }
      });
    });
  </script>
