<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 71 - OSPFv2 network statements</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(1020px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
    }
    .choice input {
      margin-top: 4px;
      flex-shrink: 0;
    }
    .choice-body {
      flex: 1;
      min-width: 0;
    }
    .choice-router {
      font-weight: 700;
    }
    .ios-block {
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #2c3f62;
      background: #0f1728;
      color: #d4e5ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.82rem;
      line-height: 1.45;
      overflow-x: auto;
      white-space: pre;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>
      Refer to the exhibit. R2 has interfaces in 172.16.1.0/24 and 172.16.2.0/24. Which configuration enables OSPFv2 process 0 on R2 in area 0 using valid network statements?
    </h1>

    <label class="choice">
      <input type="radio" name="q71" value="A" />
      <span class="choice-body">
        <span class="choice-router">A. R2</span>
        <pre class="ios-block">router ospf 0
network 172.16.1.0 255.255.255.0 area 0
network 172.16.2.0 255.255.255.0 area 0</pre>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q71" value="B" />
      <span class="choice-body">
        <span class="choice-router">B. R2</span>
        <pre class="ios-block">router ospf 0
network 172.16.1.0 0.0.0.255 area 0
network 172.16.2.0 255.255.255.0 area 0</pre>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q71" value="C" />
      <span class="choice-body">
        <span class="choice-router">C. R1</span>
        <pre class="ios-block">router ospf 0
network 192.168.1.0 0.0.0.255 area 0
network 192.168.2.0 0.0.0.255 area 0</pre>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q71" value="D" />
      <span class="choice-body">
        <span class="choice-router">D. R2</span>
        <pre class="ios-block">router ospf 0
network 172.16.1.0 0.0.0.255 area 0
network 172.16.2.0 0.0.0.255 area 0</pre>
      </span>
    </label>
    <label class="choice">
      <input type="radio" name="q71" value="E" />
      <span class="choice-body">
        <span class="choice-router">E. R1</span>
        <pre class="ios-block">router ospf 0
network 192.168.1.0 255.255.255.0 area 0
network 192.168.2.0 255.255.255.0 area 0</pre>
      </span>
    </label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-72.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q71"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "D") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. D. OSPF network statements require a wildcard mask, not a subnet mask. R2 should advertise 172.16.1.0/24 and 172.16.2.0/24 with 0.0.0.255. A and E use subnet masks; B mixes wildcard and mask; C is on R1 with the wrong local subnets for this scenario.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: D. Use wildcard 0.0.0.255 for each /24 on R2 in router OSPF configuration.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="https://becertifiedtoday-encor.vercel.app/CCNP_Encor.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
