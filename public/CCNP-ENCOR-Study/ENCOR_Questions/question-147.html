    <h1>
      A BeCertifiedToday network engineer must block Telnet traffic from hosts in the range of 10.100.2.248 to 10.100.2.255 to the network 10.100.3.0 and permit
      everything else. Which configuration must the BeCertifiedToday engineer apply?
    </h1>

    <label class="choice"
      ><input type="radio" name="q147" value="A" />A.<span class="cfg"
>RouterB(config)# access-list 101 deny tcp 10.100.2.0 0.0.0.248 10.100.3.0 0.0.0.255 eq 22
RouterB(config)# access-list 101 permit any any
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <label class="choice"
      ><input type="radio" name="q147" value="B" />B.<span class="cfg"
>RouterB(config)# access-list 101 deny icmp 10.100.2.0 0.0.0.248 10.100.2.0 0.0.0.248
RouterB(config)# access-list 101 permit any any
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <label class="choice"
      ><input type="radio" name="q147" value="C" />C.<span class="cfg"
>RouterB(config)# access-list 101 deny tcp 10.100.2.0 0.0.0.248 10.100.3.0 0.0.0.255 eq 23
RouterB(config)# access-list 101 permit any any
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <label class="choice"
      ><input type="radio" name="q147" value="D" />D.<span class="cfg"
>RouterB(config)# access-list 101 permit tcp 10.100.2.0 0.0.0.252 10.100.3.0 0.0.0.255
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

  <script>
    (function () {
      var CORRECT = "C";
      var CORRECT_MSG = "Correct. C. Telnet is TCP port 23 (not 22). Use an extended ACL inbound on Router B G0/0/2, deny the traffic toward 10.100.3.0/24, then permit all. For an exact last-octet span 248\u2013255 you would use 10.100.2.248 0.0.0.7; among the choices only C matches Telnet and the deny-then-permit pattern. A uses SSH (22); B is ICMP; D never denies Telnet.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="q147"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="q147"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
