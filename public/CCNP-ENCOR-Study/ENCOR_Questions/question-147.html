<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 147 - Extended ACL block Telnet</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 720px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .choice .cfg {
      display: block;
      margin: 8px 0 0 26px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      color: #d1dae8;
      white-space: pre-wrap;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question147-sdwan-acl-topology-v3.png"
        alt="Three-router triangle: Router B has LAN 10.100.2.0/24 on G0/0/2; Router C has 10.100.3.0/24"
      />
    </div>
    <h1>
      A BeCertifiedToday.com network engineer must block Telnet traffic from hosts in the range of 10.100.2.248 to 10.100.2.255 to the network 10.100.3.0 and permit
      everything else. Which configuration must the BeCertifiedToday.com engineer apply?
    </h1>

    <label class="choice"
      ><input type="radio" name="q147" value="A" />A.<span class="cfg"
>RouterB(config)# access-list 101 deny tcp 10.100.2.0 0.0.0.248 10.100.3.0 0.0.0.255 eq 22
RouterB(config)# access-list 101 permit any any
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <label class="choice"
      ><input type="radio" name="q147" value="B" />B.<span class="cfg"
>RouterB(config)# access-list 101 deny icmp 10.100.2.0 0.0.0.248 10.100.2.0 0.0.0.248
RouterB(config)# access-list 101 permit any any
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <label class="choice"
      ><input type="radio" name="q147" value="C" />C.<span class="cfg"
>RouterB(config)# access-list 101 deny tcp 10.100.2.0 0.0.0.248 10.100.3.0 0.0.0.255 eq 23
RouterB(config)# access-list 101 permit any any
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <label class="choice"
      ><input type="radio" name="q147" value="D" />D.<span class="cfg"
>RouterB(config)# access-list 101 permit tcp 10.100.2.0 0.0.0.252 10.100.3.0 0.0.0.255
RouterB(config)# int g0/0/2
RouterB(config-if)# ip access-group 101 in</span></label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-148.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q147"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "C") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. C. Telnet is TCP port 23 (not 22). Use an extended ACL inbound on Router B G0/0/2, deny the traffic toward 10.100.3.0/24, then permit all. For an exact last-octet span 248–255 you would use 10.100.2.248 0.0.0.7; among the choices only C matches Telnet and the deny-then-permit pattern. A uses SSH (22); B is ICMP; D never denies Telnet.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: C. A filters SSH (port 22). B uses ICMP. D omits a deny and a final permit. Telnet requires `eq 23`.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="https://becertifiedtoday-encor.vercel.app/CCNP_Encor.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
