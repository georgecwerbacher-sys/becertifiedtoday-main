  <title>Question 264 - NETCONF save configuration R2</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(1040px, 98vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 920px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .netconf-script {
      display: block;
      margin: 8px 0 0 26px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #b8c4d3;
      background: #ffffff;
      color: #111111;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .answer-script {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #b8c4d3;
      background: #ffffff;
      color: #111111;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .answer-detail {
      margin-top: 10px;
      font-weight: 600;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;

    }
    .answer.correct {
      background: #113e2d;

      margin-top: 18px;

      display: inline-block;

      font-weight: 700;
    }
  </style>

<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question264-netconf-topology-v3.png"
        alt="Topology: Administrator, RADIUS server, PCs on 10.0.1.0/24, router R2 toward Internet"
      />
    </div>
    <h1>A BeCertifiedToday engineer must save the configuration of router R2 using the NETCONF protocol. Which script must be used?</h1>

    <label class="choice"
      ><input type="radio" name="q264" value="A" />A. Option A
      <span class="netconf-script">&lt;rpc message-id="101"
  xmlns="urn:ietf:params:xml:ns:netconf:base:1.0"
  xmlns:cisco-ia="http://cisco.com/yang/cisco-ia"&gt;
  &lt;cisco-ia:save-config&gt;
    &lt;target&gt;startup&lt;/target&gt;
  &lt;/cisco-ia:save-config&gt;
&lt;/rpc&gt;</span></label
    >
    <label class="choice"
      ><input type="radio" name="q264" value="B" />B. Option B
      <span class="netconf-script">&lt;rpc message-id="102"
  xmlns="urn:ietf:params:xml:ns:netconf:base:1.0"
  xmlns:ncm="urn:ietf:params:xml:ns:yang:ietf-netconf-monitoring"&gt;
  &lt;get&gt;
    &lt;filter type="subtree"&gt;
      &lt;ncm:netconf-state&gt;
        &lt;ncm:capabilities/&gt;
      &lt;/ncm:netconf-state&gt;
    &lt;/filter&gt;
  &lt;/get&gt;
&lt;/rpc&gt;</span></label
    >
    <label class="choice"
      ><input type="radio" name="q264" value="C" />C. Option C
      <span class="netconf-script">&lt;rpc message-id="103"
  xmlns="urn:ietf:params:xml:ns:netconf:base:1.0"
  xmlns:cisco-ia="http://cisco.com/yang/cisco-ia"&gt;
  &lt;cisco-ia:sync-from&gt;
    &lt;source&gt;running&lt;/source&gt;
  &lt;/cisco-ia:sync-from&gt;
&lt;/rpc&gt;</span></label
    >
    <label class="choice"
      ><input type="radio" name="q264" value="D" />D. Option D
      <span class="netconf-script">&lt;rpc message-id="104"
  xmlns="urn:ietf:params:xml:ns:netconf:base:1.0"
  xmlns:cisco-ia="http://cisco.com/yang/cisco-ia"&gt;
  &lt;cisco-ia:reset&gt;
    &lt;mode&gt;reinitialize&lt;/mode&gt;
  &lt;/cisco-ia:reset&gt;
&lt;/rpc&gt;</span></label
    >

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-265.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q264"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "A") {
          answerBox.className = "answer correct";
          answerBox.innerHTML =
            'Correct. A.' +
            '<div class="answer-script">&lt;rpc message-id="101"\n  xmlns="urn:ietf:params:xml:ns:netconf:base:1.0"\n  xmlns:cisco-ia="http://cisco.com/yang/cisco-ia"&gt;\n  &lt;cisco-ia:save-config&gt;\n    &lt;target&gt;startup&lt;/target&gt;\n  &lt;/cisco-ia:save-config&gt;\n&lt;/rpc&gt;</div>' +
            '<div class="answer-detail">`cisco-ia:save-config` persists configuration via NETCONF. B is capability retrieval, C is sync-from, and D is reset/reinitialize.</div>';
        } else {
          answerBox.className = "answer incorrect";
          answerBox.innerHTML =
            'Incorrect. The correct answer is A.' +
            '<div class="answer-script">&lt;rpc message-id="101"\n  xmlns="urn:ietf:params:xml:ns:netconf:base:1.0"\n  xmlns:cisco-ia="http://cisco.com/yang/cisco-ia"&gt;\n  &lt;cisco-ia:save-config&gt;\n    &lt;target&gt;startup&lt;/target&gt;\n  &lt;/cisco-ia:save-config&gt;\n&lt;/rpc&gt;</div>' +
            '<div class="answer-detail">Use `cisco-ia:save-config` to save config on R2 over NETCONF.</div>';
        }
      });
    });
  </script>

    .home-key {
      position: fixed;
      right: 18px;

      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
