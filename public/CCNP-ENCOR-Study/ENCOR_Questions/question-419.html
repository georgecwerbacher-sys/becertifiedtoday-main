<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 419 - Modular network design benefits</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .instructions {
      margin: 0 0 12px;
      color: #b8c3d6;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(2px);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    #nextWrap {
      display: none;
    }
  </style>
</head>
<body class="ccnp-practice-ui">
  <main class="card">
    <h1>Which two benefits result from a network design that uses small and repeatable sections? (Choose two)</h1>
    <p class="instructions">Select exactly two answers, then click Check Answer.</p>

    <label class="choice"><input type="checkbox" name="q419" value="A" />A. lower monitoring requirements</label>
    <label class="choice"><input type="checkbox" name="q419" value="B" />B. low latency</label>
    <label class="choice"><input type="checkbox" name="q419" value="C" />C. scalability</label>
    <label class="choice"><input type="checkbox" name="q419" value="D" />D. quick failure isolation</label>
    <label class="choice"><input type="checkbox" name="q419" value="E" />E. improved throughput</label>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
      <span id="nextWrap"><a class="next-link" href="/question-420.html">Next</a></span>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>

  <script>
    const checkBtn = document.getElementById("checkBtn");
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const boxes = document.querySelectorAll('input[name="q419"]');
    const correct = new Set(["C", "D"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const picked = new Set([...boxes].filter((b) => b.checked).map((b) => b.value));
      const ok = picked.size === 2 && [...correct].every((v) => picked.has(v));

      answerBox.style.display = "block";
      nextWrap.style.display = "inline-block";

      if (ok) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. C and D. Small, repeatable building blocks (modules or pods) scale out by replication and confine faults to a smaller blast radius so you can isolate and remediate failures faster. They do not inherently reduce monitoring, cut latency, or increase throughput—those depend on traffic paths, capacity, and operational design.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct pair: C and D — scalability and quicker failure isolation from modular, repeatable design.";
      }
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="https://becertifiedtoday-encor.vercel.app/CCNP_Encor.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
