<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 199 - REST API brute-force resistant hashing</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Which algorithms are used to secure REST API from brute attacks and minimize the impact?</h1>

    <label class="choice"><input type="radio" name="q199" value="A" />A. SHA-512 and SHA-384</label>
    <label class="choice"><input type="radio" name="q199" value="B" />B. MD5 algorithm-128 and SHA-384</label>
    <label class="choice"><input type="radio" name="q199" value="C" />C. SHA-1, SHA-256, and SHA-512</label>
    <label class="choice"><input type="radio" name="q199" value="D" />D. PBKDF2, BCrypt, and SCrypt</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-200.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q199"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "D") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. D. **PBKDF2**, **bcrypt**, and **scrypt** are **password-hashing / KDF** constructions meant to be **slow** and (for scrypt) **memory-hard**, which raises the cost of offline brute-force and credential stuffing. Plain **SHA** and **MD5** are fast general-purpose digests and are **not** the right tool for password storage against brute force unless used inside a proper slow KDF with many iterations.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: D. Use slow password-hashing algorithms.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="https://becertifiedtoday-encor.vercel.app/CCNP_Encor.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
