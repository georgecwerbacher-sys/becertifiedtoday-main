<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EIGRP Question 3</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(900px, 92vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 18px;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.05rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .answer {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Question 3: What is the default hello interval for EIGRP on Ethernet interfaces?</h1>
    <label class="choice"><input type="radio" name="eigrp" value="A" />A. 5 seconds</label>
    <label class="choice"><input type="radio" name="eigrp" value="B" />B. 10 seconds</label>
    <label class="choice"><input type="radio" name="eigrp" value="C" />C. 30 seconds</label>
    <label class="choice"><input type="radio" name="eigrp" value="D" />D. 60 seconds</label>
    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-4.html">Next</a>
    </div>
  </main>
  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="eigrp"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "A") {
          answerBox.className = "answer correct";
          answerBox.textContent = "Correct. A. 5 seconds";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect. The correct answer: A. 5 seconds";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/CCNP-ENCOR-Study/ENCOR_Training_Portal.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
