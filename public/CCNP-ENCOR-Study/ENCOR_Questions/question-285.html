<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="index, follow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 285 - MAC address table vs TCAM</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>How do the MAC address table and TCAM differ?</h1>

    <label class="choice">
      <input type="radio" name="q285" value="A" />
      A. TCAM is populated from the ARP file, and the MAC address table is populated from the switch configuration file
    </label>
    <label class="choice">
      <input type="radio" name="q285" value="B" />
      B. TCAM stores Layer 2 forwarding information, and the MAC address table stores QoS information
    </label>
    <label class="choice">
      <input type="radio" name="q285" value="C" />
      C. TCAM is a type of memory and the MAC address table is a logical structure
    </label>
    <label class="choice">
      <input type="radio" name="q285" value="D" />
      D. TCAM lookups can match only 1s and 0s, and MAC address lookups can match 1s, 0s and a third &ldquo;care/don&rsquo;t care&rdquo; state
    </label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-286.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q285"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "C") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. C. TCAM (ternary CAM) is specialized chip memory that supports three-valued matching (0, 1, don’t care) for fast parallel lookups used in ACLs, QoS, and other policy features. The MAC address table is the switch’s logical Layer 2 forwarding database (VLAN/MAC to port), populated by learning from frames—not from an ARP or config file as in the distractors. Option D reverses the truth: TCAM adds the “don’t care” dimension; classic MAC/CAM forwarding is binary exact match.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: C. TCAM names a memory technology; the MAC table is the logical forwarding structure. Option B swaps their roles; A misstates how they are filled; D inverts ternary vs binary matching.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;

      z-index: 9999;
      text-decoration: none;

      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>

</body>
</html>
