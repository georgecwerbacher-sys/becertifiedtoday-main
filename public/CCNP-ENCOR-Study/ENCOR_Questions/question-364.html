    <h1>What is a difference between Chef and other automation tools?</h1>

    <label class="choice"><input type="radio" name="q364" value="A" />A. Chef is an agent-based tool that uses cookbooks, and Ansible is an agentless tool that uses playbooks.</label>

    <label class="choice"><input type="radio" name="q364" value="B" />B. Chef is an agentless tool that uses a primary/minion architecture, and SaltStack is an agent- based tool that uses a primary/secondary architecture</label>

    <label class="choice"><input type="radio" name="q364" value="C" />C. Chef is an agentless tool that uses playbooks, and Ansible is an agent-based tool that uses cookbooks.</label>

    <label class="choice"><input type="radio" name="q364" value="D" />D. Chef uses Domain Specific Language, and Puppet uses Ruby.</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>

            <span class="question-topic-meta__version">350-401 ENCOR v1.2</span>

      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">

  <script>
    (function () {
      var CORRECT = "A";
      var CORRECT_MSG = "Correct. Chef is agent-based and cookbook-driven, while Ansible is agentless and playbook-driven.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="q364"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="q364"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
