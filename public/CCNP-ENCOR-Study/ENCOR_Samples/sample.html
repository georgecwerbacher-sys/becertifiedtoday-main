<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sample practice</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script>
    (function () {
      var params = new URLSearchParams(location.search || "");
      var stored = sessionStorage.getItem("ccnpSampleKind");
      var track = (params.get("track") || stored || "questions").toLowerCase();
      /* Legacy sample URL; same lab as ccna-trunk */
      if (track === "ccna-ip") track = "ccna-trunk";

      var ENCOR_APP = "https://becertifiedtoday-encor.vercel.app";
      var map = {
        questions: ENCOR_APP + "/sample?track=questions",
        labs: ENCOR_APP + "/sample?track=labs",
        drag: ENCOR_APP + "/sample?track=drag",
        ftp: "/CCNA-Study/CCNA_Samples/dragdrop-ftp-vs-tftp.html?sample=1",
        "ccna-questions": "/CCNA-Study/CCNA_Samples/sample-question-1.html?sample=1",
        "ccna-trunk": "/CCNA-Study/CCNA_labs/cli-lab-trunk_lacp.html?sample=1",
        "ccna-vlan": "/CCNA-Study/CCNA_labs/cli-lab-vlan-sim.html?sample=1"
      };

      if (!Object.prototype.hasOwnProperty.call(map, track)) {
        track = "questions";
      }

      sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
      sessionStorage.setItem("ccnpSampleKind", track);

      location.replace(map[track]);
    })();
  </script>
</body>
</html>
