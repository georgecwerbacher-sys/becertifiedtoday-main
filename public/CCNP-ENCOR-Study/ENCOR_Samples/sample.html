<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/js/install-google-tag.js"></script>
  <script src="/js/install-vercel-analytics.js"></script>
  <link rel="canonical" href="https://becertifiedtoday.com/CCNP-ENCOR-Study/ENCOR_Samples/sample.html" />
  <meta name="description" content="Free CCNP ENCOR 350-401 exam prep sample — interactive practice questions and labs in your browser. Verified explanations, no PDF dumps." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Free exam prep sample — Be Certified Today</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script src="/CCNA-Study/js/ccna-home-sample-launcher.js"></script>
  <script src="/CCNP-ENCOR-Study/js/encor-home-sample-launcher.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search || "");
      var track = (params.get("track") || "questions").toLowerCase();
      var finishCcna = "/ccna-home.html";
      var finishEncor = "/ccnp-home.html";

      function fail() {
        document.body.textContent = "Could not start the sample. Try again later.";
      }

      function encorFreeSimAllowed() {
        try {
          var raw = localStorage.getItem("bcc_encor_free_sim_v1");
          if (!raw) return true;
          var o = JSON.parse(raw);
          if (o && o.consumed === true) return false;
          if (o && o.viaGuest === true) return true;
          return !!(o && o.email && o.viaLeadApi === true);
        } catch (e) {
          return true;
        }
      }

      if (window.CCNA_HOME_SAMPLE && window.CCNA_HOME_SAMPLE.resumeFromHash && window.CCNA_HOME_SAMPLE.resumeFromHash()) {
        return;
      }
      if (window.ENCOR_HOME_SAMPLE && window.ENCOR_HOME_SAMPLE.resumeFromHash && window.ENCOR_HOME_SAMPLE.resumeFromHash()) {
        return;
      }

      if (track === "ccna-questions" && window.CCNA_HOME_SAMPLE) {
        sessionStorage.setItem("ccnpSampleKind", track);
        window.CCNA_HOME_SAMPLE.startQuestions(finishCcna).catch(fail);
        return;
      }
      if (track === "ccna-dnd" && window.CCNA_HOME_SAMPLE) {
        sessionStorage.setItem("ccnpSampleKind", track);
        window.CCNA_HOME_SAMPLE.startDnd(finishCcna).catch(fail);
        return;
      }
      if ((track === "ccna-vlan" || track === "ccna-trunk" || track === "ccna-lab") && window.CCNA_HOME_SAMPLE) {
        sessionStorage.setItem("ccnpSampleKind", "ccna-lab");
        window.CCNA_HOME_SAMPLE.startLab(finishCcna).catch(fail);
        return;
      }

      if (track === "encor-questions" && window.ENCOR_HOME_SAMPLE) {
        sessionStorage.setItem("ccnpSampleKind", track);
        window.ENCOR_HOME_SAMPLE.startQuestions(finishEncor).catch(fail);
        return;
      }
      if (track === "encor-dnd" || track === "drag") {
        sessionStorage.setItem("ccnpSampleKind", "encor-dnd");
        window.ENCOR_HOME_SAMPLE.startDnd(finishEncor).catch(fail);
        return;
      }
      if (track === "labs" || track === "encor-lab") {
        sessionStorage.setItem("ccnpSampleKind", "encor-lab");
        window.ENCOR_HOME_SAMPLE.startLab(finishEncor).catch(fail);
        return;
      }
      if (track === "encor-free-sim") {
        if (!encorFreeSimAllowed()) {
          location.replace(finishEncor + "#purchase");
          return;
        }
        var welcome = params.get("welcome") === "1" ? "&welcome=1" : "";
        location.replace("/CCNP-ENCOR-Study/test-simulation-runner.html?free=1" + welcome);
        return;
      }

      /* Legacy aliases */
      if (track === "encor-q") {
        var qid = parseInt(params.get("id"), 10);
        var ENCOR_SAMPLE_Q = [1, 3, 6, 7, 10, 11, 12, 15, 20, 23, 37, 44];
        if (ENCOR_SAMPLE_Q.indexOf(qid) >= 0) {
          sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
          sessionStorage.setItem("ccnpSampleKind", "encor-q-" + qid);
          location.replace(
            "/CCNP-ENCOR-Study/ENCOR_Questions/question-" + qid + ".html?sample=1"
          );
          return;
        }
      }

      if (track === "questions") {
        location.replace("/CCNP-ENCOR-Study/ENCOR_Samples/sample-question-1.html?sample=1");
        return;
      }

      fail();
    })();
  </script>
</body>
</html>
