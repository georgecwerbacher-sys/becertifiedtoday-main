<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Sample practice</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script>
    (function () {
      var params = new URLSearchParams(location.search || "");
      var stored = sessionStorage.getItem("ccnpSampleKind");
      var track = (params.get("track") || stored || "questions").toLowerCase();
      /* Legacy sample URL; same lab as ccna-trunk */
      if (track === "ccna-ip") track = "ccna-trunk";

      var ENCOR_SAMPLE_Q = [1, 3, 6, 7, 10, 11, 12, 15, 20, 23, 37, 44];
      var ENCOR_SAMPLE_DND_IDS = [365, 261];
      var ENCOR_SAMPLE_DND_URL = {
        "365": "/CCNP-ENCOR-Study/ENCOR_Samples/question-365.html?sample=1",
        "261": "/CCNP-ENCOR-Study/CCNP-ENCOR-Drag-Drop/question-261.html?sample=1"
      };
      /** One CCNA 200-301 sample MCQ per exam domain — each page includes a topology or exhibit figure. */
      var CCNA_SAMPLE_SLUGS = [
        "site-ab-tenge-sfp-sr-vs-lr-smf-intermittent-exhibit",
        "switchport-trunk-allowed-vlan-add-104",
        "router1-longest-match-10-10-13-158-show-ip-route",
        "nat-pat-standard-acl1-gi01-exhibit",
        "sw1-pc1-port-security-access-mac-exhibit",
        "json-mycar-wheels-warning-in-array"
      ];
      var CCNA_SAMPLE_SLUG_SET = {};
      CCNA_SAMPLE_SLUGS.forEach(function (slug) {
        CCNA_SAMPLE_SLUG_SET[slug] = true;
      });

      function startCcnaSampleQueue(slugs, kind) {
        var shuffled = shuffle(slugs);
        try {
          sessionStorage.removeItem("ccnpLinearScope");
          sessionStorage.removeItem("ccnpReviewMode");
          sessionStorage.removeItem("ccnpReviewQueue");
          sessionStorage.setItem(
            "ccnaPractice100",
            JSON.stringify({ v: 1, order: shuffled, mode: "linear" })
          );
        } catch (e) {}
        sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
        sessionStorage.setItem("ccnpSampleKind", kind);
        location.replace(
          "/CCNA-Study/CCNA_questions/" + shuffled[0] + ".html?sample=1"
        );
      }

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      var map = {
        questions: "/CCNP-ENCOR-Study/ENCOR_Samples/sample-question-1.html?sample=1",
        labs: "/CCNP-ENCOR-Study/CCNP-ENCOR-Labs/cli-lab-acl-copp.html?sample=1",
        drag: "/CCNP-ENCOR-Study/ENCOR_Samples/question-365.html?sample=1",
        ftp: "/CCNA-Study/CCNA_Samples/dragdrop-ftp-vs-tftp.html?sample=1",
        "ccna-questions": "/CCNA-Study/CCNA_Samples/sample-question-1.html?sample=1",
        "ccna-dnd": "/CCNA-Study/CCNA_Samples/dragdrop-ftp-vs-tftp.html?sample=1",
        "ccna-trunk": "/CCNA-Study/CCNA_labs/cli-lab-trunk_lacp.html?sample=1",
        "ccna-vlan": "/CCNA-Study/CCNA_labs/cli-lab-vlan-sim.html?sample=1"
      };

      var dest = null;

      if (track === "ccna-questions") {
        startCcnaSampleQueue(CCNA_SAMPLE_SLUGS, "ccna-questions");
        return;
      }

      if (track === "ccna-q") {
        var slug = (params.get("slug") || "").replace(/\.html$/, "");
        if (CCNA_SAMPLE_SLUG_SET[slug]) {
          startCcnaSampleQueue([slug], "ccna-q-" + slug);
          return;
        }
      }

      if (track === "encor-questions") {
        var shuffled = shuffle(ENCOR_SAMPLE_Q);
        try {
          sessionStorage.removeItem("ccnpLinearScope");
          sessionStorage.removeItem("ccnpReviewMode");
          sessionStorage.removeItem("ccnpReviewQueue");
          sessionStorage.setItem("ccnpQuestionQueue", JSON.stringify(shuffled));
          sessionStorage.setItem("ccnpQuestionQueueIndex", "0");
          sessionStorage.setItem("ccnpQueueExitHref", "/ccnp-home.html");
        } catch (e) {}
        sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
        sessionStorage.setItem("ccnpSampleKind", "encor-questions");
        location.replace(
          "/CCNP-ENCOR-Study/ENCOR_Questions/question-" + shuffled[0] + ".html?sample=1"
        );
        return;
      }

      if (track === "encor-dnd" || track === "drag") {
        track = "encor-dnd";
        var dndSingle = params.get("id");
        if (dndSingle) {
          var did = String(parseInt(dndSingle, 10));
          if (Object.prototype.hasOwnProperty.call(ENCOR_SAMPLE_DND_URL, did)) {
            dest = ENCOR_SAMPLE_DND_URL[did];
            track = "encor-dnd-" + did;
          }
        } else {
          var shuffledDnd = shuffle(ENCOR_SAMPLE_DND_IDS);
          try {
            sessionStorage.removeItem("ccnpLinearScope");
            sessionStorage.removeItem("ccnpReviewMode");
            sessionStorage.removeItem("ccnpReviewQueue");
            sessionStorage.setItem("ccnpQuestionQueue", JSON.stringify(shuffledDnd));
            sessionStorage.setItem("ccnpQuestionQueueIndex", "0");
            sessionStorage.setItem("ccnpQueueExitHref", "/ccnp-home.html");
          } catch (e) {}
          sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
          sessionStorage.setItem("ccnpSampleKind", "encor-dnd");
          location.replace(ENCOR_SAMPLE_DND_URL[String(shuffledDnd[0])]);
          return;
        }
      }

      if (track === "encor-q") {
        var qid = parseInt(params.get("id"), 10);
        if (ENCOR_SAMPLE_Q.indexOf(qid) >= 0) {
          dest = "/CCNP-ENCOR-Study/ENCOR_Questions/question-" + qid + ".html?sample=1";
          track = "encor-q-" + qid;
        }
      } else if (Object.prototype.hasOwnProperty.call(map, track)) {
        dest = map[track];
      }

      if (!dest) {
        track = "questions";
        dest = map.questions;
      }

      sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
      sessionStorage.setItem("ccnpSampleKind", track);

      location.replace(dest);
    })();
  </script>
</body>
</html>
