<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BGP Redistribution Question 4</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #ffffff; color: #e6edf3; }
    .card { width: min(900px, 92vw); background: #121a2b; border: 1px solid #2d3b5a; border-radius: 14px; padding: 28px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35); }
    h1 { margin: 0 0 18px; font-size: clamp(1.2rem, 2vw, 1.7rem); line-height: 1.35; }
    .choice { display: block; margin: 10px 0; padding: 12px 14px; border-radius: 10px; background: #1a253b; border: 1px solid #2c3f62; font-size: 1.05rem; cursor: pointer; }
    .choice input { margin-right: 10px; transform: translateY(1px); }
    .answer { margin-top: 20px; padding: 14px; border-radius: 10px; font-weight: 700; display: none; }
    .answer.correct { background: #113e2d; border: 1px solid #1f7a58; }
    .answer.incorrect { background: #442020; border: 1px solid #8c3434; }
    .next-wrap { margin-top: 18px; display: none; }
    .next-link { display: inline-block; text-decoration: none; color: #e6edf3; background: #254b8a; border: 1px solid #3d6dbb; border-radius: 10px; padding: 10px 16px; font-weight: 700; }
    .home-key { position: fixed; right: 18px; bottom: 18px; z-index: 9999; text-decoration: none; background: #254b8a; border: 1px solid #3d6dbb; color: #e6edf3; border-radius: 10px; padding: 10px 14px; font-weight: 700; box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35); }
  </style>
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <main class="card">
    <h1>A BeCertifiedToday.com engineer needs to redistribute routes from OSPF into BGP. Which metric attribute should be configured to influence path selection in remote AS?</h1>
    <label class="choice"><input type="radio" name="q4" value="A" />A. Weight</label>
    <label class="choice"><input type="radio" name="q4" value="B" />B. Local Preference</label>
    <label class="choice"><input type="radio" name="q4" value="C" />C. MED (Multi-Exit Discriminator)</label>
    <label class="choice"><input type="radio" name="q4" value="D" />D. AS Path Prepending</label>
    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap"><a class="next-link" href="sample-question-4.html">Next</a></div>
  </main>
  <a class="home-key" href="/index.html">Home</a>
  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    document.querySelectorAll('input[name="q4"]').forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "C") {
          answerBox.className = "answer correct";
          answerBox.textContent = "Correct. C. MED (Multi-Exit Discriminator)";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });
    });
  </script>
</body>
</html>
