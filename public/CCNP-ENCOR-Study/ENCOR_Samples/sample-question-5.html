<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="canonical" href="https://becertifiedtoday.com/CCNP-ENCOR-Study/ENCOR_Samples/sample-question-5.html" />
  <meta name="description" content="Free CCNP ENCOR 350-401 exam prep sample — interactive practice questions and labs in your browser. Verified explanations, no PDF dumps." />
  <meta name="robots" content="index, follow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RESTCONF Question 6</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1020; color: #e6edf3; }
    .card { width: min(900px, 92vw); background: #121a2b; border: 1px solid #2d3b5a; border-radius: 14px; padding: 28px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35); }
    h1 { margin: 0 0 18px; font-size: clamp(1.15rem, 2vw, 1.65rem); line-height: 1.35; }
    .choice { display: block; margin: 10px 0; padding: 12px 14px; margin-left: 34px; border-radius: 10px; background: #1a253b; border: 1px solid #2c3f62; font-size: 1.02rem; cursor: pointer; position: relative; }
    .choice::before { content: attr(data-letter); position: absolute; left: -34px; top: 50%; transform: translateY(-50%); width: 28px; text-align: right; font-weight: 700; color: #b8c3d6; }
    .choice input { margin-right: 10px; transform: translateY(1px); }
    .actions { margin-top: 14px; }
    .check-btn { background: #254b8a; color: #e6edf3; border: 1px solid #3d6dbb; border-radius: 10px; padding: 10px 16px; font-weight: 700; cursor: pointer; }
    .answer { margin-top: 16px; padding: 14px; border-radius: 10px; font-weight: 700; display: none; }
    .answer.correct { background: #113e2d; border: 1px solid #1f7a58;
      color: #ffffff; }
    .answer.incorrect { background: #442020; border: 1px solid #8c3434;
      color: #fecaca; }
    .next-wrap { margin-top: 18px; display: none; }
    .next-link { display: inline-block; text-decoration: none; color: #e6edf3; background: #254b8a; border: 1px solid #3d6dbb; border-radius: 10px; padding: 10px 16px; font-weight: 700; }
    .home-key { position: fixed; right: 18px; bottom: 18px; z-index: 9999; text-decoration: none; background: #254b8a; border: 1px solid #3d6dbb; color: #e6edf3; border-radius: 10px; padding: 10px 14px; font-weight: 700; box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35); }
  </style>
</head>
<body>
  <main class="card">
    <h1>Which two operations are valid for RESTCONF? (Choose two)</h1>
    <label class="choice"><input type="checkbox" name="q6" value="A" /><span class="choice-text">HEAD</span></label>
    <label class="choice"><input type="checkbox" name="q6" value="B" /><span class="choice-text">REMOVE</span></label>
    <label class="choice"><input type="checkbox" name="q6" value="C" /><span class="choice-text">PULL</span></label>
    <label class="choice"><input type="checkbox" name="q6" value="D" /><span class="choice-text">GET</span></label>
    <label class="choice"><input type="checkbox" name="q6" value="E" /><span class="choice-text">ADD</span></label>
    <label class="choice"><input type="checkbox" name="q6" value="F" /><span class="choice-text">PUSH</span></label>
    <div class="actions"><button id="checkBtn" class="check-btn" type="button">Check Answer</button></div>
    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap"><a class="next-link" href="/ccnp-home.html">Back to home</a></div>
  </main>
  <a class="home-key" href="/ccnp-home.html">Home</a>
  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const checkBtn = document.getElementById("checkBtn");
    const options = document.querySelectorAll('input[name="q6"]');
    const correctSet = new Set(["A", "D"]);
    [...document.querySelectorAll("label.choice")].forEach((choice, index) => {
      choice.dataset.letter = `${"ABCDEFGHIJKLMNOPQRSTUVWXYZ"[index] || "?"}.`;
    });
    checkBtn.addEventListener("click", () => {
      const selected = [...options].filter((o) => o.checked).map((o) => o.value);
      if (!selected.length) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select at least one option.";
        return;
      }
      answerBox.style.display = "block";
      nextWrap.style.display = "block";
      const selectedSet = new Set(selected);
      const isCorrect = selectedSet.size === correctSet.size && [...correctSet].every((value) => selectedSet.has(value));
      if (isCorrect) {
        answerBox.className = "answer correct";
        answerBox.textContent = "Correct. HEAD and GET.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Incorrect.";
      }
    });
  </script>
  <script src="/js/sample-url-mask-apply.js"></script>
</body>
</html>
