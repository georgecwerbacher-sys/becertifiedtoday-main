<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="index, follow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 50 - Ansible vs Puppet Drag Drop</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(1020px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .instructions {
      margin: 0 0 14px;
      color: #b8c3d6;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .bank {
      background: #1a253b;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 240px;
    }
    .token {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #6384ba;
      background: #cfe9ff;
      color: #10243f;
      font-weight: 700;
      cursor: grab;
      user-select: none;
    }
    .token:active {
      cursor: grabbing;
    }
    .targets {
      display: grid;
      gap: 12px;
    }
    .target-group {
      border: 1px solid #2c3f62;
      border-radius: 10px;
      background: #1a253b;
      padding: 10px;
    }
    .target-title {
      margin: 0 0 10px;
      font-weight: 700;
      background: #f7ecd7;
      color: #2a2112;
      border: 1px solid #d9c28a;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .drop-slot {
      min-height: 46px;
      border-radius: 8px;
      border: 1px dashed #d98a8a;
      background: #f7d7d7;
      padding: 6px;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }
    .drop-slot:last-child {
      margin-bottom: 0;
    }
    .drop-slot.over {
      border-style: solid;
      border-color: #4d89ff;
    }
    .drop-slot.correct {
      border-color: #1f7a58;
      background: #113e2d;
    }
    .drop-slot.incorrect {
      border-color: #8c3434;
      background: #442020;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    #result {
      font-weight: 700;
    }
    #nextWrap {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Question 50: Drag the blue boxes under the correct tool.</h1>
    <p class="instructions">Ansible and Puppet stay fixed. Drag each blue statement into the correct tool; order within a column does not matter.</p>

    <div class="layout">
      <section>
        <div id="bank" class="bank">
          <div class="token" draggable="true" data-value="uses playbooks">uses playbooks</div>
          <div class="token" draggable="true" data-value="uses a pull model">uses a pull model</div>
          <div class="token" draggable="true" data-value="procedural">procedural</div>
          <div class="token" draggable="true" data-value="declarative">declarative</div>
        </div>
      </section>

      <section class="targets">
        <div class="target-group" data-expected="uses playbooks|procedural">
          <div class="target-title">Ansible</div>
          <div class="drop-slot"></div>
          <div class="drop-slot"></div>
        </div>

        <div class="target-group" data-expected="uses a pull model|declarative">
          <div class="target-title">Puppet</div>
          <div class="drop-slot"></div>
          <div class="drop-slot"></div>
        </div>
      </section>
    </div>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
      <button id="showBtn" type="button">Show Answer</button>
      <button id="resetBtn" type="button">Reset</button>
      <span id="result"></span>
      <span id="nextWrap"><a class="next-link" href="/question-51.html">Next</a></span>
    </div>
  </main>

  <script>
    const bank = document.getElementById("bank");
    const slots = document.querySelectorAll(".drop-slot");
    const checkBtn = document.getElementById("checkBtn");
    const showBtn = document.getElementById("showBtn");
    const resetBtn = document.getElementById("resetBtn");
    const result = document.getElementById("result");
    const nextWrap = document.getElementById("nextWrap");
    let dragged = null;

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    document.querySelectorAll(".token").forEach((token) => {
      token.addEventListener("dragstart", () => {
        dragged = token;
      });
    });

    slots.forEach((slot) => {
      slot.addEventListener("dragover", (e) => {
        e.preventDefault();
        slot.classList.add("over");
      });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", (e) => {
        e.preventDefault();
        slot.classList.remove("over");
        if (!dragged) return;
        const existing = slot.querySelector(".token");
        if (existing) bank.appendChild(existing);
        slot.appendChild(dragged);
      });
    });

    bank.addEventListener("dragover", (e) => e.preventDefault());
    bank.addEventListener("drop", (e) => {
      e.preventDefault();
      if (dragged) bank.appendChild(dragged);
    });

    function multisetEqual(a, b) {
      if (a.length !== b.length) return false;
      const sa = a.slice().sort();
      const sb = b.slice().sort();
      return sa.every((v, i) => v === sb[i]);
    }

    checkBtn.addEventListener("click", () => {
      const groups = document.querySelectorAll(".target-group");
      let correctGroups = 0;
      groups.forEach((group) => {
        const expected = group.dataset.expected.split("|");
        const actual = [...group.querySelectorAll(".drop-slot .token")].map((t) => t.dataset.value);
        const ok =
          expected.length === actual.length && multisetEqual(expected, actual);
        if (ok) correctGroups += 1;
        group.querySelectorAll(".drop-slot").forEach((slot) => {
          slot.classList.remove("correct", "incorrect");
          slot.classList.add(ok ? "correct" : "incorrect");
        });
      });
      result.textContent = `Score: ${correctGroups}/${groups.length}`;
      nextWrap.style.display = "inline-block";
    });

    showBtn.addEventListener("click", () => {
      slots.forEach((slot) => {
        slot.classList.remove("correct", "incorrect", "over");
        const existing = slot.querySelector(".token");
        if (existing) bank.appendChild(existing);
      });

      const groupTargets = [
        ["uses playbooks", "procedural"],
        ["uses a pull model", "declarative"]
      ];
      const groups = document.querySelectorAll(".target-group");

      groups.forEach((group, groupIndex) => {
        const wants = groupTargets[groupIndex] || [];
        const groupSlots = group.querySelectorAll(".drop-slot");
        groupSlots.forEach((slot, slotIndex) => {
          const want = wants[slotIndex];
          const target = [...bank.querySelectorAll(".token")].find(
            (t) => t.dataset.value === want
          );
          if (target) {
            slot.appendChild(target);
            slot.classList.add("correct");
          }
        });
      });

      result.textContent = "Answer shown.";
      nextWrap.style.display = "inline-block";
    });

    resetBtn.addEventListener("click", () => {
      slots.forEach((slot) => {
        slot.classList.remove("correct", "incorrect", "over");
        const token = slot.querySelector(".token");
        if (token) bank.appendChild(token);
      });
      result.textContent = "";
      nextWrap.style.display = "none";
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/CCNP-ENCOR-Study/ENCOR_Training_Portal.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
