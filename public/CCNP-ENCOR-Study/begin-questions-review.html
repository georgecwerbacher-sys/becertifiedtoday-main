<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Starting review quiz…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading review quiz…</p>
  <script>
    (function () {
      var studyParam = new URLSearchParams(location.search).get("study");
      var sectionParam = new URLSearchParams(location.search).get("section");
      var modeParam = new URLSearchParams(location.search).get("mode");
      var studyIndex = parseInt(studyParam || "1", 10);
      var sectionIndex = parseInt(sectionParam || "1", 10);
      if (studyIndex < 1 || studyIndex !== studyIndex) studyIndex = 1;
      if (sectionIndex < 1 || sectionIndex !== sectionIndex) sectionIndex = 1;

      function buildCombinedSections(studiesList, targetCount) {
        var groups = [];
        if (!studiesList.length) return groups;
        var chunkSize = Math.max(1, Math.ceil(studiesList.length / targetCount));
        for (var i = 0; i < studiesList.length; i += chunkSize) {
          var chunk = studiesList.slice(i, i + chunkSize);
          var ids = [];
          chunk.forEach(function (study) {
            ids = ids.concat(study.ids || []);
          });
          groups.push({ ids: ids });
        }
        return groups;
      }

      fetch("/js/study-config.json", { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("cfg");
          return r.json();
        })
        .then(function (cfg) {
          var dragDropAll = {};
          (cfg.dragDropIds || []).concat(cfg.dragDropJsonIds || []).forEach(function (id) {
            dragDropAll[id] = true;
          });
          var ids = [];
          if (modeParam === "dragdrop") {
            ids = (cfg.dragDropIds || []).slice();
          } else if (modeParam === "dragdrop-json") {
            ids = (cfg.dragDropJsonIds || []).slice();
          } else if (sectionParam) {
            var studies = (cfg.studies || []).map(function (s) {
              return {
                ids: (s.ids || []).filter(function (id) { return !dragDropAll[id]; })
              };
            });
            var sections = buildCombinedSections(studies, 5);
            var section = sections[sectionIndex - 1];
            ids = section && section.ids ? section.ids : [];
          } else {
            var study = (cfg.studies || [])[studyIndex - 1];
            ids = study && study.ids ? study.ids.filter(function (id) { return !dragDropAll[id]; }) : [];
          }
          if (!ids.length) {
            location.replace("/CCNP_Encor.html");
            return;
          }
          for (var i = ids.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var t = ids[i];
            ids[i] = ids[j];
            ids[j] = t;
          }
          try {
            sessionStorage.removeItem("ccnpQuestionQueue");
            sessionStorage.removeItem("ccnpQuestionQueueIndex");
            sessionStorage.removeItem("ccnpLinearScope");
            sessionStorage.removeItem("ccnpQueueExitHref");
            sessionStorage.removeItem("ccnpUrlMaskPath");
            sessionStorage.removeItem("ccnpMaskedPageQid");
            sessionStorage.setItem("ccnpReviewMode", "1");
            sessionStorage.setItem("ccnpReviewQueue", JSON.stringify(ids));
          } catch (e) {}
          location.replace("/question-" + ids[0] + ".html");
        })
        .catch(function () {
          location.replace("/CCNP_Encor.html");
        });
    })();
  </script>
</body>
</html>
