<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Preparing test simulation…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #b8c3d6;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <p>Preparing your timed test simulation…</p>
  <script>
    (function () {
      var TEST_MINUTES = 120;
      var QUESTION_COUNT = 40;
      var DRAGDROP_STD_COUNT = 5;
      var DRAGDROP_JSON_COUNT = 4;
      var SIM_COUNT = 3;

      function pickRandom(list, n) {
        var copy = list.slice();
        for (var i = copy.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = copy[i];
          copy[i] = copy[j];
          copy[j] = t;
        }
        return copy.slice(0, Math.min(n, copy.length));
      }

      function shuffle(list) {
        var out = list.slice();
        for (var i = out.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = out[i];
          out[i] = out[j];
          out[j] = t;
        }
        return out;
      }

      fetch("/js/study-config.json", { cache: "no-store" })
        .then(function (r) {
          if (!r.ok) throw new Error("cfg");
          return r.json();
        })
        .then(function (cfg) {
          var dragDropStd = (cfg.dragDropIds || []).slice();
          var dragDropJson = (cfg.dragDropJsonIds || []).slice();
          var dragDropLookup = {};
          dragDropStd.concat(dragDropJson).forEach(function (id) {
            dragDropLookup[id] = true;
          });

          var nonDragIds = (cfg.allIds || []).filter(function (id) {
            return !dragDropLookup[id];
          });

          var questionIds = pickRandom(nonDragIds, QUESTION_COUNT);
          var stdIds = pickRandom(dragDropStd, DRAGDROP_STD_COUNT);
          var jsonIds = pickRandom(dragDropJson, DRAGDROP_JSON_COUNT);

          var simPool = [
            "/cli-lab-vty-login.html",
            "/cli-lab-vty-login-v2.html",
            "/cli-lab-rapid-pvst-lacp.html",
            "/cli-lab-vrf-tunnel.html",
            "/cli-lab-vrf-config-sim2.html",
            "/cli-lab-ospf-dr-bdr.html",
            "/cli-lab-ospf-dr-bdr-2.html",
            "/cli-lab-ospf-dr-summarization.html",
            "/cli-lab-ospf-adv-summ.html",
            "/cli-lab-ospf-summ-r30.html",
            "/cli-lab-ospf-summ-r20.html",
            "/cli-lab-trunk-udld-lacp.html",
            "/cli-lab-ebgp-neighbor-2.html",
            "/cli-lab-lacp-root-bridge.html",
            "/cli-lab-netflow-span.html",
            "/cli-lab-netflow-span-2.html",
            "/cli-lab-acl-copp.html"
          ];
          var simUrls = pickRandom(simPool, SIM_COUNT);

          var queue = []
            .concat(
              questionIds.map(function (id) { return { kind: "question", url: "/question-" + id + ".html" }; }),
              stdIds.map(function (id) { return { kind: "dragdrop", url: "/question-" + id + ".html" }; }),
              jsonIds.map(function (id) { return { kind: "dragdrop-json", url: "/question-" + id + ".html" }; }),
              simUrls.map(function (url) { return { kind: "sim", url: url }; })
            );

          queue = shuffle(queue);

          try {
            sessionStorage.setItem("ccnpTestSimQueue", JSON.stringify(queue));
            sessionStorage.setItem("ccnpTestSimIndex", "0");
            sessionStorage.setItem(
              "ccnpTestSimEndsAt",
              String(Date.now() + TEST_MINUTES * 60 * 1000)
            );
          } catch (e) {
            location.replace("/BCT-CCNP-ENCOR-Training.html");
            return;
          }

          location.replace("/test-simulation.html");
        })
        .catch(function () {
          location.replace("/BCT-CCNP-ENCOR-Training.html");
        });
    })();
  </script>
</body>
</html>
