<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ENCOR Access Expired | Be Certified Today</title>
  <style>
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: #0b1020; color: #e6edf3; }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .card { width: min(620px, 100%); background: #121a2b; border: 1px solid #2d3b5a; border-radius: 14px; padding: 24px; }
    h1 { margin-top: 0; font-size: 1.6rem; }
    p { color: #b8c3d6; line-height: 1.55; }
    .actions { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; align-items: stretch; }
    .cta { display: inline-flex; min-height: 44px; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 10px; border: 1px solid #4f84d8; background: #2f66bf; color: #f3f7ff; font-weight: 700; text-decoration: none; cursor: pointer; font-size: 1rem; font-family: inherit; box-sizing: border-box; }
    .cta--secondary { background: transparent; color: #e6edf3; border-color: #3d5280; }
    .cta--secondary:hover { background: rgba(79, 132, 216, 0.12); border-color: #4f84d8; }
    .cta:disabled { opacity: 0.7; cursor: wait; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Your ENCOR access has expired</h1>
      <p>Your 30-day window ended. Renew to keep using ENCOR practice questions, labs, and timed tests.</p>
      <div class="actions">
        <button type="button" class="cta" data-encor-checkout data-renew="true">Renew Access</button>
        <a class="cta cta--secondary" href="https://becertifiedtoday.com/index.html">Home</a>
      </div>
    </section>
  </main>
  <script defer src="/js/encor-checkout.js"></script>
  <script defer src="/js/analytics-events.js"></script>
</body>
</html>
