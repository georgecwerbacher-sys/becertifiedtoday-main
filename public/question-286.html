<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 286 - Catalyst Center role in Cisco SD-Access</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>What is the function of Cisco Catalyst Center in a Cisco SD-Access deployment?</h1>

    <label class="choice">
      <input type="radio" name="q286" value="A" />
      A. It is responsible for routing decisions inside the fabric
    </label>
    <label class="choice">
      <input type="radio" name="q286" value="B" />
      B. It is responsible for the design, management, deployment, provisioning, and assurance of the fabric network devices
    </label>
    <label class="choice">
      <input type="radio" name="q286" value="C" />
      C. It possesses information about all endpoints, nodes, and external networks related to the fabric
    </label>
    <label class="choice">
      <input type="radio" name="q286" value="D" />
      D. It provides integration and automation for all nonfabric nodes and their fabric counterparts
    </label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-288.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q286"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "B") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. B. Catalyst Center (successor to DNA Center in this role) is the SD-Access automation and operations platform: hierarchical design, fabric site and device onboarding, policy and segmentation workflows, image/config provisioning, and assurance analytics. Fabric forwarding and endpoint reachability use the distributed control/data plane (for example LISP, VXLAN, node roles), not Catalyst Center, for per-packet routing inside the fabric.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: B. Catalyst Center focuses on lifecycle management and intent for the fabric, not as the primary routing engine or sole repository of all endpoint state.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
