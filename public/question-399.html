<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 399 - VXLAN encapsulation</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
  </style>
</head>
<body class="ccnp-practice-ui">
  <main class="card">
    <h1>Which description of VXLAN encapsulation in the data plane is correct?</h1>

    <label class="choice">
      <input type="radio" name="q399" value="A" />
      <strong>A.</strong> It uses TCP for transport.
    </label>

    <label class="choice">
      <input type="radio" name="q399" value="B" />
      <strong>B.</strong> It has a 12-byte packet header.
    </label>

    <label class="choice">
      <input type="radio" name="q399" value="C" />
      <strong>C.</strong> Its frame encapsulation is performed by MAC-in-UDP.
    </label>

    <label class="choice">
      <input type="radio" name="q399" value="D" />
      <strong>D.</strong> It extends Layer 2 and Layer 3 overlay networks over a Layer 2 underlay.
    </label>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-400.html">Next</a>
    </div>
  </main>

  <script>
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q399"]');
    const correct = "C";

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = [...options].find((opt) => opt.checked);
      if (!selected) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select an option before checking the answer.";
        nextWrap.style.display = "none";
        return;
      }

      const ok = selected.value === correct;
      answerBox.style.display = "block";
      answerBox.className = `answer ${ok ? "correct" : "incorrect"}`;
      answerBox.textContent = ok
        ? "Correct. VXLAN encapsulates Layer 2 frames in UDP (MAC-in-UDP)."
        : "Incorrect. VXLAN is characterized by MAC-in-UDP encapsulation.";
      nextWrap.style.display = "inline-block";
    });

    resetBtn.addEventListener("click", () => {
      options.forEach((opt) => {
        opt.checked = false;
      });
      answerBox.style.display = "none";
      answerBox.textContent = "";
      nextWrap.style.display = "none";
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
