<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — PAT and NAT extended ACL</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: clamp(1.02rem, 2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: #e6edf3;
    }
    .exhibit {
      margin: 0 0 18px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d3b5a;
      background: #ffffff;
      text-align: center;
    }
    .exhibit img {
      display: block;
      width: 100%;
      max-width: min(100%, 720px);
      height: auto;
      margin: 0 auto;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice-cli {
      padding: 12px 14px;
    }
    .choice-cli-inner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .choice-cli-inner > input {
      flex-shrink: 0;
      margin-top: 4px;
      margin-right: 0;
    }
    .choice-cli-body {
      flex: 1;
      min-width: 0;
    }
    .choice-cli-letter {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #e6edf3;
    }
    .cli-config-snippet code {
      font: inherit;
      color: inherit;
    }
    .cli-config-snippet {
      margin: 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0a0e14;
      border: 1px solid #1e293b;
      color: #c8e6c9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.65rem, 1.4vw, 0.78rem);
      line-height: 1.45;
      white-space: pre;
      overflow-x: auto;
      text-align: left;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="exhibit">
      <figcaption class="visually-hidden">
        Router with GigabitEthernet1/0/0 outside; subinterfaces GigabitEthernet2/0/1.100 192.168.100.1/27 for VLAN 100 and
        GigabitEthernet2/0/1.200 192.168.100.33/27 for VLAN 200; switch connects hosts per VLAN.
      </figcaption>
      <img
        src="/CCNA-Study/CCNA_questions/pat-vlan200-inside-source-overload-topology.png"
        width="329"
        height="303"
        alt="Router-on-a-stick: Gi1/0/0 outside; Gi2/0/1.100 VLAN 100 192.168.100.1/27; Gi2/0/1.200 VLAN 200 192.168.100.33/27."
        decoding="async"
        loading="lazy"
      />
    </figure>

    <h1>
      Which configuration must be applied to the router so PAT translates addresses in VLAN 200 while devices on VLAN 100 use
      their own IP addresses? Choose the option that matches the correct full configuration block.
    </h1>

    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="pat" value="A" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">A.</span>
          <pre class="cli-config-snippet"><code>access-list 1 permit 209.165.201.2 0.0.0.0
ip nat inside source list 1 interface GigabitEthernet1/0/0 overload
!
interface GigabitEthernet2/0/1.100
 ip nat inside
!
interface GigabitEthernet2/0/1.200
 ip nat inside
!
interface GigabitEthernet1/0/0
 ip nat outside</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="pat" value="B" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">B.</span>
          <pre class="cli-config-snippet"><code>access-list 1 permit 209.165.201.2 255.255.255.255
ip nat inside source list 1 interface GigabitEthernet1/0/0 overload
!
interface GigabitEthernet2/0/1.100
 ip nat inside
!
interface GigabitEthernet2/0/1.200
 ip nat inside
!
interface GigabitEthernet1/0/0
 ip nat outside</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="pat" value="C" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">C.</span>
          <pre class="cli-config-snippet"><code>access-list 1 permit 192.168.100.0 0.0.0.255
ip nat inside source list 1 interface GigabitEthernet1/0/0 overload
!
interface GigabitEthernet2/0/1.100
 ip nat inside
!
interface GigabitEthernet2/0/1.200
 ip nat inside
!
interface GigabitEthernet1/0/0
 ip nat outside</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="pat" value="D" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">D.</span>
          <pre class="cli-config-snippet"><code>access-list 1 permit 192.168.100.32 0.0.0.31
ip nat inside source list 1 interface GigabitEthernet1/0/0 overload
!
interface GigabitEthernet2/0/1.100
 ip nat inside
!
interface GigabitEthernet2/0/1.200
 ip nat inside
!
interface GigabitEthernet1/0/0
 ip nat outside</code></pre>
        </div>
      </div>
    </label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/voice-data-vlan-access-ports-sw11.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/switch-unknown-unicast-flood.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "D";
      var CORRECT_MSG =
        "Correct. D \u2014 VLAN 200\u2019s inside network in the exhibit is 192.168.100.32/27, so the standard ACE is permit 192.168.100.32 0.0.0.31. That matches only VLAN 200; VLAN 100 (192.168.100.0/27) is not in the list, so those devices are not translated. Option C\u2019s 192.168.100.0 0.0.0.255 would also translate VLAN 100. A and B use the public address in the permit (wrong for inside source list).";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="pat"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
