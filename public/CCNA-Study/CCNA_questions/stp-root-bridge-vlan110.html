<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — STP root bridge for VLAN 110</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: clamp(1.02rem, 2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: #e6edf3;
    }
    .exhibit {
      margin: 0 0 18px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d3b5a;
      background: #ffffff;
      text-align: center;
    }
    .exhibit img {
      display: block;
      width: 100%;
      max-width: min(100%, 720px);
      height: auto;
      margin: 0 auto;
    }
    .cli-exhibit {
      margin: 0 0 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e293b;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      background: #0a0e14;
    }
    .cli-exhibit-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: linear-gradient(180deg, #2a3344 0%, #1e2636 100%);
      border-bottom: 1px solid #0f1419;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .cli-exhibit-dots {
      display: flex;
      gap: 6px;
    }
    .cli-exhibit-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #475569;
    }
    .cli-exhibit-dots span:nth-child(1) {
      background: #ef4444;
    }
    .cli-exhibit-dots span:nth-child(2) {
      background: #eab308;
    }
    .cli-exhibit-dots span:nth-child(3) {
      background: #22c55e;
    }
    .cli-exhibit-title {
      flex: 1;
      text-align: center;
      padding-right: 46px;
      box-sizing: border-box;
    }
    .cli-exhibit-body {
      margin: 0;
      padding: 14px 16px 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.72rem, 1.65vw, 0.84rem);
      line-height: 1.5;
      color: #c8e6c9;
      background: #0a0e14;
      overflow-x: auto;
      white-space: pre;
      tab-size: 2;
      border-top: 1px solid #1e293b;
    }
    .cli-exhibit-body code {
      font: inherit;
      color: inherit;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="exhibit">
      <figcaption class="visually-hidden">
        Topology: HQ LAN with routers HQ1 and HQ2 each connected to Switch 1 and Switch 2; switches 1–4 in a ring with cross-links
        (Switch 1–2, 3–4, 1–3, 2–4).
      </figcaption>
      <img
        src="/CCNA-Study/CCNA_questions/stp-root-bridge-vlan110-topology.png"
        width="454"
        height="317"
        alt="HQ LAN: HQ1 and HQ2 connect to Switch 1 and Switch 2; four switches in a redundant square mesh."
        decoding="async"
        loading="lazy"
      />
    </figure>

    <figure class="cli-exhibit">
      <figcaption class="visually-hidden">
        Supplemental output: for VLAN 110, bridge priorities and base MAC addresses for Switch 1 through Switch 4.
      </figcaption>
      <div class="cli-exhibit-header">
        <div class="cli-exhibit-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="cli-exhibit-title">Switch — spanning-tree bridge IDs (VLAN 110)</div>
      </div>
      <pre class="cli-exhibit-body"><code>Switch 1
 VLAN 110 – 32778 0018.184e.3c00
Switch 2
 VLAN 110 – 24586 001a.e3ff.a680
Switch 3
 VLAN 110 – 28682 0022.55cf.cc00
Switch 4
 VLAN 110 – 64000 0e38.7363.657f</code></pre>
    </figure>

    <h1>Which switch becomes the root of the spanning tree for VLAN 110?</h1>

    <label class="choice"><input type="radio" name="stproot110" value="A" />A. Switch 1</label>
    <label class="choice"><input type="radio" name="stproot110" value="B" />B. Switch 2</label>
    <label class="choice"><input type="radio" name="stproot110" value="C" />C. Switch 3</label>
    <label class="choice"><input type="radio" name="stproot110" value="D" />D. Switch 4</label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/stp-bpduguard-portfast-errdisable.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/trunk-native-vlan-untagged.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG =
        "Correct. B \u2014 The root bridge has the lowest bridge ID. Compare the priority values first (24586 is lower than 28682, 32778, and 64000), so Switch 2 becomes the STP root for VLAN 110.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="stproot110"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
