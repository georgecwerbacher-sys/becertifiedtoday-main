    <h1>Refer to the exhibit. Which configuration establishes a Layer 2 LACP EtherChannel when applied to both switches?</h1>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="ecagg651" value="A" aria-label="Select answer option A" />
        <span class="cli-router-choice-badge" aria-hidden="true">A</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">A. interface range G1/1-3
switchport mode access
channel-group 1 mode passive
no shutdown</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="ecagg651" value="B" aria-label="Select answer option B" />
        <span class="cli-router-choice-badge" aria-hidden="true">B</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">B. interface range G1/1-3
switchport mode trunk
channel-group 1 mode desirable
no shutdown</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="ecagg651" value="C" aria-label="Select answer option C" />
        <span class="cli-router-choice-badge" aria-hidden="true">C</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">C. interface range G1/1-3
switchport mode trunk
channel-group 1 mode active
no shutdown</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="ecagg651" value="D" aria-label="Select answer option D" />
        <span class="cli-router-choice-badge" aria-hidden="true">D</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">D. interface range G1/1-3
switchport mode access
channel-group 1 mode on
no shutdown</pre>
    </label>

  <script>
    (function () {
      var CORRECT = "C";
      var CORRECT_MSG = "Correct. C \u2014 LACP (IEEE 802.3ad) uses channel-group mode active or passive. Applying mode active on both ends forms a negotiated LACP bundle. A switch-to-switch aggregate that carries multiple VLANs is normally a trunk. A is wrong because passive on both sides does not bring LACP up (each side waits for LACP messages from a partner). B uses mode desirable, which is PAgP, not LACP. D uses mode on, which is a static EtherChannel with no LACP negotiation.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="ecagg651"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="ecagg651"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
