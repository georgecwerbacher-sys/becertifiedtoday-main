  <title>CCNA — Voice and data VLANs on access ports</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: clamp(1.02rem, 2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: #e6edf3;
    }
    .exhibit {
      margin: 0 0 18px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d3b5a;
      background: #ffffff;
      text-align: center;
    }
    .exhibit img {
      display: block;
      width: 50%;
      max-width: 320px;
      height: auto;
      margin: 0 auto;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;

      cursor: pointer;

    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice-cli {
      padding: 12px 14px;
    }
    .choice-cli-inner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .choice-cli-inner > input {
      flex-shrink: 0;
      margin-top: 4px;
      margin-right: 0;
    }
    .choice-cli-body {
      flex: 1;
      min-width: 0;
    }
    .choice-cli-letter {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #e6edf3;
    }
    .cli-config-snippet code {
      font: inherit;
      color: inherit;
    }
    .cli-config-snippet {
      margin: 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0a0e14;
      border: 1px solid #1e293b;
      color: #c8e6c9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.68rem, 1.5vw, 0.8rem);
      line-height: 1.45;
      white-space: pre;
      overflow-x: auto;
      text-align: left;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;

    .home-link {
      margin-left: auto;

      border-radius: 10px;

      border: 1px solid #1f7a58;
    }

      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="exhibit">
      <figcaption class="visually-hidden">
        Exhibit: VLAN 8 Data and VLAN 9 Voice. Switch SW11 Gi1/1 to PC-2; Gi1/3 to Phone-1 with PC-1 connected behind the phone.
      </figcaption>
      <img
        src="/CCNA-Study/CCNA_questions/voice-data-vlan-access-ports-sw11-topology.png"
        width="192"
        height="254"
        alt="SW11: Gi1/1 to PC-2; Gi1/3 to IP Phone-1; PC-1 daisy-chained to Phone-1. VLAN 8 Data, VLAN 9 Voice."
        decoding="async"
        loading="lazy"
      />
    </figure>

    <h1>
      An administrator must configure interfaces Gi1/1 and Gi1/3 on switch SW11. PC-1 and PC-2 must be placed in the Data VLAN and
      Phone-1 must be placed in the Voice VLAN. Which configuration meets these requirements?
    </h1>

    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="voicevlan" value="A" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">A.</span>
          <pre class="cli-config-snippet"><code>interface GigabitEthernet1/1
 switchport mode access
 switchport access vlan 8
!
interface GigabitEthernet1/3
 switchport mode access
 switchport access vlan 9
 switchport voice vlan 8</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="voicevlan" value="B" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">B.</span>
          <pre class="cli-config-snippet"><code>interface GigabitEthernet1/1
 switchport mode access
 switchport access vlan 9
!
interface GigabitEthernet1/3
 switchport mode trunk
 switchport voice vlan 8
 switchport access vlan 9</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="voicevlan" value="C" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">C.</span>
          <pre class="cli-config-snippet"><code>interface GigabitEthernet1/1
 switchport mode access
 switchport access vlan 8
!
interface GigabitEthernet1/3
 switchport mode access
 switchport access vlan 8
 switchport voice vlan 9</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="voicevlan" value="D" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">D.</span>
          <pre class="cli-config-snippet"><code>interface GigabitEthernet1/1
 switchport mode access
 switchport access vlan 8
!
interface GigabitEthernet1/3
 switchport mode trunk
 switchport voice vlan 8
 switchport access vlan 9</code></pre>
        </div>
      </div>
    </label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/ios-dns-lookup-default-behavior.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/pat-vlan200-inside-source-overload.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "C";
      var CORRECT_MSG =
        "Correct. C \u2014 Gi1/1 is access VLAN 8 for PC-1 (data). Gi1/3 is access with access VLAN 8 for PC-2 and voice VLAN 9 for the IP phone. Option A reverses data/voice VLANs on Gi1/3. B and D use switchport mode trunk on Gi1/3 instead of the usual access + voice VLAN pattern.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="voicevlan"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
