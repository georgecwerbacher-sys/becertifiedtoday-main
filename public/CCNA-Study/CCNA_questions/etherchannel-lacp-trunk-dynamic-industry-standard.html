<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — LACP trunk EtherChannel dynamic</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    h1.choose-two-stem {
      line-height: 1.5;
    }
    .stem-after-exhibit {
      margin: 12px 0 6px;
      font-size: clamp(1.02rem, 1.9vw, 1.32rem);
      line-height: 1.42;
      font-weight: 600;
      color: #e6edf3;
    }
    .stem-after-exhibit-list {
      margin: 8px 0 12px;
      padding-left: 1.35rem;
      font-size: clamp(1.02rem, 1.9vw, 1.32rem);
      line-height: 1.45;
      font-weight: 600;
      color: #e6edf3;
    }
    .stem-after-exhibit-list li {
      margin: 6px 0;
    }
    .stem-after-exhibit-tail {
      margin-top: 10px;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono.cli-router-choice {
      display: flex;
      flex-direction: column;
      padding: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a3f5c;
      background: linear-gradient(180deg, rgba(26, 37, 59, 0.95), rgba(10, 16, 28, 0.98));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .cli-router-choice-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(15, 22, 40, 0.95);
      border-bottom: 1px solid #2a3f5c;
    }
    .cli-router-choice-controls input {
      margin-right: 0;
      transform: none;
      flex-shrink: 0;
    }
    .cli-router-choice-badge {
      flex: 0 0 auto;
      min-width: 1.5rem;
      text-align: center;
      padding: 2px 7px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 0.78rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: rgba(37, 75, 138, 0.55);
      border: 1px solid rgba(93, 140, 220, 0.45);
      color: #e6edf3;
    }
    .cli-router-choice-title {
      flex: 1 1 auto;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8b9cc4;
    }
    pre.cli-router-console {
      margin: 0;
      padding: 12px 14px;
      background: #060a11;
      color: #c8dcf0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.42;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      border-left: 3px solid #c9a227;
      min-height: 2rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
    .exhibit-stack {
      margin: 14px 0 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    figure.exhibit-photo {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #2d3b5a;
      overflow: hidden;
      background: #0d1320;
    }
    figure.exhibit-photo img {
      width: 100%;
      height: auto;
      vertical-align: middle;
      display: block;
    }
    figure.exhibit-photo figcaption {
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #8b9cc4;
      border-top: 1px solid #2d3b5a;
      background: #0f1628;
    }
    .cli-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px) {
      .cli-grid.two-cols {
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
      }
    }
    .cli-device {
      border-radius: 10px;
      border: 1px solid #2d3b5a;
      background: #0d1320;
      overflow: hidden;
      min-height: 0;
    }
    .cli-device h2 {
      margin: 0;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: #1a253b;
      border-bottom: 1px solid #2d3b5a;
      color: #b6c8e8;
    }
    .cli-device pre {
      margin: 0;
      padding: 12px 14px;
      font-size: 0.72rem;
      line-height: 1.4;
      overflow-x: auto;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #e6edf3;
    }
    .cli-device pre + pre {
      border-top: 1px solid #2d3b5a;
    }
    .exhibit-terminal-white {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #b8b8b8;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }
    .exhibit-terminal-white pre {
      margin: 0;
      padding: 14px 16px;
      font-size: 0.78rem;
      line-height: 1.45;
      overflow-x: auto;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #0a0a0a;
      background: #ffffff;
      tab-size: 8;
    }
    .exhibit-router-cli {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      background: #0a0a0a;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 4px 18px rgba(0, 0, 0, 0.45);
    }
    .exhibit-router-cli pre {
      margin: 0;
      padding: 14px 16px;
      font-size: 0.72rem;
      line-height: 1.42;
      overflow-x: auto;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #f0f0f0;
      background: #0a0a0a;
      tab-size: 8;
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <h1>Refer to the exhibit.</h1>
    <div class="exhibit-stack">
      <figure class="exhibit-photo">
        <img src="/CCNA-Study/CCNA_questions/etherchannel-lacp-trunk-dynamic-industry-standard-topology.png" alt="Topology: R1, SW1, SW2 with Po1 between switches and PCs in VLANs 6, 14, 77, 108, 109" width="980" decoding="async" loading="lazy" />
      </figure>
    </div>
    <p class="stem-after-exhibit">Which configuration enables an EtherChannel to form dynamically between SW1 and SW2 by using an industry-standard protocol, and to support full IP connectivity between all PCs?</p>
    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="echlacptr1" value="A" aria-label="Select answer option A" />
        <span class="cli-router-choice-badge" aria-hidden="true">A</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">A. Option A

SW1#
interface Gi0/1
switchport
switchport mode trunk
channel-group 1 mode on
!
interface Gi0/2
switchport
switchport mode trunk
channel-group 1 mode auto

SW2#
interface Gi0/1
switchport
switchport mode trunk
channel-group 1 mode auto
!
interface Gi0/2
switchport
switchport mode trunk
channel-group 1 mode on
interface port-channel 1
switchport
switchport mode trunk</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="echlacptr1" value="B" aria-label="Select answer option B" />
        <span class="cli-router-choice-badge" aria-hidden="true">B</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">B. Option B

SW1#
interface Gi0/1
switchport
switchport mode trunk
channel-group 1 mode auto
!
interface Gi0/2
switchport
switchport mode access
channel-group 1 mode active

SW2#
interface gi0/1
switchport
switchport mode access
channel-group 1 mode desirable
!
interface Gi0/2
switchport
switchport mode access
channel-group 1 mode desirable</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="echlacptr1" value="C" aria-label="Select answer option C" />
        <span class="cli-router-choice-badge" aria-hidden="true">C</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">C. Option C

SW1#
interface Gi0/1
switchport
switchport mode trunk
channel-group 1 mode active
!
interface Gi0/2
switchport
switchport mode trunk
channel-group 1 mode active

SW2#
interface Gi0/1
switchport
switchport mode trunk
channel-group 1 mode passive
!
interface Gi0/2
switchport
switchport mode trunk
channel-group 1 mode passive</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="echlacptr1" value="D" aria-label="Select answer option D" />
        <span class="cli-router-choice-badge" aria-hidden="true">D</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">D. Option D

SW1#
interface Gi0/1
switchport
switchport mode access
channel-group 1 mode active
!
interface Gi0/2
switchport
switchport mode access
channel-group 1 mode active

SW2#
interface Gi0/1
switchport
switchport mode access
channel-group 1 mode desirable
!
interface Gi0/2
switchport
switchport mode access
channel-group 1 mode desirable</pre>
    </label>


    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/etherchannel-lacp-active-switch2.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/wireless-auth-layer2.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "C";
      var CORRECT_MSG = "Correct. C \u2014 The topology places hosts in different VLANs on either side of SW1\u2013SW2, so Po1 must be an 802.1Q trunk to carry those VLANs toward R1 for inter-VLAN routing. IEEE 802.3ad LACP is the industry-standard negotiation protocol for a dynamic EtherChannel; active on SW1 with passive on SW2 forms the bundle. Option A relies on mode on (no LACP negotiation) and PAgP auto (Cisco PAgP), not LACP. Option B puts trunk and access ports in the same channel-group (incompatible member parameters) and mixes PAgP auto with desirable rather than LACP. Option D mixes LACP active on SW1 with PAgP desirable on SW2, so the protocols do not match and the channel will not form reliably.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="echlacptr1"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
