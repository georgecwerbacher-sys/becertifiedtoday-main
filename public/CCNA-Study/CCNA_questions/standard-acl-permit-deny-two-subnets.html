<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — Standard ACL for two interfaces</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: clamp(1.02rem, 2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: #e6edf3;
    }
    .exhibit {
      margin: 0 0 18px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d3b5a;
      background: #ffffff;
      text-align: center;
    }
    .exhibit img {
      display: block;
      width: 100%;
      max-width: min(100%, 640px);
      height: auto;
      margin: 0 auto;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .choice-cli {
      padding: 12px 14px;
    }
    .choice-cli-inner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .choice-cli-inner > input {
      flex-shrink: 0;
      margin-top: 4px;
      margin-right: 0;
    }
    .choice-cli-body {
      flex: 1;
      min-width: 0;
    }
    .choice-cli-letter {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #e6edf3;
    }
    .cli-config-snippet code {
      font: inherit;
      color: inherit;
    }
    .cli-config-snippet {
      margin: 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0a0e14;
      border: 1px solid #1e293b;
      color: #c8e6c9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.68rem, 1.5vw, 0.8rem);
      line-height: 1.45;
      white-space: pre;
      overflow-x: auto;
      text-align: left;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="exhibit">
      <figcaption class="visually-hidden">
        Router with Gi0/0 connected to subnet 10.100.100.0/24 and Gi0/1 connected to subnet 192.168.0.0/16.
      </figcaption>
      <img
        src="/CCNA-Study/CCNA_questions/standard-acl-permit-deny-two-subnets-topology.png"
        width="352"
        height="202"
        alt="Router with Gi0/0 to 10.100.100.0/24 and Gi0/1 to 192.168.0.0/16."
        decoding="async"
        loading="lazy"
      />
    </figure>

    <h1>
      An access list is required to permit traffic from any host on interface G0/0 and deny traffic from interface Gi0/1. Which
      access list must be applied?
    </h1>

    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="stdacl" value="A" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">A.</span>
          <pre class="cli-config-snippet"><code>ip access-list standard 99
 permit 10.100.100.0 0.0.0.255
 deny 192.168.0.0 0.0.255.255</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="stdacl" value="B" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">B.</span>
          <pre class="cli-config-snippet"><code>ip access-list standard 99
 permit 10.100.100.0 0.0.0.255
 deny 192.168.0.0 0.255.255.255</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="stdacl" value="C" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">C.</span>
          <pre class="cli-config-snippet"><code>ip access-list standard 100
 permit 10.100.100.0 0.0.0.255
 deny 192.168.0.0 0.255.255.255</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="stdacl" value="D" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">D.</span>
          <pre class="cli-config-snippet"><code>ip access-list standard 199
 permit 10.100.100.0 0.0.0.255
 deny 192.168.0.0 0.0.255.255</code></pre>
        </div>
      </div>
    </label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/snmp-trap-mib-requirement.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/netconf-xml-filter-get-config.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "A";
      var CORRECT_MSG = "Correct. A \u2014 Option A uses ACL 99 (valid standard range), permits 10.100.100.0/24, and denies 192.168.0.0 0.0.255.255 (all 192.168.x.x). Option B\u2019s wildcard 0.255.255.255 matches all 192.0.0.0/8, which is too broad. Option C uses standard ACL 100 (invalid\u2014100\u2013199 is extended). Option D uses 199 in the extended range as \u201cstandard,\u201d which is invalid.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="stdacl"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
