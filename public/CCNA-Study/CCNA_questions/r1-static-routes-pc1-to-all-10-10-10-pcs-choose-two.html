    <h1 class="choose-two-stem">Refer to the exhibit. The router R1 is in the process of being configured. Routers R2 and R3 are configured correctly for the new environment. Which two commands must be configured on R1 for PC1 to communicate to all PCs on the 10.10.10.0/24 network? (Choose two)</h1>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="checkbox" name="r1pc1010routes1" value="A" aria-label="Select answer option A" />
        <span class="cli-router-choice-badge" aria-hidden="true">A</span>
        <span class="cli-router-choice-title">Switch CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">A. ip route 10.10.10.8 255.255.255.248 g0/1</pre>
    </label>

    <label class="choice mono cli-router-choice">

        <span class="cli-router-choice-title">Switch CLI — candidate config</span>
      </span>

  <script>
    (function () {
      var CORRECT = ["D", "E"];
      var CORRECT_MSG = "Correct. D and E \u2014 R1 can use a general route for 10.10.10.0/24 through R2 at 192.168.2.3 to reach PC2, PC3, and PC4. PC5 at 10.10.10.10 is behind R3, so the more specific host route to 10.10.10.10/32 through 192.168.2.2 overrides the /24 route by longest-prefix match. A and B use only the outbound interface on a multiaccess segment and do not provide the complete set of routes. C sends 10.10.10.0/29 toward R3, which is the wrong next hop for the lower addresses behind R2.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      function selectedValues() {
        return []
          .slice.call(document.querySelectorAll('input[name="r1pc1010routes1"]:checked'))
          .map(function (el) { return el.value; })
          .sort();
      }

      function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        return a.every(function (v, i) { return v === b[i]; });
      }

      checkBtn.addEventListener("click", function () {
        var sel = selectedValues();
        answerBox.style.display = "block";
        if (sel.length !== 2) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Choose exactly two answers.";
          return;
        }
        if (arraysEqual(sel, CORRECT)) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        CORRECT.forEach(function (value) {
          var input = document.querySelector('input[name="r1pc1010routes1"][value="' + value + '"]');
          if (input) input.checked = true;
        });
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
