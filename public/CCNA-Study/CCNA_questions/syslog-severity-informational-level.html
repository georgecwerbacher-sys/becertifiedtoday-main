<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — Syslog severity informational</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .choice-cli {
      padding: 12px 14px;
    }
    .choice-cli-inner {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .choice-cli-inner > input {
      flex-shrink: 0;
      margin-top: 4px;
      margin-right: 0;
    }
    .choice-cli-body {
      flex: 1;
      min-width: 0;
    }
    .choice-cli-letter {
      display: block;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #e6edf3;
    }
    .cli-config-snippet {
      margin: 0;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0a0e14;
      border: 1px solid #1e293b;
      color: #c8e6c9;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.72rem, 1.6vw, 0.85rem);
      line-height: 1.45;
      white-space: pre;
      overflow-x: auto;
      text-align: left;
    }
    .cli-config-snippet code {
      font: inherit;
      color: inherit;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <h1>When deploying syslog, which severity level logs an informational message?</h1>

    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="slogsev" value="A" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">A.</span>
          <pre class="cli-config-snippet"><code>logging trap emergencies
! severity 0</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="slogsev" value="B" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">B.</span>
          <pre class="cli-config-snippet"><code>logging trap critical
! severity 2</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="slogsev" value="C" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">C.</span>
          <pre class="cli-config-snippet"><code>logging trap warnings
! severity 4</code></pre>
        </div>
      </div>
    </label>
    <label class="choice choice-cli">
      <div class="choice-cli-inner">
        <input type="radio" name="slogsev" value="D" />
        <div class="choice-cli-body">
          <span class="choice-cli-letter">D.</span>
          <pre class="cli-config-snippet"><code>logging trap informational
! severity 6</code></pre>
        </div>
      </div>
    </label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/ap-switch-poe-cdp-discovery.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/dtp-dynamic-auto-passive-trunk.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "D";
      var CORRECT_MSG = "Correct. D \u2014 Severity 6 is informational (0 emergency \u2026 7 debug). 0 is emergency; 2 is critical; 4 is warning.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="slogsev"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
