<body class="ccna-question-ui">

  <div class="question-shell">
    <a class="site-logo-corner" href="/CCNA-Study/CCNA_Training_Portal.html" aria-label="CCNA training portal">
      <img src="/images/logo/becertifiedtoday_logo_image_trans.png" width="52" height="52" alt="Be Certified Today" />
    </a>
    <main class="card">
    <nav class="question-nav" aria-label="Question navigation">
      <div class="question-nav-links">
      <a class="nav-link nav-prev" href="/CCNA-Study/CCNA_questions/etherchannel-lacp-active-active.html">Back</a>
      <a class="nav-link nav-home" href="/CCNA-Study/CCNA_Training_Portal.html">Home</a>

      </div>

    <h1 class="choose-two-stem">Aside from discarding, which two states does the switch port transition through while using RSTP (802.1w)? (Choose two)</h1>

    <label class="choice"><input type="checkbox" name="rstp" value="A" />A. listening</label>

    <label class="choice"><input type="checkbox" name="rstp" value="B" />B. blocking</label>

    <label class="choice"><input type="checkbox" name="rstp" value="C" />C. forwarding</label>

    <label class="choice"><input type="checkbox" name="rstp" value="D" />D. learning</label>

    <label class="choice"><input type="checkbox" name="rstp" value="E" />E. speaking</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>
    <div id="answerBox" class="answer" aria-live="polite"></div>
    </main>
  </div>
  <script>
    (function () {
      var CORRECT = ["C", "D"];
      var CORRECT_MSG = "Correct. C and D. RSTP (802.1w) defines three port states: discarding, learning, and forwarding. Listening and blocking from classic STP are folded into discarding. Speaking is not an STP/RSTP port state.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      function selectedValues() {
        return []
          .slice.call(document.querySelectorAll('input[name="rstp"]:checked'))
          .map(function (el) { return el.value; })
          .sort();
      }

      function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        return a.every(function (v, i) { return v === b[i]; });
      }

      checkBtn.addEventListener("click", function () {
        var sel = selectedValues();
        answerBox.style.display = "block";
        if (sel.length !== 2) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Choose exactly two answers.";
          return;
        }
        if (arraysEqual(sel, CORRECT)) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        CORRECT.forEach(function (value) {
          var input = document.querySelector('input[name="rstp"][value="' + value + '"]');
          if (input) input.checked = true;
        });
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
