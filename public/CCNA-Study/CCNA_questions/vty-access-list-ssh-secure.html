<body>
  <script src="/js/sample-url-mask-apply.js"></script>

  <main class="card">
    <nav class="question-nav" aria-label="Question navigation">

    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="cli-exhibit">
      <figcaption class="visually-hidden">
        Exhibit: extended ACL 101 entries and interface Ethernet0/0 with IP 10.1.1.25 and ip access-group 101 applied inbound.
      </figcaption>
      <div class="cli-exhibit-header">
        <div class="cli-exhibit-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="cli-exhibit-title">Router — running configuration (partial)</div>
      </div>
      <pre class="cli-exhibit-body"><code>access-list 101 permit ospf any any
access-list 101 permit tcp any any eq 179
access-list 101 permit tcp any eq 179 any
access-list 101 permit gre any any
access-list 101 permit esp any any

access-list 101 deny ospf any any
access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq telnet
access-list 101 permit udp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq 500
access-list 101 permit udp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq 4500
access-list 101 deny ip any any log

interface Ethernet0/0
 ip address 10.1.1.25 255.255.255.0
 ip access-group 101 in</code></pre>
    </figure>

    <h1>
      A network administrator has been tasked with securing VTY access to a router. Which access-list entry accomplishes this task?
      (All choices use the same source and destination as the management-style Telnet line in the exhibit.)
    </h1>

    <label class="choice"
      ><input type="radio" name="vtyacl" value="A" />A. access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq
      ssh</label
    >
    <label class="choice"
      ><input type="radio" name="vtyacl" value="B" />B. access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq
      scp</label
    >
    <label class="choice"
      ><input type="radio" name="vtyacl" value="C" />C. access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq
      telnet</label
    >
    <label class="choice"
      ><input type="radio" name="vtyacl" value="D" />D. access-list 101 permit tcp 10.1.1.0 0.0.0.255 172.16.1.0 0.0.0.255 eq
      https</label
    >
<div id="answerBox" class="answer" aria-live="polite"></div>
</main>

  <script>
    (function () {
      var CORRECT = "A";
      var CORRECT_MSG =
        "Correct. A \u2014 The exhibit permits cleartext Telnet from 10.1.1.0/24 to 172.16.1.0/24; that does not secure management. Securing remote CLI means SSH (TCP 22, eq ssh), not Telnet (C), HTTPS for the web UI (D), or SCP alone (B). Use this style of ACE with VTY access-class in, or replace the insecure Telnet line in a similar edge filter.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="vtyacl"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });

    })();
  </script>
