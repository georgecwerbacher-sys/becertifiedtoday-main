  <main class="card">
    <nav class="question-nav" aria-label="Question navigation">

    <h1>After a recent security breach and a RADIUS failure, an engineer must secure the console port of each enterprise router with a local username and password. Which configuration must the engineer apply to accomplish this task?</h1>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="aaconl1" value="A" aria-label="Select answer option A" />
        <span class="cli-router-choice-badge" aria-hidden="true">A</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">A. Option A

aaa new-model
aaa authorization exec default local
aaa authentication login default radius
username localuser privilege 15 secret plaintextpassword</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="aaconl1" value="B" aria-label="Select answer option B" />
        <span class="cli-router-choice-badge" aria-hidden="true">B</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">B. Option B

username localuser secret plaintextpassword
line con 0
login authentication default
privilege level 15</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="aaconl1" value="C" aria-label="Select answer option C" />
        <span class="cli-router-choice-badge" aria-hidden="true">C</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">C. Option C

username localuser secret plaintextpassword
line con 0
no login local
privilege level 15</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="aaconl1" value="D" aria-label="Select answer option D" />
        <span class="cli-router-choice-badge" aria-hidden="true">D</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">D. Option D

aaa new-model
line con 0
password plaintextpassword
privilege level 15</pre>
    </label>


    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG = "Correct. B \u2014 The engineer must define a local user (`username ... secret`) and apply AAA-style login on `line con 0` so the console checks those credentials. `privilege level 15` sets the default exec privilege on that line.\n\nA turns on AAA but points `aaa authentication login default` at RADIUS only (no local fallback shown) and never configures `line con 0`, so it does not deliver console protection with local credentials as requested. C uses `no login local`, which works against local console login. D sets only a console line password and never creates the required `username` entry.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="aaconl1"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
