<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — T1 line rate</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .stem-note {
      margin: 0 0 18px;
      color: #b8c3d6;
      font-size: 0.95rem;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <main class="card">
    <h1>What is the maximum bandwidth of a T1 point-to-point connection?</h1>
    <p class="stem-note">Question 17 of 24 · Select one answer, then click Check answer.</p>

    <label class="choice"><input type="radio" name="t1" value="A" />A. 1.544 Mbps</label>
    <label class="choice"><input type="radio" name="t1" value="B" />B. 2.048 Mbps</label>
    <label class="choice"><input type="radio" name="t1" value="C" />C. 34.368 Mbps</label>
    <label class="choice"><input type="radio" name="t1" value="D" />D. 43.7 Mbps</label>

    <div class="actions">
      <button id="checkBtn" type="button">Check answer</button>
      <button id="resetBtn" type="button">Reset</button>
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/trunk-native-vlan-untagged.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/wireless-rrm-channel-overlap.html">Next question</a>
      <a class="next-link" href="/CCNA-Study/ccna-index.html">Back to CCNA study</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "A";
      var checkBtn = document.getElementById("checkBtn");
      var resetBtn = document.getElementById("resetBtn");
      var answerBox = document.getElementById("answerBox");

      function selectedValue() {
        var el = document.querySelector('input[name="t1"]:checked');
        return el ? el.value : null;
      }

      checkBtn.addEventListener("click", function () {
        var sel = selectedValue();
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = "Correct. A — T1 is 1.544 Mbps. 2.048 Mbps is E1; 34.368 Mbps is in the E3 range; ~44 Mbps is T3 territory.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      resetBtn.addEventListener("click", function () {
        document.querySelectorAll('input[name="t1"]').forEach(function (el) {
          el.checked = false;
        });
        answerBox.style.display = "none";
        answerBox.textContent = "";
      });
    })();
  </script>
</body>
</html>
