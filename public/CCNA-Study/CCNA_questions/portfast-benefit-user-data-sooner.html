<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — Benefit of PortFast</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <main class="card">
    <h1>What is the benefit of configuring PortFast on an interface?</h1>

    <label class="choice"><input type="radio" name="pfben" value="A" />A. After the cable is connected, the interface uses the fastest speed setting available for that cable type</label>
    <label class="choice"><input type="radio" name="pfben" value="B" />B. The frames entering the interface are marked with higher priority and then processed faster by a switch</label>
    <label class="choice"><input type="radio" name="pfben" value="C" />C. After the cable is connected, the interface is available faster to send and receive user data</label>
    <label class="choice"><input type="radio" name="pfben" value="D" />D. Real-time voice and video frames entering the interface are processed faster</label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/firewall-role-untrusted-to-trusted.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/vlan-hopping-mitigation-dtp-trunk.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "C";
      var CORRECT_MSG = "Correct. C \u2014 PortFast lets an access port move to STP forwarding quickly so user traffic can flow soon after link up. It does not change cable speed negotiation, QoS marking, or special handling for voice/video by itself.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="pfben"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
