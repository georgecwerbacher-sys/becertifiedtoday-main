<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — ARP broadcast on a switch</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: clamp(1.02rem, 2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: #e6edf3;
    }
    .exhibit {
      margin: 0 0 18px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2d3b5a;
      background: #ffffff;
      text-align: center;
    }
    .exhibit img {
      display: block;
      width: 100%;
      max-width: min(100%, 640px);
      height: auto;
      margin: 0 auto;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="exhibit">
      <figcaption class="visually-hidden">
        Topology: switch S1 with GigabitEthernet0/0 to PC1, G0/1 to PC2, G0/2 to switch S2, and G0/3 to an uplink; switch S2 connects to PC3 and PC4.
      </figcaption>
      <img
        src="/CCNA-Study/CCNA_questions/arp-first-ping-switch-flood-topology.png"
        width="454"
        height="219"
        alt="Topology: S1 with G0/0 to PC1, G0/1 to PC2, G0/2 to S2, G0/3 uplink; S2 to PC3 and PC4."
        decoding="async"
        loading="lazy"
      />
    </figure>

    <h1>
      PC1 is trying to ping PC3 for the first time and sends out an ARP to S1. Which action is taken by S1? (Assume PC1 is on the port
      excluded in the correct answer.)
    </h1>

    <label class="choice"><input type="radio" name="arpf" value="A" />A. It forwards it out G0/3 only</label>
    <label class="choice"><input type="radio" name="arpf" value="B" />B. It is flooded out every port except G0/0</label>
    <label class="choice"><input type="radio" name="arpf" value="C" />C. It drops the frame</label>
    <label class="choice"><input type="radio" name="arpf" value="D" />D. It forwards it out interface G0/2 only</label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/dhcp-relay-dhcpdiscover.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/stp-bpduguard-portfast-errdisable.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG = "Correct. B \u2014 An ARP request is a Layer 2 broadcast. The switch floods it out all other ports in the same VLAN except the ingress port. Pick the option that matches flooding with the exhibit\u2019s ingress port excluded.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="arpf"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
