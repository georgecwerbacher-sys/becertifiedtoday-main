    <h1>Where are the real-time control functions processed in a split MAC architecture?</h1>

    <label class="choice"><input type="radio" name="splitmac1" value="A" />A. central WLC</label>

    <label class="choice"><input type="radio" name="splitmac1" value="B" />B. individual AP</label>

    <label class="choice"><input type="radio" name="splitmac1" value="C" />C. centralized cloud management platform</label>

    <label class="choice"><input type="radio" name="splitmac1" value="D" />D. client device</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>
    <div id="answerBox" class="answer" aria-live="polite"></div>
    </main>
  </div>
  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG = "Correct. B \u2014 In split-MAC (lightweight AP + WLC), time-sensitive 802.11 MAC work stays on the individual AP (beacons, probes, acknowledgments, and similar real-time radio/MAC tasks). The WLC centralizes non\u2013real-time control: WLAN/SSID policy, security, roaming coordination, and RF profiles over CAPWAP. A is where management/control-plane decisions are made, not the real-time MAC functions named here. C may host management UI or orchestration but is not where on-air real-time MAC runs. D is the client, not the infrastructure split point.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="splitmac1"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="splitmac1"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
