    <nav class="question-nav" aria-label="Question navigation">
      <div class="question-nav-links">

      </div>
    </nav>
    <h1 class="choose-two-stem">What are two capabilities provided by VRRP within a LAN network? (Choose two.)</h1>

    <label class="choice"><input type="checkbox" name="vrrpcap1" value="A" />A. load sharing</label>
    <label class="choice"><input type="checkbox" name="vrrpcap1" value="B" />B. bandwidth optimization</label>
    <label class="choice"><input type="checkbox" name="vrrpcap1" value="C" />C. dynamic routing updates</label>
    <label class="choice"><input type="checkbox" name="vrrpcap1" value="D" />D. redundancy</label>
    <label class="choice"><input type="checkbox" name="vrrpcap1" value="E" />E. granular QoS</label>

    <div class="answer-actions">
      <button id="checkBtn" type="button" class="nav-check">Check answer</button>
    </div>
    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      var CORRECT = ["A", "D"];
      var checkBtn = document.getElementById("checkBtn");
      var answerBox = document.getElementById("answerBox");

      function selectedValues() {
        return []
          .slice.call(document.querySelectorAll('input[name="vrrpcap1"]:checked'))
          .map(function (el) { return el.value; })
          .sort();
      }

      function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        return a.every(function (v, i) { return v === b[i]; });
      }

      checkBtn.addEventListener("click", function () {
        var sel = selectedValues();
        answerBox.style.display = "block";
        if (sel.length !== 2) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Choose exactly two answers.";
          return;
        }
        if (arraysEqual(sel, CORRECT)) {
          answerBox.className = "answer correct";
          answerBox.textContent = "Correct. A and D \u2014 VRRP provides default-gateway redundancy: if the master router fails, a backup assumes the virtual IP/MAC so LAN hosts keep connectivity. Load sharing (A) is supported by using multiple VRRP groups so different routers can be master for different virtual routers, spreading gateway traffic. Bandwidth optimization (B), dynamic routing updates (C), and granular QoS (E) are not VRRP functions\u2014those belong to WAN design, routing protocols, and QoS policy respectively.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });
    })();
  </script>
