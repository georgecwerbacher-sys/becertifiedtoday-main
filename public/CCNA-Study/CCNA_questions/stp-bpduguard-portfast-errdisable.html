<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA — BPDU Guard and err-disable</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: clamp(1.02rem, 2vw, 1.35rem);
      font-weight: 700;
      line-height: 1.35;
      color: #e6edf3;
    }
    .cli-exhibit {
      margin: 0 0 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e293b;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45);
      background: #0a0e14;
    }
    .cli-exhibit-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: linear-gradient(180deg, #2a3344 0%, #1e2636 100%);
      border-bottom: 1px solid #0f1419;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #94a3b8;
    }
    .cli-exhibit-dots {
      display: flex;
      gap: 6px;
    }
    .cli-exhibit-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #475569;
    }
    .cli-exhibit-dots span:nth-child(1) {
      background: #ef4444;
    }
    .cli-exhibit-dots span:nth-child(2) {
      background: #eab308;
    }
    .cli-exhibit-dots span:nth-child(3) {
      background: #22c55e;
    }
    .cli-exhibit-title {
      flex: 1;
      text-align: center;
      padding-right: 46px;
      box-sizing: border-box;
    }
    .cli-exhibit-body {
      margin: 0;
      padding: 14px 16px 16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.72rem, 1.65vw, 0.84rem);
      line-height: 1.5;
      color: #c8e6c9;
      background: #0a0e14;
      overflow-x: auto;
      white-space: pre;
      tab-size: 2;
      border-top: 1px solid #1e293b;
    }
    .cli-exhibit-body code {
      font: inherit;
      color: inherit;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.95rem;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <p class="exhibit-ref">Refer to the exhibit.</p>

    <figure class="cli-exhibit">
      <figcaption class="visually-hidden">
        Exhibit: interface GigabitEthernet1/11 in access mode with spanning-tree portfast and spanning-tree bpduguard enabled.
      </figcaption>
      <div class="cli-exhibit-header">
        <div class="cli-exhibit-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="cli-exhibit-title">Switch — interface configuration (partial)</div>
      </div>
      <pre class="cli-exhibit-body"><code>interface GigabitEthernet1/11
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable</code></pre>
    </figure>

    <h1>What is the result if Gig1/11 receives an STP BPDU?</h1>

    <label class="choice"><input type="radio" name="bpdug" value="A" />A. The port transitions to STP blocking</label>
    <label class="choice"><input type="radio" name="bpdug" value="B" />B. The port transitions to the root port</label>
    <label class="choice"><input type="radio" name="bpdug" value="C" />C. The port immediately transitions to STP forwarding</label>
    <label class="choice"><input type="radio" name="bpdug" value="D" />D. The port goes into error-disable state</label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/CCNA-Study/CCNA_questions/arp-first-ping-switch-flood.html">Previous question</a>
      <a class="next-link" href="/CCNA-Study/CCNA_questions/stp-root-bridge-vlan110.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var CORRECT = "D";
      var CORRECT_MSG = "Correct. D \u2014 BPDU Guard on a PortFast access port treats an incoming BPDU as an error and puts the port into err-disabled. It does not simply transition to normal STP blocking as the primary outcome.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="bpdug"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
</html>
