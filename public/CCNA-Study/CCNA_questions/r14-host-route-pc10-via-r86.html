<!doctype html>

<head>

  <title>CCNA — R14 host route to PC 10</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    h1.choose-two-stem {
      line-height: 1.5;
    }
    .stem-after-exhibit {
      margin: 12px 0 6px;
      font-size: clamp(1.02rem, 1.9vw, 1.32rem);
      line-height: 1.42;
      font-weight: 600;
      color: #e6edf3;
    }
    .stem-after-exhibit-list {
      margin: 8px 0 12px;
      padding-left: 1.35rem;
      font-size: clamp(1.02rem, 1.9vw, 1.32rem);
      line-height: 1.45;
      font-weight: 600;
      color: #e6edf3;
    }
    .stem-after-exhibit-list li {
      margin: 6px 0;
    }
    .stem-after-exhibit-tail {
      margin-top: 10px;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice.mono.cli-router-choice {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: 100%;
      padding: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #2a3f5c;
      background: linear-gradient(180deg, rgba(26, 37, 59, 0.95), rgba(10, 16, 28, 0.98));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .cli-router-choice-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      background: rgba(15, 22, 40, 0.95);
      border-bottom: 1px solid #2a3f5c;
    }
    .cli-router-choice-controls input {
      margin-right: 0;
      transform: none;
      flex-shrink: 0;
    }
    .cli-router-choice-badge {
      flex: 0 0 auto;
      min-width: 1.5rem;
      text-align: center;
      padding: 2px 7px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 0.78rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: rgba(37, 75, 138, 0.55);
      border: 1px solid rgba(93, 140, 220, 0.45);
      color: #e6edf3;
    }
    .cli-router-choice-title {
      flex: 1 1 auto;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #8b9cc4;
    }
    pre.cli-router-console {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 12px 14px;
      background: #060a11;
      color: #c8dcf0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.42;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-x: auto;
      border-left: 3px solid #c9a227;
      min-height: 2rem;
      align-self: stretch;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .question-nav {
      margin: 0 0 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .question-nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .question-nav .nav-link,
    .answer-actions .nav-check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }
    .answer-actions {
      margin: 16px 0 0;
      display: flex;
      justify-content: flex-start;
    }
    .question-nav .nav-link--disabled {
      opacity: 0.35;
      pointer-events: none;
      cursor: default;
    }
    .question-nav .nav-link:hover,
    .answer-actions .nav-check:hover {
      filter: brightness(1.08);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .exhibit-stack {
      margin: 14px 0 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    figure.exhibit-photo {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #2d3b5a;
      overflow: hidden;
      background: #0d1320;
    }
    figure.exhibit-photo img {
      width: 100%;
      height: auto;
      display: block;
    }
    figure.exhibit-photo figcaption {
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #8b9cc4;
      border-top: 1px solid #2d3b5a;
      background: #0f1628;
    }
    .cli-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px) {
      .cli-grid.two-cols {
        grid-template-columns: 1fr 1fr;
        align-items: stretch;
      }
    }
    .cli-device {
      border-radius: 10px;
      border: 1px solid #2d3b5a;
      background: #0d1320;
      overflow: hidden;
      min-height: 0;
    }
    .cli-device h2 {
      margin: 0;
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: #1a253b;
      border-bottom: 1px solid #2d3b5a;
      color: #b6c8e8;
    }
    .cli-device pre {
      margin: 0;
      padding: 12px 14px;
      font-size: 0.72rem;
      line-height: 1.4;
      overflow-x: auto;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #e6edf3;
    }
    .cli-device pre + pre {
      border-top: 1px solid #2d3b5a;
    }
    .exhibit-terminal-white {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #b8b8b8;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }
    .exhibit-terminal-white pre {
      margin: 0;
      padding: 14px 16px;
      font-size: 0.78rem;
      line-height: 1.45;
      overflow-x: auto;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #0a0a0a;
      background: #ffffff;
      tab-size: 8;
    }
    .exhibit-router-cli {
      margin: 0;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      overflow: hidden;
      background: #0a0a0a;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 4px 18px rgba(0, 0, 0, 0.45);
    }
    .exhibit-router-cli pre {
      margin: 0;
      padding: 14px 16px;
      font-size: 0.72rem;
      line-height: 1.42;
      overflow-x: auto;
      white-space: pre;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #f0f0f0;
      background: #0a0a0a;
      tab-size: 8;
    }
  </style>

</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <nav class="question-nav" aria-label="Question navigation">
      <div class="question-nav-links">
      <a class="nav-link nav-prev" href="/CCNA-Study/CCNA_questions/r1-lan-interface-ipv6-address-dhcp.html">Back</a>
      <a class="nav-link nav-home" href="/index.html">Home</a>
      <a class="nav-link nav-next next-link" href="/CCNA-Study/CCNA_questions/r86-static-route-172-16-34-0-29-via-r14.html">Next</a>
      </div>
    </nav>
    <div class="exhibit-stack">
      <figure class="exhibit-photo">
        <img src="/CCNA-Study/CCNA_questions/images/r14-r86-pc10-host-route-topology.png" alt="Topology: R14 Fa0/0 10.73.65.65 connects to R86 Fa0/0 10.73.65.66 over 10.73.65.64/30; R86 Fa0/1 connects to 10.80.65.0/28 with PC 10 at 10.80.65.10." width="900" decoding="async" loading="lazy" />
      </figure>
    </div>
    <h1>Refer to the exhibit. Router R14 is in the process of being configured. Which configuration must be used to establish a host route to PC 10?</h1>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="r14hostpc10" value="A" aria-label="Select answer option A" />
        <span class="cli-router-choice-badge" aria-hidden="true">A</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">A. ip route 10.80.65.10 255.255.255.254 10.80.65.1</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="r14hostpc10" value="B" aria-label="Select answer option B" />
        <span class="cli-router-choice-badge" aria-hidden="true">B</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">B. ip route 10.73.65.66 0.0.0.255 10.80.65.10</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="r14hostpc10" value="C" aria-label="Select answer option C" />
        <span class="cli-router-choice-badge" aria-hidden="true">C</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">C. ip route 10.80.65.10 255.255.255.255 10.73.65.66</pre>
    </label>

    <label class="choice mono cli-router-choice">
      <span class="cli-router-choice-controls">
        <input type="radio" name="r14hostpc10" value="D" aria-label="Select answer option D" />
        <span class="cli-router-choice-badge" aria-hidden="true">D</span>
        <span class="cli-router-choice-title">Router CLI — candidate config</span>
      </span>
      <pre class="cli-router-console">D. ip route 10.73.65.65 255.0.0.0 10.80.65.10</pre>
    </label>


    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>

  <script>
    (function () {
      var CORRECT = "C";
      var CORRECT_MSG = "Correct. C \u2014 A host route to a single IPv4 address uses mask 255.255.255.255. From R14, PC 10 is behind R86, so the next hop is R86's address on the shared transit link, 10.73.65.66. A uses a /31 mask and points to R86's LAN interface instead of the next hop on R14's connected segment. B and D route to the wrong destination network/address.";
      var answerBox = document.getElementById("answerBox");

      function applyFeedback(value) {
        answerBox.style.display = "block";
        if (value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      }

      document.querySelectorAll('input[name="r14hostpc10"]').forEach(function (el) {
        el.addEventListener("change", function () {
          if (el.checked) {
            applyFeedback(el.value);
          }
        });
      });
    })();
  </script>
</body>
