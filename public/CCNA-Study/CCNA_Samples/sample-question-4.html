<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA sample — spine-and-leaf (question 4 of 5)</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .stem-note {
      margin: 0 0 18px;
      color: #b8c3d6;
      font-size: 0.95rem;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <main class="card">
    <h1>
      In which way does a spine-and-leaf architecture allow for scalability in a network when additional access ports are required?
    </h1>
    <p class="stem-note">Question 4 of 5. Choose one answer.</p>

    <label class="choice"><input type="radio" name="q4" value="A" />A. A spine switch and a leaf switch can be added with redundant connections between them.</label>
    <label class="choice"><input type="radio" name="q4" value="B" />B. A spine switch can be added with at least 40 GB uplinks.</label>
    <label class="choice"><input type="radio" name="q4" value="C" />C. A leaf switch can be added with connections to every spine switch.</label>
    <label class="choice"><input type="radio" name="q4" value="D" />D. A leaf switch can be added with a single connection to a core spine switch.</label>

    <div class="actions">
      <a class="home-link" href="/index.html">Home</a>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="sample-question-5.html">Next question</a>
    </div>
  </main>

  <script>
    (function () {
      var answerBox = document.getElementById("answerBox");
      var nextWrap = document.getElementById("nextWrap");
      document.querySelectorAll('input[name="q4"]').forEach(function (option) {
        option.addEventListener("change", function () {
          answerBox.style.display = "block";
          nextWrap.style.display = "block";
          if (option.value === "C") {
            answerBox.className = "answer correct";
            answerBox.textContent =
              "Correct. C. More access ports are scaled by adding leaf switches; each leaf uplinks to every spine so traffic can use all spines (ECMP) and the fabric stays non-blocking. A leaf with only one spine uplink (D) breaks that design.";
          } else {
            answerBox.className = "answer incorrect";
            answerBox.textContent = "Incorrect.";
          }
        });
      });
    })();
  </script>
</body>
</html>
