<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCNA sample — interface counters / FCS (1 of 5)</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
      padding: 16px 16px calc(80px + env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
.choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .home-link {
      margin-left: auto;
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
    .sim-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10000;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      background: rgba(11, 16, 32, 0.94);
      border-top: 1px solid #2d3b5a;
      backdrop-filter: blur(10px);
    }
    .sim-nav-btn {
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      min-width: 5.5rem;
      text-align: center;
      box-sizing: border-box;
    }
    .sim-nav-btn:hover {
      filter: brightness(1.08);
    }
    .sim-nav-home {
      background: #1a3d6e;
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <a class="site-logo-corner" href="/index.html" aria-label="Be Certified Today — site home">
    <img src="/images/logo/becertifiedtoday_logo_image_trans.png" width="52" height="52" alt="" />
  </a>
  <main class="card">
    <h1>
      A frame that enters a switch fails the Frame Check Sequence. Which two interface counters are incremented? (Choose two.)
    </h1>
<label class="choice"><input type="checkbox" name="fcs" value="A" />A. input errors</label>
    <label class="choice"><input type="checkbox" name="fcs" value="B" />B. frame</label>
    <label class="choice"><input type="checkbox" name="fcs" value="C" />C. giants</label>
    <label class="choice"><input type="checkbox" name="fcs" value="D" />D. CRC</label>
    <label class="choice"><input type="checkbox" name="fcs" value="E" />E. runts</label>

    <div class="actions">
      <button id="checkBtn" type="button">Check answer</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="sample-question-2.html">Next question</a>
    </div>
  </main>

  <nav class="sim-nav" aria-label="Simulation navigation">
    <a class="sim-nav-btn sim-nav-home" href="/CCNA-Study/ccna-index.html">CCNA study</a>
  </nav>

  <script>
    (function () {
      var CORRECT = ["A", "D"];
      var checkBtn = document.getElementById("checkBtn");
var answerBox = document.getElementById("answerBox");

      function selectedValues() {
        return []
          .slice.call(document.querySelectorAll('input[name="fcs"]:checked'))
          .map(function (el) {
            return el.value;
          })
          .sort();
      }

      function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        return a.every(function (v, i) {
          return v === b[i];
        });
      }

      checkBtn.addEventListener("click", function () {
        var sel = selectedValues();
        answerBox.style.display = "block";
        if (sel.length !== 2) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Choose exactly two answers.";
          return;
        }
        var ok = arraysEqual(sel, CORRECT.slice().sort());
        if (ok) {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. A and D. A failed FCS check increments the CRC counter. The input errors counter includes CRC errors (and other receive errors such as runts and giants).";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

    })();
  </script>
</body>
</html>
