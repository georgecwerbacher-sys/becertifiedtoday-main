<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Test simulation runner</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b1020;
      color: #e6edf3;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #2d3b5a;
      background: #121a2b;
    }
    .topbar-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
    }
    .timer {
      font-size: 1rem;
      font-weight: 800;
      color: #fbbf24;
      padding: 6px 10px;
      border-radius: 10px;
      border: 1px solid #4b556b;
      background: #1f2937;
    }
    .timer.is-expired {
      color: #fecaca;
      border-color: #991b1b;
      background: #3b0f14;
    }
    .stage {
      min-height: 0;
    }
    #runnerFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #0b1020;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-top: 1px solid #2d3b5a;
      background: #121a2b;
    }
    .next-btn {
      appearance: none;
      border: 1px solid #4f84d8;
      background: #2f66bf;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      min-width: 8rem;
    }
    .quit-btn {
      appearance: none;
      border: 1px solid #4b556b;
      background: #2a3040;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      min-width: 8rem;
    }
    .next-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-right: auto;
      font-size: 0.92rem;
      color: #9fb0cc;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 class="topbar-title">CCNP Test simulation</h1>
    <div id="timer" class="timer" role="status" aria-live="polite">120:00</div>
  </header>

  <main class="stage">
    <iframe id="runnerFrame" title="Test simulation content"></iframe>
  </main>

  <footer class="actions">
    <div id="status" class="status"></div>
    <button id="quitBtn" type="button" class="quit-btn">Quit</button>
    <button id="nextBtn" type="button" class="next-btn">Next</button>
  </footer>

  <script>
    (function () {
      var frame = document.getElementById("runnerFrame");
      var nextBtn = document.getElementById("nextBtn");
      var quitBtn = document.getElementById("quitBtn");
      var timerEl = document.getElementById("timer");
      var statusEl = document.getElementById("status");

      var queue = [];
      var index = 0;
      var endsAt = 0;
      var timerHandle = null;
      var isOver = false;

      function loadState() {
        try {
          queue = JSON.parse(sessionStorage.getItem("ccnpTestSimQueue") || "[]");
          index = parseInt(sessionStorage.getItem("ccnpTestSimIndex") || "0", 10);
          endsAt = parseInt(sessionStorage.getItem("ccnpTestSimEndsAt") || "0", 10);
        } catch (e) {
          queue = [];
          index = 0;
          endsAt = 0;
        }
      }

      function saveIndex() {
        try {
          sessionStorage.setItem("ccnpTestSimIndex", String(index));
        } catch (e) {}
      }

      function clearTestState() {
        try {
          sessionStorage.removeItem("ccnpTestSimQueue");
          sessionStorage.removeItem("ccnpTestSimIndex");
          sessionStorage.removeItem("ccnpTestSimEndsAt");
        } catch (e) {}
      }

      function formatRemaining(ms) {
        var totalSeconds = Math.max(0, Math.floor(ms / 1000));
        var minutes = Math.floor(totalSeconds / 60);
        var seconds = totalSeconds % 60;
        return String(minutes) + ":" + String(seconds).padStart(2, "0");
      }

      function updateStatus() {
        if (!queue.length) {
          statusEl.textContent = "";
          return;
        }
        statusEl.textContent = "Item " + (index + 1) + " of " + queue.length;
      }

      function endTest(reason) {
        if (isOver) return;
        isOver = true;
        if (timerHandle) {
          clearInterval(timerHandle);
          timerHandle = null;
        }
        nextBtn.disabled = true;
        timerEl.classList.add("is-expired");
        statusEl.textContent = reason;
        clearTestState();
        frame.srcdoc =
          "<!doctype html><html><body style=\"margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1020;color:#e6edf3;font-family:Inter,Arial,sans-serif;\">" +
          "<div style=\"text-align:center;padding:24px;max-width:760px;\">" +
          "<h2 style=\"margin:0 0 10px;\">Test simulation finished</h2>" +
          "<p style=\"margin:0 0 16px;color:#b8c3d6;line-height:1.45;\">" + reason + "</p>" +
          "<a href=\"/BCT-CCNP-ENCOR-Training.html\" style=\"display:inline-block;text-decoration:none;background:#2f66bf;border:1px solid #4f84d8;color:#e6edf3;padding:10px 14px;border-radius:10px;font-weight:800;\">Back to launcher</a>" +
          "</div></body></html>";
      }

      function tick() {
        if (isOver) return;
        var remaining = endsAt - Date.now();
        timerEl.textContent = formatRemaining(remaining);
        if (remaining <= 0) {
          timerEl.textContent = "0:00";
          endTest("Time is up. The practice test is over.");
        }
      }

      function hideEmbeddedNav() {
        var doc;
        try {
          doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        } catch (e) {
          return;
        }
        if (!doc) return;
        var selectors = [
          ".sim-nav",
          "#nextWrap",
          "a[href='/BCT-CCNP-ENCOR-Training.html']",
          "a[href='/']"
        ];
        selectors.forEach(function (sel) {
          var nodes = doc.querySelectorAll(sel);
          for (var i = 0; i < nodes.length; i++) {
            nodes[i].style.display = "none";
          }
        });
      }

      function loadCurrentItem() {
        if (isOver) return;
        if (!queue.length || index < 0 || index >= queue.length) {
          endTest("Practice test complete.");
          return;
        }
        updateStatus();
        frame.src = queue[index].url;
      }

      function moveNext() {
        if (isOver) return;
        index += 1;
        saveIndex();
        if (index >= queue.length) {
          endTest("Practice test complete.");
          return;
        }
        loadCurrentItem();
      }

      frame.addEventListener("load", hideEmbeddedNav);
      nextBtn.addEventListener("click", moveNext);
      quitBtn.addEventListener("click", function () {
        clearTestState();
        location.replace("/BCT-CCNP-ENCOR-Training.html");
      });

      loadState();
      if (!queue.length || !endsAt || !Number.isFinite(endsAt)) {
        location.replace("/BCT-CCNP-ENCOR-Training.html");
        return;
      }
      if (!Number.isFinite(index) || index < 0) index = 0;
      if (index >= queue.length) index = queue.length - 1;
      saveIndex();

      tick();
      timerHandle = setInterval(tick, 1000);
      loadCurrentItem();
    })();
  </script>
</body>
</html>
