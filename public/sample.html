<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Sample practice</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script>
    (function () {
      var params = new URLSearchParams(location.search || "");
      var stored = sessionStorage.getItem("ccnpSampleKind");
      var track = (params.get("track") || stored || "questions").toLowerCase();
      if (track !== "questions" && track !== "labs" && track !== "drag") {
        track = "questions";
      }

      sessionStorage.setItem("ccnpUrlMaskPath", "/sample");
      sessionStorage.setItem("ccnpSampleKind", track);

      var map = {
        questions: "/sample-question-1.html",
        labs: "/cli-lab-rapid-pvst-lacp-new.html?sample=1",
        drag: "/question-365.html?sample=1"
      };

      location.replace(map[track]);
    })();
  </script>
  <script defer src="/js/global-top-nav.js"></script>
</body>
</html>
