<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="canonical" href="https://becertifiedtoday.com/COMP_TIA_SEC+/SEC+_Samples/sample-question-1.html" />
  <meta name="description" content="Free CompTIA Security+ SY0-701 exam prep sample — interactive practice with verified explanations in your browser. Not a training course." />
  <meta name="robots" content="index, follow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security+ SY0-701 exam prep sample — MFA (1 of 3)</title>
  <link rel="stylesheet" href="/css/bcc-question-link-nav.css" />
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      --bcc-outside-text: #1a3d6e;
      --bcc-box-bg: #121a2b;
      --bcc-box-surface: #1a253b;
      --bcc-choice-bg: #254b8a;
      --bcc-choice-border: #3d6dbb;
      --bcc-box-text: #e6edf3;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
      background: #ffffff;
      color: var(--bcc-outside-text);
      padding: 16px;
      padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
    }
    .page-logo-watermark {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .page-logo-watermark img {
      width: min(85vw, 720px);
      max-height: 85vh;
      height: auto;
      object-fit: contain;
      opacity: 0.16;
    }
    .question-shell {
      width: min(900px, 100%);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      position: relative;
      z-index: 1;
    }
    .question-shell .site-logo-corner {
      position: static;
      top: auto;
      right: auto;
      align-self: flex-end;
      margin: 0 0 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0;
      background: transparent;
      border: none;
      padding: 0;
      text-decoration: none;
      box-sizing: border-box;
    }
    .question-shell .site-logo-corner img {
      display: block;
      width: 52px;
      height: 52px;
    }
    .card {
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      color: var(--bcc-outside-text);
    }
    .answer-actions {
      display: contents;
    }
    .answer-footer {
      margin: 16px 0 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      align-items: center;
      gap: 8px 16px;
      width: 100%;
    }
    .answer-footer .nav-check {
      grid-column: 1;
      grid-row: 1;
      justify-self: start;
    }
    .answer-footer .question-progress-block {
      grid-column: 1;
      grid-row: 2;
      justify-self: start;
      align-self: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      min-height: 4.5rem;
      min-width: 0;
    }
    .answer-actions .ccna-practice-progress {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--bcc-outside-text);
      white-space: nowrap;
      margin: 0;
    }
    .question-topic-meta {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--bcc-outside-text);
      line-height: 1.35;
    }
    .answer-side-actions {
      display: contents;
    }
    .answer-footer .nav-show-answer {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
    }
    .answer-footer .review-mark-box {
      grid-column: 2;
      grid-row: 2;
      justify-self: end;
      align-self: center;
    }
    .answer-actions .nav-check {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--bcc-box-text);
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      min-height: 48px;
      box-sizing: border-box;
    }
    .answer-actions .nav-check:hover {
      filter: brightness(1.08);
    }
    .review-mark-box {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 4.5rem;
      min-height: 4.5rem;
      padding: 10px 12px;
      border: 1px solid var(--bcc-choice-border);
      border-radius: 10px;
      background: transparent;
      color: var(--bcc-outside-text);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      box-sizing: border-box;
    }
    .answer-side-actions .nav-show-answer {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--bcc-box-text);
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      min-height: 48px;
      box-sizing: border-box;
    }
    .answer-side-actions .nav-show-answer:hover {
      filter: brightness(1.08);
    }
    .review-mark-box input {
      width: 1.15rem;
      height: 1.15rem;
      margin: 0;
      accent-color: var(--bcc-outside-text);
      cursor: pointer;
    }
    .review-mark-box.is-flagged {
      border-color: var(--bcc-choice-border);
      color: var(--bcc-outside-text);
      background: transparent;
    }
    #secplusSampleSimNav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      background: rgba(11, 16, 32, 0.94);
      border-top: 1px solid #2d3b5a;
    }
    #secplusSampleSimNav .sim-nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      min-width: 5.5rem;
      min-height: 48px;
      box-sizing: border-box;
    }
    #secplusSampleSimNav .sim-nav-home {
      background: #1a3d6e;
    }
    #secplusSampleSimNav .sim-nav-btn--disabled {
      opacity: 0.35;
      pointer-events: none;
      cursor: default;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
      color: var(--bcc-outside-text);
    }
    h1.choose-two-stem {
      line-height: 1.5;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--bcc-choice-bg);
      border: 1px solid var(--bcc-choice-border);
      font-size: 1.02rem;
      color: var(--bcc-box-text);
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
      color: var(--bcc-box-text);
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
      color: #ffffff;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
      color: #fecaca;
    }
  </style>
  <link rel="stylesheet" href="/COMP_TIA_SEC+/SEC+_Samples/secplus-sample-touch.css" />

<body class="secplus-static-sample secplus-question-ui">
  <div class="page-logo-watermark" aria-hidden="true">
    <img src="/images/logo/becertifiedtoday_logo_image_trans.png" alt="" />
  </div>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/COMP_TIA_SEC+/js/secplus-practice-nav.js" defer></script>
  <div class="question-shell">
    <a class="site-logo-corner" href="/COMP_TIA_SEC+/SEC+_Training_Portal.html" aria-label="Security+ training portal">
      <img src="/images/logo/becertifiedtoday_logo_image_trans.png" width="52" height="52" alt="Be Certified Today" />
    </a>
    <main class="card">
    <h1>What is the primary purpose of multi-factor authentication (MFA)?</h1>
    <label class="choice"><input type="radio" name="q1" value="A" />A. Encrypt data at rest on storage devices</label>
    <label class="choice"><input type="radio" name="q1" value="B" />B. Verify identity using two or more independent factors</label>
    <label class="choice"><input type="radio" name="q1" value="C" />C. Block malware at the network perimeter</label>
    <label class="choice"><input type="radio" name="q1" value="D" />D. Forward security events to a SIEM</label>
    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite">Question 1 of 3</span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject">1.0 General Security Concepts</span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>
    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>
  </div>
  <nav id="secplusSampleSimNav" class="sim-nav secplus-sample-sim-nav" aria-label="Sample navigation">
    <span class="sim-nav-btn sim-nav-prev secplus-sample-prev sim-nav-btn--disabled" aria-hidden="true">Back</span>
    <a class="sim-nav-btn sim-nav-home" href="/comptia-sec+-home.html">Home</a>
    <a class="sim-nav-btn secplus-sample-next" href="sample-question-2.html">Next</a>
  </nav>
  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG =
        "Correct. MFA requires two or more independent factors (something you know, have, or are) to verify identity, reducing risk when one factor is compromised.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="q1"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="q1"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
</body>
</html>
