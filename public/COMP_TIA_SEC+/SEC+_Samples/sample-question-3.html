<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security+ sample — phishing (3 of 3)</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #e6edf3;
      padding: 16px 16px calc(80px + env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .actions button {
      background: #5b21b6;
      color: #f3e8ff;
      border: 1px solid #7c3aed;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
    }
    .actions button:hover {
      filter: brightness(1.08);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #f3e8ff;
      background: #5b21b6;
      border: 1px solid #7c3aed;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
    .next-link:hover {
      filter: brightness(1.08);
    }
    .sim-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10000;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      background: rgba(11, 16, 32, 0.94);
      border-top: 1px solid #2d3b5a;
      backdrop-filter: blur(10px);
    }
    .sim-nav-btn {
      text-decoration: none;
      background: #5b21b6;
      border: 1px solid #7c3aed;
      color: #f3e8ff;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      min-width: 5.5rem;
      text-align: center;
      box-sizing: border-box;
    }
    .sim-nav-btn:hover {
      filter: brightness(1.08);
    }
    .sim-nav-home {
      background: #4c1d95;
    }
  </style>
  <link rel="stylesheet" href="/COMP_TIA_SEC+/SEC+_Samples/secplus-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <a class="site-logo-corner" href="/secplus-home.html" aria-label="CompTIA Security+ study hub">
    <img src="/images/logo/becertifiedtoday_logo_image_trans.png" width="52" height="52" alt="" />
  </a>
  <main class="card">
    <h1>An attacker sends email impersonating IT support to steal employee credentials. This is an example of:</h1>
    <label class="choice"><input type="radio" name="q3" value="A" />A. SQL injection</label>
    <label class="choice"><input type="radio" name="q3" value="B" />B. Phishing</label>
    <label class="choice"><input type="radio" name="q3" value="C" />C. Buffer overflow</label>
    <label class="choice"><input type="radio" name="q3" value="D" />D. ARP spoofing</label>

    <div class="actions">
      <button id="checkBtn" type="button">Check answer</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>

    <div class="next-wrap">
      <a class="next-link" href="/secplus-home.html">Back to Security+ hub</a>
    </div>
  </main>

  <nav class="sim-nav" aria-label="Sample navigation">
    <a class="sim-nav-btn sim-nav-home" href="/COMP_TIA_SEC+/SEC+_Training_Portal.html">Security+ Study</a>
  </nav>

  <script>
    (function () {
      var CORRECT = "B";
      var checkBtn = document.getElementById("checkBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="q3"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. Phishing uses deceptive messages—often email—to trick users into revealing credentials or sensitive data. It is a social-engineering attack.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });
    })();
  </script>
</body>
</html>
