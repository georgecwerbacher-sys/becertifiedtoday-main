<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/js/install-google-tag.js"></script>
  <script src="/js/install-vercel-analytics.js"></script>
  <link rel="canonical" href="https://becertifiedtoday.com/COMP_TIA_SEC+/SEC+_Samples/sample.html" />
  <meta name="description" content="Free CompTIA Security+ SY0-701 exam prep sample — interactive practice with verified explanations in your browser. Not a training course." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Security+ SY0-701 free practice sample | Be Certified Today</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script src="/COMP_TIA_SEC+/js/secplus-home-sample-launcher.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search || "");
      var track = (params.get("track") || "home").toLowerCase();
      var finish = "/comptia-sec+-home.html";

      if (!window.SECPLUS_HOME_SAMPLE) {
        document.body.textContent = "Could not load the sample. Try again later.";
        return;
      }

      if (window.SECPLUS_HOME_SAMPLE.resumeFromHash && window.SECPLUS_HOME_SAMPLE.resumeFromHash()) {
        return;
      }

      sessionStorage.setItem("secplusSampleKind", track);

      var chain;
      if (track === "questions") {
        chain = window.SECPLUS_HOME_SAMPLE.startQuestions(finish);
      } else if (track === "sim-malware") {
        chain = window.SECPLUS_HOME_SAMPLE.startSim("malware", finish);
      } else if (track === "sim-dark-web") {
        chain = window.SECPLUS_HOME_SAMPLE.startSim("dark-web", finish);
      } else {
        chain = window.SECPLUS_HOME_SAMPLE.start(finish);
      }

      chain.catch(function () {
        document.body.textContent = "Could not start the sample. Try again later.";
      });
    })();
  </script>
</body>
</html>
