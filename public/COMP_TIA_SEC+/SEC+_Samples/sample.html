<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <title>Security+ sample practice</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #b8c3d6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <p>Loading sample…</p>
  <script>
    (function () {
      var params = new URLSearchParams(location.search || "");
      var stored = sessionStorage.getItem("secplusSampleKind");
      var track = (params.get("track") || stored || "questions").toLowerCase();
      var map = {
        questions: "/COMP_TIA_SEC+/SEC+_Samples/sample-question-1.html"
      };

      if (!Object.prototype.hasOwnProperty.call(map, track)) {
        track = "questions";
      }

      sessionStorage.setItem("secplusUrlMaskPath", "/secplus-sample");
      sessionStorage.setItem("secplusSampleKind", track);

      location.replace(map[track]);
    })();
  </script>
</body>
</html>
