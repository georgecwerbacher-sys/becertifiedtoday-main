    <h1>A security team is implementing the 3-2-1 backup rule. Which of the following correctly describes this strategy?</h1>

    <label class="choice"><input type="radio" name="secplus_q959" value="A" />A. 3 copies of data, on 2 different media types, with 1 copy offsite</label>
    <label class="choice"><input type="radio" name="secplus_q959" value="B" />B. 3 full backups per week, 2 differential backups per day, 1 incremental per hour</label>
    <label class="choice"><input type="radio" name="secplus_q959" value="C" />C. 3 data centers, 2 cloud providers, 1 on-premises location</label>
    <label class="choice"><input type="radio" name="secplus_q959" value="D" />D. 3 encryption keys, 2 backup administrators, 1 recovery site</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    </main>

  <script>
    (function () {
      var CORRECT = "A";
      var CORRECT_MSG = "Correct. A \u2014 The 3-2-1 backup rule means keeping three copies of data (production plus two backups), stored on two different types of media, with at least one copy offsite to survive site loss or ransomware affecting local systems. It is not a schedule of three full, two differential, and one incremental backup per time period. It does not require three data centers, two cloud providers, and one on-premises site by definition. It is not about counting encryption keys, backup administrators, and recovery sites.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q959"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q959"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
