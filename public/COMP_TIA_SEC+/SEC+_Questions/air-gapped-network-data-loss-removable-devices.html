    <h1>Which of the following is the most common data loss path for an air-gapped network?</h1>

    <label class="choice"><input type="radio" name="secplus_q474" value="A" />A. Bastion host</label>
    <label class="choice"><input type="radio" name="secplus_q474" value="B" />B. Unsecured Bluetooth</label>
    <label class="choice"><input type="radio" name="secplus_q474" value="C" />C. Unpatched OS</label>
    <label class="choice"><input type="radio" name="secplus_q474" value="D" />D. Removable devices</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">

          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />

  <script>
    (function () {
      var CORRECT = "D";
      var CORRECT_MSG = "Correct. D \u2014 Air-gapped networks block routine network exfiltration, so data most often leaves on removable media (USB drives, external disks, optical media) carried by users or insiders. A bastion host is a controlled jump point, not the typical exfiltration path for isolated segments. Unsecured Bluetooth can leak data wirelessly but is less common than removable devices in hardened air-gap environments. Unpatched operating systems increase compromise risk but are not themselves the primary data-loss channel.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q474"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q474"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
