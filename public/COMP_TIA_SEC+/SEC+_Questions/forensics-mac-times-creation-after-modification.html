    <h1>During a forensic analysis, an investigator finds that a file&#x27;s MAC times (Modified, Accessed, Created) show the creation date is more recent than the modification date. What does this most likely indicate?</h1>

    <label class="choice"><input type="radio" name="secplus_q941" value="A" />A. The file was corrupted by malware</label>
    <label class="choice"><input type="radio" name="secplus_q941" value="B" />B. The file was copied from another location, resetting the creation timestamp</label>
    <label class="choice"><input type="radio" name="secplus_q941" value="C" />C. The file system is damaged</label>
    <label class="choice"><input type="radio" name="secplus_q941" value="D" />D. The system clock was never configured correctly</label>

    <div class="answer-footer">

          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">

  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG = "Correct. B \u2014 When a file is copied or moved to a new location, many file systems set a new creation timestamp while preserving the original last-modified time, so Created can appear newer than Modified. That pattern suggests the file arrived on the volume later rather than being authored there. Malware corruption may damage content but does not typically produce this specific timestamp relationship as the most likely explanation. File system damage can cause inconsistent metadata but is not the usual forensic interpretation of creation newer than modification. A misconfigured system clock would affect timestamps broadly across many files, not usually a single file with logically inverted Created and Modified values.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q941"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q941"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
