    <h1>Which of the following explains how regular patching helps mitigate risks when securing an enterprise environment?</h1>

    <label class="choice"><input type="radio" name="secplus_q616" value="A" />A. It improves server performance by reducing software bugs.</label>
    <label class="choice"><input type="radio" name="secplus_q616" value="B" />B. It addresses known software vulnerabilities before they are exploited.</label>
    <label class="choice"><input type="radio" name="secplus_q616" value="C" />C. It eliminates the need for firewalls and intrusion detection.</label>
    <label class="choice"><input type="radio" name="secplus_q616" value="D" />D. It removes the need for antivirus tools.</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>

    <div id="answerBox" class="answer" aria-live="polite"></div>

  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG = "Correct. B \u2014 Regular patching applies vendor fixes for disclosed flaws, closing known software vulnerabilities before attackers can exploit them. Fewer bugs may improve stability or performance, but that is not the primary security reason to patch. Patching reduces risk but does not replace defense-in-depth controls such as firewalls, intrusion detection, or antivirus.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q616"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q616"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
