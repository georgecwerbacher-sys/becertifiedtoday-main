    <h1>An office wants to install a Wi-Fi network. The security team must ensure a secure design. The access points will be more powerful and use WPA3 with a 16-character randomized key. Which of the following should the security team do next?</h1>

    <label class="choice"><input type="radio" name="secplus_q115" value="A" />A. Create a heat map of the building perimeter</label>
    <label class="choice"><input type="radio" name="secplus_q115" value="B" />B. Deploy IPSec tunnels from each access point to the controller.</label>
    <label class="choice"><input type="radio" name="secplus_q115" value="C" />C. Enable WPA2-PSK with a 24-character randomized key.</label>
    <label class="choice"><input type="radio" name="secplus_q115" value="D" />D. Disable SSH administration on all access points.</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    </main>

  <script>
    (function () {
      var CORRECT = "A";
      var CORRECT_MSG = "Correct. A \u2014 After selecting encryption and key strength, a heat map or site survey maps coverage and signal bleed so AP placement limits exposure outside the building perimeter. IPSec tunnels from each AP are not the standard next step for basic secure office Wi-Fi design. Downgrading to WPA2-PSK weakens the chosen control. Disabling SSH may be hardening but does not replace proper RF planning before deployment.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q115"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q115"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
