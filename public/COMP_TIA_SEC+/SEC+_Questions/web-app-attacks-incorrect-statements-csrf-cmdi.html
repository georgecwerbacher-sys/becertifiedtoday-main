    <h1 class="choose-two-stem">Which of the following statements about common web application attacks is INCORRECT? (Select two.)</h1>

    <label class="choice"><input type="checkbox" name="secplus_q784" value="A" />A. Directory traversal attacks may use input sequences like ../ (dot-dot-slash) to try to access files outside the intended web root directory.</label>
    <label class="choice"><input type="checkbox" name="secplus_q784" value="B" />B. Reflected cross-site scripting (XSS) can involve malicious JavaScript placed in a URL parameter that a vulnerable site reflects back in the HTTP response to the victim's browser.</label>
    <label class="choice"><input type="checkbox" name="secplus_q784" value="C" />C. Command injection attacks only affect SQL databases and cannot target operating system commands or other interpreters.</label>
    <label class="choice"><input type="checkbox" name="secplus_q784" value="D" />D. SQL injection often appears as crafted input containing characters such as ' OR 1=1-- intended to alter backend database queries.</label>
    <label class="choice"><input type="checkbox" name="secplus_q784" value="E" />E. Cross-site request forgery (CSRF) usually requires the attacker to install malware on the victim's browser before any forged requests can be sent.</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">

        <label class="review-mark-box" id="reviewMarkWrap">

  <script>
    (function () {
      var CORRECT = ["C", "E"];
      var CORRECT_MSG = "Correct. C and E \u2014 Command injection executes operating system or interpreter commands through vulnerable application input; SQL injection targets databases, not command injection. CSRF forges authenticated requests using the victim's existing browser session and cookies; it does not require malware on the victim's browser. Directory traversal uses sequences such as ../ to reach files outside the web root. Reflected XSS can reflect malicious script from a URL parameter in the HTTP response. SQL injection often uses crafted input such as ' OR 1=1-- to alter backend queries.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      function selectedValues() {
        return []
          .slice.call(document.querySelectorAll('input[name="secplus_q784"]:checked'))
          .map(function (el) { return el.value; })
          .sort();
      }

      function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        return a.every(function (v, i) { return v === b[i]; });
      }

      checkBtn.addEventListener("click", function () {
        var sel = selectedValues();
        answerBox.style.display = "block";
        if (sel.length !== 2) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Choose exactly 2 answers.";
          return;
        }
        if (arraysEqual(sel, CORRECT)) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        CORRECT.forEach(function (value) {
          var input = document.querySelector('input[name="secplus_q784"][value="' + value + '"]');
          if (input) input.checked = true;
        });
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
