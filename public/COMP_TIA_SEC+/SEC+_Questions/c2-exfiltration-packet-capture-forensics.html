    <h1>During an investigation, a security analyst discovers traffic going out to a command-and-control server. The analyst must find out if any data exfiltration has occurred. Which of the following would best help the analyst determine this?</h1>

    <label class="choice"><input type="radio" name="secplus_q204" value="A" />A. Application log</label>
    <label class="choice"><input type="radio" name="secplus_q204" value="B" />B. Metadata</label>
    <label class="choice"><input type="radio" name="secplus_q204" value="C" />C. Network log</label>
    <label class="choice"><input type="radio" name="secplus_q204" value="D" />D. Packet capture</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    </main>
  </div>

  <script>
    (function () {
      var CORRECT = "D";
      var CORRECT_MSG = "Correct. D \u2014 Packet capture (PCAP) records full network traffic so analysts can inspect payloads, session size, and content to confirm whether data left the environment over the C2 channel. Application logs show app events but not complete transmitted data. Metadata summarizes flows without payload contents. Network logs document connections but lack the depth to verify exfiltrated content.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q204"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q204"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
