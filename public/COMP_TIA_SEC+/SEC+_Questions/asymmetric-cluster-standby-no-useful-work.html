    <h1>A method used for improved redundancy is to put in place a server cluster. There are two kinds of server clusters: symmetric and asymmetric clusters. Which of the following is true about asymmetrical clusters?</h1>

    <label class="choice"><input type="radio" name="secplus_q740" value="A" />A. The standby server performs useful work in addition to supporting a failed server.</label>
    <label class="choice"><input type="radio" name="secplus_q740" value="B" />B. The standby server performs no useful work other than to be ready if it is needed.</label>
    <label class="choice"><input type="radio" name="secplus_q740" value="C" />C. The standby server launches a copy of the virtual machine the failed server.</label>
    <label class="choice"><input type="radio" name="secplus_q740" value="D" />D. Virtualization dramatically increases the number of server clusters that are needed for server redundancy.</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">

        </div>

      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>

  <script>
    (function () {
      var CORRECT = "B";
      var CORRECT_MSG = "Correct. B \u2014 In an asymmetric (active/passive) cluster, one node is active while the standby node does not perform useful production work; it waits ready to take over if the active node fails. In a symmetric (active/active) cluster, multiple nodes share the workload and all perform useful work. Launching a VM copy on the failed server is not the defining behavior of asymmetric clustering. Virtualization can reduce the need for large physical clusters because workloads can be moved quickly to another host.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q740"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q740"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
