    <h1>A security analyst reviews logs and finds a large number of malicious requests that have caused performance issues on the company&#x27;s site. Which of the following would have most likely prevented this attack?</h1>

    <label class="choice"><input type="radio" name="secplus_q623" value="A" />A. IPSec</label>
    <label class="choice"><input type="radio" name="secplus_q623" value="B" />B. TLS</label>
    <label class="choice"><input type="radio" name="secplus_q623" value="C" />C. SDN</label>
    <label class="choice"><input type="radio" name="secplus_q623" value="D" />D. WAF</label>

    <div class="answer-footer">
      <div class="answer-actions">
        <button id="checkBtn" type="button" class="nav-check">Check answer</button>
        <div class="question-progress-block">
          <span class="ccna-practice-progress" aria-live="polite"></span>
          <p class="question-topic-meta">
            <span class="question-topic-meta__version">Version 1.1 2026</span>
            <span class="question-topic-meta__subject"></span>
          </p>
        </div>
      </div>
      <div class="answer-side-actions">
        <button id="showBtn" type="button" class="nav-show-answer">Show Answer</button>
        <label class="review-mark-box" id="reviewMarkWrap">
          <input type="checkbox" id="reviewMark" aria-label="Mark for review" />
          <span class="review-mark-box__label">Review</span>
        </label>
      </div>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    </main>
  </div>

  <script>
    (function () {
      var CORRECT = "D";
      var CORRECT_MSG = "Correct. D \u2014 A web application firewall (WAF) inspects HTTP and HTTPS traffic to the site and can block malicious requests such as injection attempts, exploit probes, and abusive patterns before they overwhelm the application. IPsec secures IP-layer communication for VPNs and site-to-site tunnels and does not filter web application requests. TLS encrypts web traffic in transit but does not by itself stop malicious HTTP requests. Software-defined networking (SDN) centralizes network control and programmability but is not the primary control for blocking application-layer attacks against a website.";
      var checkBtn = document.getElementById("checkBtn");
      var showBtn = document.getElementById("showBtn");
      var answerBox = document.getElementById("answerBox");

      checkBtn.addEventListener("click", function () {
        var sel = document.querySelector('input[name="secplus_q623"]:checked');
        answerBox.style.display = "block";
        if (!sel) {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Select an answer.";
          return;
        }
        if (sel.value === CORRECT) {
          answerBox.className = "answer correct";
          answerBox.textContent = CORRECT_MSG;
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent = "Incorrect.";
        }
      });

      showBtn.addEventListener("click", function () {
        var input = document.querySelector('input[name="secplus_q623"][value="' + CORRECT + '"]');
        if (input) input.checked = true;
        answerBox.style.display = "block";
        answerBox.className = "answer correct";
        answerBox.textContent = CORRECT_MSG;
      });
    })();
  </script>
