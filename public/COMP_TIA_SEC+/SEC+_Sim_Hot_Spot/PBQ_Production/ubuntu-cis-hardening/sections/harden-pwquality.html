<meta name="robots" content="noindex, nofollow" />
<article class="pbq-section-fragment" data-id="harden-pwquality">
  <h1>Password quality (PAM)</h1>
  <p class="pbq-sub">
    Fix weak defaults in <code>/etc/security/pwquality.conf</code> to meet CIS password-complexity requirements.
  </p>

  <div class="sim-frame pbq-ssh-sim">
    <div class="pbq-ssh-editor">
      <div class="pbq-ssh-editor__bar">
        <span class="pbq-ssh-editor__path">/etc/security/pwquality.conf</span>
        <span class="pbq-ssh-editor__hint">Select the secure value for each setting</span>
      </div>
      <pre class="pbq-ssh-code" aria-label="pwquality.conf"><code><span class="ln">1</span><span class="cm"># Password quality policy</span>
<span class="ln">2</span><span class="kw">minlen</span> = <select class="pbq-ssh-select" data-key="pw-minlen" data-correct="14" aria-label="minlen">
  <option value="">select</option><option>6</option><option>8</option><option>14</option><option>20</option>
</select>
<span class="ln">3</span><span class="kw">minclass</span> = <select class="pbq-ssh-select" data-key="pw-minclass" data-correct="4" aria-label="minclass">
  <option value="">select</option><option>1</option><option>2</option><option>4</option>
</select>
<span class="ln">4</span><span class="kw">maxrepeat</span> = <select class="pbq-ssh-select" data-key="pw-maxrepeat" data-correct="2" aria-label="maxrepeat">
  <option value="">select</option><option value="0">0 (no limit)</option><option value="3">3</option><option value="2">2</option>
</select>
<span class="ln">5</span><span class="kw">dcredit</span> = <select class="pbq-ssh-select" data-key="pw-dcredit" data-correct="-1" aria-label="dcredit">
  <option value="">select</option><option value="0">0 (no requirement)</option><option value="1">1 (optional digit)</option><option value="-1">-1 (require ≥1 digit)</option>
</select>
<span class="ln">6</span><span class="kw">ucredit</span> = <select class="pbq-ssh-select" data-key="pw-ucredit" data-correct="-1" aria-label="ucredit">
  <option value="">select</option><option value="0">0 (no requirement)</option><option value="-1">-1 (require ≥1 uppercase)</option>
</select>
<span class="ln">7</span><span class="kw">ocredit</span> = <select class="pbq-ssh-select" data-key="pw-ocredit" data-correct="-1" aria-label="ocredit">
  <option value="">select</option><option value="0">0 (no requirement)</option><option value="-1">-1 (require ≥1 special char)</option>
</select></code></pre>
    </div>
  </div>

  <div class="actions">
    <button id="checkBtn" type="button">Submit Configuration</button>
    <button id="showBtn" type="button">Show Answer</button>
    <button id="resetBtn" type="button">Reset</button>
    <span id="result" role="status" aria-live="polite"></span>
  </div>
</article>
<script>
(function () {
  var CORRECT_MSG =
    "Correct. minlen 14, minclass 4, maxrepeat 2, and dcredit/ucredit/ocredit −1 enforce CIS password complexity (length, character classes, and no excessive repeats).";

  var root = document.getElementById("harden-pwquality");
  if (!root) return;

  var selects = root.querySelectorAll(".pbq-ssh-select");
  var actionBtns = root.querySelectorAll(".actions button");
  var checkBtn = actionBtns[0];
  var showBtn = actionBtns[1];
  var resetBtn = actionBtns[2];
  var result = root.querySelector(".actions [role='status']");

  function fieldOk(sel) {
    var val = sel.value.trim();
    var want = sel.getAttribute("data-correct");
    var pass = val !== "" && val === want;
    sel.classList.toggle("pbq-ssh-select--ok", pass);
    sel.classList.toggle("pbq-ssh-select--bad", val !== "" && !pass);
    return pass;
  }

  function allCorrect() {
    var ok = true;
    selects.forEach(function (sel) {
      if (!fieldOk(sel)) ok = false;
    });
    return ok;
  }

  function allFilled() {
    for (var i = 0; i < selects.length; i++) {
      if (!selects[i].value) return false;
    }
    return true;
  }

  checkBtn.addEventListener("click", function () {
    if (!allFilled()) {
      result.className = "is-fail";
      result.textContent = "Select a secure value for every pwquality.conf setting.";
      allCorrect();
      return;
    }
    if (allCorrect()) {
      result.className = "is-pass";
      result.textContent = CORRECT_MSG;
    } else {
      result.className = "is-fail";
      result.textContent =
        "Not quite. CIS baseline: minlen 14, minclass 4, maxrepeat 2, require digits/uppercase/special characters (dcredit, ucredit, ocredit = −1).";
    }
  });

  showBtn.addEventListener("click", function () {
    selects.forEach(function (sel) {
      sel.value = sel.getAttribute("data-correct");
      fieldOk(sel);
    });
    result.className = "is-pass";
    result.textContent = CORRECT_MSG;
  });

  resetBtn.addEventListener("click", function () {
    selects.forEach(function (sel) {
      sel.selectedIndex = 0;
      sel.classList.remove("pbq-ssh-select--ok", "pbq-ssh-select--bad");
    });
    result.className = "";
    result.textContent = "";
  });
})();
</script>
