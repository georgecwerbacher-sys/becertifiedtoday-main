<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 126 - Agent-based vs agentless tools</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .instructions {
      margin: 0 0 14px;
      color: #b8c3d6;
    }
    .dd-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 14px;
    }
    .dd-col h2 {
      margin: 0 0 10px;
      padding: 8px 12px;
      border-radius: 8px;
      background: #c9a227;
      color: #1a1508;
      font-size: 1rem;
      text-align: center;
    }
    .slot-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .drop-slot {
      min-height: 52px;
      padding: 8px;
      border-radius: 10px;
      border: 2px dashed #c97b9a;
      background: #f5d0dc;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    .drop-slot.over {
      border-style: solid;
      border-color: #4d89ff;
    }
    .drop-slot.correct {
      border-color: #1f7a58;
      background: #113e2d;
    }
    .drop-slot.incorrect {
      border-color: #8c3434;
      background: #442020;
    }
    .bank-wrap {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #2c3f62;
      background: #1a253b;
    }
    .bank-wrap h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: #9fb0cc;
    }
    .bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 46px;
    }
    .token {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #6384ba;
      background: #cfe9ff;
      color: #10243f;
      font-weight: 700;
      cursor: grab;
      user-select: none;
    }
    .token:active {
      cursor: grabbing;
    }
    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
      font-family: inherit;
    }
    #result {
      font-weight: 700;
    }
    #nextWrap {
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Drag and drop the tools from the left onto the agent types on the right.</h1>
    <p class="instructions">Move each tool into <strong>Agent-Based</strong> or <strong>Agentless</strong>. Each tool is used once.</p>

    <div class="dd-grid">
      <div class="dd-col">
        <h2>Agent-Based</h2>
        <div class="slot-stack">
          <div class="drop-slot agent-based" data-group="agent-based"></div>
          <div class="drop-slot agent-based" data-group="agent-based"></div>
        </div>
      </div>
      <div class="dd-col">
        <h2>Agentless</h2>
        <div class="slot-stack">
          <div class="drop-slot agentless" data-group="agentless"></div>
        </div>
      </div>
    </div>

    <div class="bank-wrap">
      <h3>Tools</h3>
      <div id="bank" class="bank">
        <div class="token" draggable="true" data-value="Puppet">Puppet</div>
        <div class="token" draggable="true" data-value="Ansible">Ansible</div>
        <div class="token" draggable="true" data-value="SaltStack">SaltStack</div>
      </div>
    </div>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
      <button id="resetBtn" type="button">Reset</button>
      <span id="result"></span>
      <span id="nextWrap"><a class="next-link" href="/practice-launcher.html">Practice launcher</a></span>
    </div>
  </main>

  <script>
    const bank = document.getElementById("bank");
    const slots = document.querySelectorAll(".drop-slot");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const result = document.getElementById("result");
    const nextWrap = document.getElementById("nextWrap");
    let dragged = null;
    let draggedFromBank = false;

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    function bindTokenDrag(token) {
      token.addEventListener("dragstart", () => {
        dragged = token;
        draggedFromBank = token.parentElement === bank;
      });
    }

    document.querySelectorAll(".token").forEach(bindTokenDrag);

    slots.forEach((slot) => {
      slot.addEventListener("dragover", (e) => {
        e.preventDefault();
        slot.classList.add("over");
      });
      slot.addEventListener("dragleave", () => slot.classList.remove("over"));
      slot.addEventListener("drop", (e) => {
        e.preventDefault();
        slot.classList.remove("over");
        if (!dragged) return;
        const existing = slot.querySelector(".token");
        if (existing && existing !== dragged) bank.appendChild(existing);
        slot.appendChild(dragged);
      });
    });

    bank.addEventListener("dragover", (e) => e.preventDefault());
    bank.addEventListener("drop", (e) => {
      e.preventDefault();
      if (!dragged || draggedFromBank) return;
      bank.appendChild(dragged);
    });

    checkBtn.addEventListener("click", () => {
      const abSlots = document.querySelectorAll(".drop-slot.agent-based");
      const vals = [...abSlots]
        .map((s) => s.querySelector(".token")?.dataset.value)
        .filter(Boolean)
        .sort();
      const abOk =
        vals.length === 2 && vals[0] === "Puppet" && vals[1] === "SaltStack";

      const alSlot = document.querySelector(".drop-slot.agentless");
      const alTok = alSlot.querySelector(".token");
      const alOk = alTok && alTok.dataset.value === "Ansible";

      abSlots.forEach((s) => {
        s.classList.remove("correct", "incorrect");
        const t = s.querySelector(".token");
        if (!t) {
          s.classList.add("incorrect");
          return;
        }
        s.classList.add(abOk ? "correct" : "incorrect");
      });
      alSlot.classList.remove("correct", "incorrect");
      if (!alTok) alSlot.classList.add("incorrect");
      else alSlot.classList.add(alOk ? "correct" : "incorrect");

      const allOk = abOk && alOk;
      result.textContent = allOk
        ? "Correct. Agent-Based: Puppet and SaltStack (agents/minions). Agentless: Ansible (SSH push by default)."
        : "Incorrect. Agent-Based: Puppet, SaltStack. Agentless: Ansible.";
      nextWrap.style.display = "inline-block";
    });

    resetBtn.addEventListener("click", () => {
      slots.forEach((slot) => {
        slot.classList.remove("correct", "incorrect", "over");
        const token = slot.querySelector(".token");
        if (token) bank.appendChild(token);
      });
      result.textContent = "";
      nextWrap.style.display = "none";
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
