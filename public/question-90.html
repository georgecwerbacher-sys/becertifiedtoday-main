<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 90 - HSRP show standby</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(940px, 94vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 720px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 14px;
    }
    .check-btn {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .answer {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="image-wrap">
      <img src="/assets/question90-hsrp-show-standby.png" alt="show standby output for HSRP group 1 on FastEthernet1/0/47" />
    </div>
    <h1>An engineer configures HSRP and enters the show standby command. Which two facts about the network environment are derived from the output? (Choose two.)</h1>

    <label class="choice"><input type="checkbox" name="q90" value="A" />A. The local device has a higher priority than the active router</label>
    <label class="choice"><input type="checkbox" name="q90" value="B" />B. The virtual IP address of the HSRP group is 10.1.1.1</label>
    <label class="choice"><input type="checkbox" name="q90" value="C" />C. If the local device fails to receive a hello from the active router for more than 5 seconds, it becomes the active router</label>
    <label class="choice"><input type="checkbox" name="q90" value="D" />D. The hello and hold timers are set to custom values</label>
    <label class="choice"><input type="checkbox" name="q90" value="E" />E. If a router with a higher IP address and same HSRP priority as the active router becomes available, that router becomes the new active router 5 seconds later</label>

    <div class="actions">
      <button id="checkBtn" class="check-btn" type="button">Check Answer</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-91.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const checkBtn = document.getElementById("checkBtn");
    const options = document.querySelectorAll('input[name="q90"]');
    const correctSet = new Set(["B", "E"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = [...options].filter((o) => o.checked).map((o) => o.value);
      if (selected.length === 0) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select at least one option.";
        return;
      }

      answerBox.style.display = "block";
      nextWrap.style.display = "block";

      const selectedSet = new Set(selected);
      const isCorrect =
        selectedSet.size === correctSet.size &&
        [...correctSet].every((value) => selectedSet.has(value));

      if (isCorrect) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. B and E. B: Virtual IP address is 10.1.1.1 in the output. E: Preemption enabled, delay min 5 secs is shown (HSRPv2).";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct answer: B and E. Local priority is 100 vs active 255 (not A). Hold time is 10 s (not C). Hello 3 s / hold 10 s are defaults (not D).";
      }
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
