<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 95 - NTP master and source</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .exhibit-region {
      margin: 0 0 18px;
    }
    .exhibit-ref {
      margin: 0 0 12px;
      font-size: 0.95rem;
      line-height: 1.45;
      color: #b8c3d6;
    }
    .exhibit-option {
      background: #000;
      color: #fff;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      padding: 10px 12px 12px;
    }
    .exhibit-option-label {
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .exhibit-option .exhibit-cli {
      margin: 0;
      padding: 10px 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.76rem, 1.5vw, 0.86rem);
      line-height: 1.5;
      white-space: pre;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="exhibit-region">
      <p class="exhibit-ref">Refer to the exhibit.</p>
      <div class="exhibit-option">
        <div class="exhibit-option-label">Global configuration</div>
        <pre class="exhibit-cli" role="region" aria-label="NTP master and NTP source commands">Router(config)#ntp master
Router(config)#ntp source loopback 0</pre>
      </div>
    </div>
    <h1>What is the result of the NTP configuration?</h1>

    <label class="choice"><input type="radio" name="q95" value="A" />A. The router will use the address of loopback 0 to communicate with the NTP server.</label>
    <label class="choice"><input type="radio" name="q95" value="B" />B. The router will advertise but not listen to NTP broadcast packets.</label>
    <label class="choice"><input type="radio" name="q95" value="C" />C. The router will be used as an NTP authoritative server only if it synchronized with an outside source.</label>
    <label class="choice"><input type="radio" name="q95" value="D" />D. The router will be used as an NTP authoritative server, even if it is not synchronized with an outside source.</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-96.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q95"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "D") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. D. ntp master makes this device an authoritative NTP server (default stratum 8 if unspecified); it can serve time from its local clock even without an upstream sync. ntp source loopback 0 sets the source address for NTP packets this router originates—it does not mean the router is only an NTP client.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: D. ntp master allows the router to act as an authoritative time source even when not synchronized to an external reference.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
