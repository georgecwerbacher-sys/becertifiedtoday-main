<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 265 - Static NAT inside outside interfaces</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(1040px, 98vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 720px;
      height: auto;
      margin: 0 auto;
    }
    .exhibit-region {
      margin: 0 0 14px;
    }
    .exhibit-option {
      background: #000;
      color: #fff;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      padding: 10px 12px 12px;
    }
    .exhibit-option-label {
      margin: 0 0 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .exhibit-option .exhibit-cli {
      margin: 0;
      padding: 10px 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: clamp(0.74rem, 1.45vw, 0.86rem);
      line-height: 1.5;
      white-space: pre;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
      vertical-align: top;
      margin-top: 6px;
    }
    .choice pre {
      margin: 8px 0 0 28px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #0d1424;
      border: 1px solid #2c3f62;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.72rem;
      line-height: 1.35;
      white-space: pre-wrap;
      overflow-x: auto;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question265-nat-static-topology.png"
        alt="R1 Gi0/1 toward host 10.70.5.1; Gi0/0 toward outside network"
      />
    </div>
    <div class="exhibit-region">
      <div class="exhibit-option">
        <div class="exhibit-option-label">R1 — static NAT</div>
        <pre class="exhibit-cli" role="region" aria-label="Static NAT global configuration">R1(config)# ip nat inside source static 10.70.5.1 10.45.1.7</pre>
      </div>
    </div>
    <h1>A network architect has partially configured static NAT. Which commands should be added to complete the configuration?</h1>

    <label class="choice"
      ><input type="radio" name="q265" value="A" />A.
      <pre>R1(config)#interface GigabitEthernet0/0
R1(config-if)#ip pat outside

R1(config)#interface GigabitEthernet0/1
R1(config-if)#ip pat inside</pre></label>

    <label class="choice"
      ><input type="radio" name="q265" value="B" />B.
      <pre>R1(config)#interface GigabitEthernet0/0
R1(config-if)#ip nat outside

R1(config)#interface GigabitEthernet0/1
R1(config-if)#ip nat inside</pre></label>

    <label class="choice"
      ><input type="radio" name="q265" value="C" />C.
      <pre>R1(config)#interface GigabitEthernet0/0
R1(config-if)#ip nat inside

R1(config)#interface GigabitEthernet0/1
R1(config-if)#ip nat outside</pre></label>

    <label class="choice"
      ><input type="radio" name="q265" value="D" />D.
      <pre>R1(config)#interface GigabitEthernet0/0
R1(config-if)#ip pat inside

R1(config)#interface GigabitEthernet0/1
R1(config-if)#ip pat outside</pre></label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-266.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q265"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "B") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. B. Static ip nat inside source maps the inside local address (10.70.5.1 on Gi0/1) to an inside global (10.45.1.7). The interface toward the private host must be ip nat inside; the interface toward the public/outside network must be ip nat outside. Cisco IOS does not use ip pat inside/outside on interfaces; PAT is a translation mode, not that interface syntax.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: B. Gi0/1 faces the inside subnet so use ip nat inside; Gi0/0 faces the outside so use ip nat outside.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;

      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
