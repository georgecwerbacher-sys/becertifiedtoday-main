<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 176 - R1 ACL block FTP from Branch 2</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .choice .cfg {
      display: block;
      margin: 8px 0 0 26px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      color: #d1dae8;
      white-space: pre-wrap;
    }
    .actions {
      margin-top: 14px;
    }
    .check-btn {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .answer {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img src="/assets/question176-acl-topology.png" alt="WAN topology: Central R1, Branch 1, Branch 2 subnets" />
    </div>
    <div class="image-wrap">
      <img src="/assets/question176-acl-options.png" alt="Options A through E: interface and ACL snippets" />
    </div>
    <h1>Which two commands are required on router R1 to block FTP and allow all other traffic from the Branch 2 network? (Choose two)</h1>

    <label class="choice"
      ><input type="checkbox" name="q176" value="A" />A. Option A<span class="cfg"
>interface GigabitEthernet0/0
ip address 10.0.0.1 255.255.255.0
ip access-group 101 out</span></label
    >

    <label class="choice"
      ><input type="checkbox" name="q176" value="B" />B. Option B<span class="cfg"
>interface Gigabitethernet0/0
ip address 10.0.101.1 255.255.255.0
ip access-group 101 in</span></label
    >

    <label class="choice"
      ><input type="checkbox" name="q176" value="C" />C. Option C<span class="cfg"
>access-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp-data
access-list 101 permit ip any any</span></label
    >

    <label class="choice"
      ><input type="checkbox" name="q176" value="D" />D. Option D<span class="cfg"
>access-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp
access-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp-data
access-list 101 permit ip any any</span></label
    >

    <label class="choice"
      ><input type="checkbox" name="q176" value="E" />E. Option E<span class="cfg"
>access-list 101 deny tcp 10.0.2.0 0.0.0.255 host 10.0.101.3 eq ftp
access-list 101 permit ip any any</span></label
    >

    <div class="actions">
      <button id="checkBtn" class="check-btn" type="button">Check Answer</button>
    </div>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-177.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const checkBtn = document.getElementById("checkBtn");
    const options = document.querySelectorAll('input[name="q176"]');
    const correctSet = new Set(["A", "D"]);

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = [...options].filter((o) => o.checked).map((o) => o.value);
      if (selected.length === 0) {
        answerBox.style.display = "block";
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select at least one option.";
        return;
      }

      answerBox.style.display = "block";
      nextWrap.style.display = "block";

      const selectedSet = new Set(selected);
      const isCorrect =
        selectedSet.size === correctSet.size &&
        [...correctSet].every((value) => selectedSet.has(value));

      if (isCorrect) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. A and D. Deny TCP to the FTP server for both `eq ftp` and `eq ftp-data` from Branch 2 (`10.0.2.0/24`), then `permit ip any any`. Pair that ACL with `ip access-group 101 out` on the Gi0/0 block shown in option A. C and E omit a port; B applies `in` on the 10.0.101.1-style interface.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct answer: A and D. Deny both FTP-related TCP ports for Branch 2 to 10.0.101.3, permit the rest, and apply the list outbound on the correct R1 interface.";
      }
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
