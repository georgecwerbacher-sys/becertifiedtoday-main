<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 120 - VXLAN characteristic</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(920px, 94vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.4;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>What is one characteristic of VXLAN?</h1>

    <label class="choice"><input type="radio" name="q120" value="A" />A. It supports a maximum of 4096 VLANs.</label>
    <label class="choice"><input type="radio" name="q120" value="B" />B. It supports multitenant segments.</label>
    <label class="choice"><input type="radio" name="q120" value="C" />C. It uses STP to prevent loops in the underlay network.</label>
    <label class="choice"><input type="radio" name="q120" value="D" />D. It uses the Layer 2 header to transfer packets through the network underlay.</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-121.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q120"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "B") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. B. VXLAN defines logical Layer 2 domains identified by a 24-bit VNI (millions of segments) over a shared IP underlay—ideal for multitenant isolation and scaling beyond the 4096 VLAN-ID limit. The underlay is typically a routed fabric, not STP-dependent for VXLAN; overlay frames are encapsulated in UDP/IP across the underlay.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: B. VXLAN provides many isolated overlay segments (VNIs) for multitenancy.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/BCT-CCNP-Encore-Training.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
