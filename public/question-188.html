<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 188 - IP SLA R3 to file server</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .choice .cfg {
      display: block;
      margin: 8px 0 0 26px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.5;
      color: #d1dae8;
      white-space: pre-wrap;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img src="/assets/question188-ip-sla-topology.png" alt="Topology: R3 at 10.0.0.3, file server at 10.0.1.3" />
    </div>
    <div class="image-wrap">
      <img src="/assets/question188-ip-sla-options.png" alt="IP SLA command options A through D" />
    </div>
    <h1>Which command set is needed to configure and verify router R3 to measure the response time from router R3 to the file server located in the data center?</h1>

    <label class="choice"
      ><input type="radio" name="q188" value="A" />A. Option A<span class="cfg"
>ip sla 6
icmp-echo 172.29.139.134 source-ip 172.29.139.132
frequency 300
ip sla schedule 6 start-time now
show ip protocol</span></label
    >

    <label class="choice"
      ><input type="radio" name="q188" value="B" />B. Option B<span class="cfg"
>ip sla 6
icmp-echo 172.29.139.134 source-ip 172.29.139.132
frequency 300
ip sla schedule 6 start-time now</span></label
    >

    <label class="choice"
      ><input type="radio" name="q188" value="C" />C. Option C<span class="cfg"
>ip sla 6
icmp-echo 10.0.1.3 source-ip 10.0.0.3
frequency 300
ip sla schedule 6 life forever start-time now
show ip sla statistics 6</span></label
    >

    <label class="choice"
      ><input type="radio" name="q188" value="D" />D. Option D<span class="cfg"
>ip sla 6
icmp-echo 10.0.1.3 source-ip 10.0.0.3
frequency 300
ip sla schedule 6 life forever start-time now
show ip protocol</span></label
    >

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-189.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q188"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "C") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. C. Echo the file server at 10.0.1.3 from R3’s WAN address 10.0.0.3, schedule the operation, then verify with `show ip sla statistics 6`. A/B use wrong addressing; B has no verify command; D uses `show ip protocol`, which does not display SLA results.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: C. Match the exhibit IPs and verify with `show ip sla statistics`.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/BCT-CCNP-ENCOR-Training.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
