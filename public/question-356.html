<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 356 - Trunking issue resolution</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(980px, 95vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin: 12px 0 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #32456b;
      background: #0f1728;
    }
    .image-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button,
    .next-link {
      background: #254b8a;
      color: #e6edf3;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      display: inline-block;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Users in the Operations VLAN on Switch A are unable to communicate with users in the Operations VLAN on Switch B. Which action resolves the issue?</h1>

    <div class="image-wrap">
      <img src="/assets/question356-trunking-error-mst.png" alt="MST region diagram and switch configurations showing trunk negotiation settings" />
    </div>

    <label class="choice"><input type="radio" name="q356" value="A" />A. Set the switchport mode to dynamic desirable on Switch B.</label>
    <label class="choice"><input type="radio" name="q356" value="B" />B. Set the EtherChannel mode to LACP on Switch A.</label>
    <label class="choice"><input type="radio" name="q356" value="C" />C. Configure the same allowed VLAN list on Switch A and Switch B.</label>
    <label class="choice"><input type="radio" name="q356" value="D" />D. Set the EtherChannel mode to PAGP on Switch B.</label>

    <div class="actions">
      <button id="checkBtn" type="button">Check Answer</button>
    </div>
    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-357.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const checkBtn = document.getElementById("checkBtn");
    const options = document.querySelectorAll('input[name="q356"]');
    const correct = "A";

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    checkBtn.addEventListener("click", () => {
      const selected = [...options].find((o) => o.checked)?.value;

      answerBox.style.display = "block";
      nextWrap.style.display = "block";

      if (!selected) {
        answerBox.className = "answer incorrect";
        answerBox.textContent = "Select an answer before checking.";
        return;
      }

      if (selected === correct) {
        answerBox.className = "answer correct";
        answerBox.textContent =
          "Correct. With dynamic auto on one side, setting the other side to dynamic desirable enables trunk formation and restores VLAN 30 connectivity.";
      } else {
        answerBox.className = "answer incorrect";
        answerBox.textContent =
          "Incorrect. The correct answer is A.";
      }
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
