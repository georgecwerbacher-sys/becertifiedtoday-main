<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question 157 - EEM OSPF neighbor down</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e6edf3;
    }
    .card {
      width: min(960px, 96vw);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .image-wrap {
      margin-bottom: 14px;
      border: 1px solid #2c3f62;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .image-wrap img {
      display: block;
      width: 100%;
      max-width: 900px;
      height: auto;
      margin: 0 auto;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 0.95rem;
      cursor: pointer;
      line-height: 1.45;
    }
    .choice input {
      margin-right: 10px;
      vertical-align: top;
      margin-top: 3px;
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
    .next-wrap {
      margin-top: 18px;
      display: none;
    }
    .next-link {
      display: inline-block;
      text-decoration: none;
      color: #e6edf3;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin: 0 0 8px; font-size: 0.95rem; color: #9fb0cc">Refer to the exhibit.</p>
    <div class="image-wrap">
      <img
        src="/assets/question157-eem-ospf-debug.png"
        alt="Four EEM applet options A through D for OSPF neighbor state and debug actions"
      />
    </div>
    <h1>
      An engineer must create an EEM script to enable OSPF debugging in the event the OSPF neighborship goes down. Which script must the engineer apply?
    </h1>

    <label class="choice"><input type="radio" name="q157" value="A" />A. Option A</label>
    <label class="choice"><input type="radio" name="q157" value="B" />B. Option B</label>
    <label class="choice"><input type="radio" name="q157" value="C" />C. Option C</label>
    <label class="choice"><input type="radio" name="q157" value="D" />D. Option D</label>

    <div id="answerBox" class="answer" aria-live="polite"></div>
    <div id="nextWrap" class="next-wrap">
      <a class="next-link" href="/question-158.html">Next</a>
    </div>
  </main>

  <script>
    const answerBox = document.getElementById("answerBox");
    const nextWrap = document.getElementById("nextWrap");
    const options = document.querySelectorAll('input[name="q157"]');

    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
      history.pushState(null, "", location.href);
    });

    options.forEach((option) => {
      option.addEventListener("change", () => {
        answerBox.style.display = "block";
        nextWrap.style.display = "block";
        if (option.value === "A") {
          answerBox.className = "answer correct";
          answerBox.textContent =
            "Correct. A. Match the OSPF adjacency syslog for a transition to DOWN (`from FULL to DOWN`) with the normal `%OSPF-5-ADJCHG` facility/severity. Run `enable` before `debug` so the applet has privilege. B and D trigger on LOADING→FULL (neighbor up); B’s applet name contains an invalid space; C uses a nonstandard `%OSPF-1-ADJCHG` string and omits `enable`.";
        } else {
          answerBox.className = "answer incorrect";
          answerBox.textContent =
            "Incorrect. The correct answer: A. The event must reflect the neighbor going down (FULL to DOWN), use a realistic OSPF ADJCHG syslog pattern, and include `enable` prior to debug CLI actions.";
        }
      });
    });
  </script>
  <style>
    .home-key {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 9999;
      text-decoration: none;
      background: #254b8a;
      border: 1px solid #3d6dbb;
      color: #e6edf3;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .home-key:hover {
      filter: brightness(1.08);
    }
  </style>
  <a class="home-key" href="/practice-launcher.html">Home</a>
  <script src="/js/practice-questions.js"></script>
</body>
</html>
