<!--
  Reusable CLI container markup for lab pages.

  Preferred stack (templates/lab-build/cli-lab-realistic.html):
    /css/cli-lab-container.css
    /js/cli-lab-container.js
    /js/cli-ios-mode.js
    /js/cli-lab-engine.js

  Lab author workflow:
  1. Copy templates/lab-build/cli-lab-realistic.html → public/.../cli-lab-*.html
  2. Edit LAB CONFIG (steps, show running-config snapshots, PC handlers)
  3. Replace topology image, tasks, sim-nav links

  Legacy hand-rolled submit(): templates/labs/cli-lab-baseline.html

  Engine API (cli-lab-engine.js):
  - createIosDevice({ host, deviceType, elements, steps, showRunningConfig, … })
  - createPcSession({ host, elements, handlers })
  - wireFloatingModal / openModal / closeModal
  - normalizeIosCmd, matchShowRun, MSG.*

  DOM shape: overlay → dialog → header → body → .terminal → .scrollback-area + .input-row
-->
<div id="swCliOverlay" class="cli-modal-overlay" aria-hidden="true">
  <div
    id="swCliDialog"
    class="cli-modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="swCliTitle"
    tabindex="-1"
  >
    <header class="cli-modal-header">
      <h2 id="swCliTitle">SW1 — CLI</h2>
      <button type="button" class="cli-modal-close" id="swCliClose" aria-label="Close CLI window">×</button>
    </header>
    <div class="cli-modal-body">
      <div class="terminal" id="swTerminal" aria-label="Simulated SW1 CLI">
        <div id="swScrollback" class="scrollback-area"></div>
        <div class="input-row">
          <span id="swPrompt" class="prompt-el">SW1#</span>
          <input
            id="swCmdline"
            class="cmdline-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="none"
            aria-label="SW1 command line"
          />
        </div>
      </div>
    </div>
    <footer class="cli-modal-footer">
      <p class="cli-hint" style="margin:0;font-size:0.82rem;color:#9fb0cc;">
        Wire with <code>cliLabEngine.createIosDevice()</code> — see templates/lab-build/cli-lab-realistic.html
      </p>
    </footer>
  </div>
</div>
