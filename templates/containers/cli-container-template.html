<!--
  Reusable CLI container template for lab pages.
  DOM: overlay → dialog → header (title + close) → body → .terminal → #swScrollback + .input-row (#swPrompt + #swCmdline).
  Optional: add a .cli-modal-footer (e.g. Reset lab) like cli-lab-baseline / R1-only labs.

  Single graded device: keep this SW1 block only. Dual switch (Sw1 + Sw2): add the optional SW2 block below (same shape,
  sw2* ids) and mirror submitSw() as submitSw2() with lab-specific SWITCH2_SHOW_RUNNING_SNAPSHOT, stepIndexSw2,
  appendSw2, prompt overrides, and nvram flags. Always call expandInterfaceEcho(trimmed) in both submitters so Enter
  does not throw (same helper as this template).

  submitSw() IOS-like prompt navigation:
  - exit from config -> exec
  - end -> exec
  - configure terminal from exec override -> config

  Labs with a completion gate (e.g. PC addressing) also call tryCompleteBaselineLab() when steps finish — see
  templates/labs/cli-lab-baseline.html (sync block). The fragment below omits that if you paste into a minimal page.

  Local command history (ArrowUp / ArrowDown): register bindLocalHistory(swCmdline) — and bindLocalHistory(sw2Cmdline)
  when using SW2 — before keydown Enter→submitSw / submitSw2 so history runs before submit clears the input.
  Wire-up: templates/labs/cli-lab-baseline.html.

  Generic invalid IOS commands that include digits (wrong VLAN, interface, etc.): use invalidInputMsgForNormalizedCmd(u)
  instead of a bare "% Invalid input" so learners see the Tasks/Verification hint (aligned with cli-lab-baseline / named-acl lab).

  Wrong number / wrong token (tester uses plausible syntax but not the lab answer):
  - LAB_STEPS still uses exact tests (only the correct value advances).
  - Before if (LAB_STEPS[stepIndex].test(line)), add branches: for the current stepIndex, if normalize(line)
    matches the *shape* of the command (e.g. /^router ospf \d+$/, /^router-id \S+$/, /^ip ospf (\d+) area 0$/)
    but !== the required canonical string, append appendSw("line-sys", LAB_VERIFY_INSTRUCTIONS_MSG); return;
  - Use one shared message, e.g.:
    "% Invalid input. Verify the lab instructions (Tasks and Helper) for the required values."
  - Full worked example: public/CCNA-Study/CCNA_labs/cli-lab-ospf_config_sim_v3.html (submitSw2, OSPF_LAB_VERIFY_INSTRUCTIONS_MSG).
-->
<div id="swCliOverlay" class="cli-modal-overlay" aria-hidden="true">
  <div
    id="swCliDialog"
    class="cli-modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="swCliTitle"
    tabindex="-1"
  >
    <header class="cli-modal-header">
      <h2 id="swCliTitle">SW1 - CLI</h2>
      <button type="button" class="cli-modal-close" id="swCliClose" aria-label="Close CLI window">x</button>
    </header>
    <div class="cli-modal-body">
      <div class="terminal" id="swTerminal" aria-label="Simulated SW1 CLI">
        <div id="swScrollback" class="scrollback-area"></div>
        <div class="input-row">
          <span id="swPrompt" class="prompt-el">SW1#</span>
          <input
            id="swCmdline"
            class="cmdline-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="none"
            aria-label="SW1 command line"
          />
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Optional second CLI (SW2 / R2 / peer device): same overlay → dialog → .terminal shape as SW1; wire submitSw2 + bindLocalHistory(sw2Cmdline). -->
<div id="sw2CliOverlay" class="cli-modal-overlay" aria-hidden="true">
  <div
    id="sw2CliDialog"
    class="cli-modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="sw2CliTitle"
    tabindex="-1"
  >
    <header class="cli-modal-header">
      <h2 id="sw2CliTitle">SW2 — CLI</h2>
      <button type="button" class="cli-modal-close" id="sw2CliClose" aria-label="Close SW2 CLI window">×</button>
    </header>
    <div class="cli-modal-body">
      <div class="terminal" id="sw2Terminal" aria-label="Simulated SW2 CLI">
        <div id="sw2Scrollback" class="scrollback-area"></div>
        <div class="input-row">
          <span id="sw2Prompt" class="prompt-el">SW2#</span>
          <input
            id="sw2Cmdline"
            class="cmdline-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="none"
            aria-label="SW2 command line"
          />
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  function isModeNavigationCommand(normalizedCmd) {
    return (
      normalizedCmd === "configure terminal" ||
      normalizedCmd === "end" ||
      normalizedCmd === "exit" ||
      normalizedCmd.indexOf("interface ") === 0
    );
  }

  function expandInterfaceEcho(raw) {
    var s = String(raw || "").trim();
    var m = /^(interface|int)\s+e(\d+)\/(\d+)$/i.exec(s);
    if (m) {
      return "interface Ethernet" + m[2] + "/" + m[3];
    }
    return s;
  }

  var INVALID_INPUT_MSG = "% Invalid input";
  var INVALID_INPUT_NUMERIC_HINT_MSG =
    "% Invalid input — check the lab Tasks and Verification sections for the exact values.";
  function invalidInputMsgForNormalizedCmd(u) {
    return /\d/.test(String(u || "")) ? INVALID_INPUT_NUMERIC_HINT_MSG : INVALID_INPUT_MSG;
  }

  // Drop-in block for submitSw() in lab pages.
  function submitSw() {
    var promptText = swPrompt.textContent;
    var line = swCmdline.value;
    var trimmed = String(line || "").trim();
    var normalized = normalize(line);
    var hideInputLine = isModeNavigationCommand(normalized);
    var echoLine = expandInterfaceEcho(trimmed);
    if (!hideInputLine || normalized.indexOf("interface ") === 0) {
      appendSw("line-user", promptText + " " + echoLine);
    }
    swCmdline.value = "";
    if (!trimmed) return;

    if (normalize(line) === "?") {
      appendSw("line-sys", HELP_DISABLED_MSG);
      return;
    }

    if (matchShowRun(line)) {
      appendSw("line-showrun", SWITCH_SHOW_RUNNING_SNAPSHOT);
      return;
    }

    if (swInEnableMode() && matchShowVersion(line)) {
      appendSw("line-sys", SHOW_VERSION_MSG);
      return;
    }

    if (matchCopyRunStart(line)) {
      if (!swInEnableMode()) {
        appendSw("line-sys", COPY_RUN_START_EXEC_ONLY_MSG);
        return;
      }
      if (stepIndex < LAB_STEPS.length) {
        appendSw("line-sys", COPY_RUN_START_AFTER_STEPS_MSG);
        return;
      }
      appendSw("line-sys", COPY_RUN_START_OK_MSG);
      nvramSavedSw = true;
      tryCompleteBaselineLab(function (cls, text) {
        appendSw(cls, text);
      });
      return;
    }

    // IOS-like prompt navigation even when not matching the next lab step.
    var u = normalized;
    if (u === "end" && swPromptOverride !== "exec") {
      swPromptOverride = "exec";
      setSwPrompt();
      return;
    }
    if (u === "exit") {
      if (swPromptOverride === "config") {
        swPromptOverride = "exec";
        setSwPrompt();
        return;
      }
      if (!swPromptOverride && stepIndex < LAB_STEPS.length && LAB_STEPS[stepIndex].mode === "config") {
        swPromptOverride = "exec";
        setSwPrompt();
        return;
      }
    }
    if (u === "configure terminal" && swPromptOverride === "exec") {
      swPromptOverride = "config";
      setSwPrompt();
      return;
    }
    if (swInEnableMode() && (u.indexOf("show ") === 0 || u.indexOf("sh ") === 0)) {
      appendSw("line-sys", SHOW_DISABLED_MSG);
      return;
    }

    if (stepIndex >= LAB_STEPS.length) {
      appendSw("line-bad", invalidInputMsgForNormalizedCmd(u));
      return;
    }

    // Optional — wrong plausible value: prompt tester to re-read Tasks/Helper (see file header + OSPF lab).
    // var LAB_VERIFY_INSTRUCTIONS_MSG =
    //   "% Invalid input. Verify the lab instructions (Tasks and Helper) for the required values.";
    // var u = normalized;
    // if (stepIndex === 1 && /^router ospf \d+$/.test(u) && u !== "router ospf " + REQUIRED_PROCESS_ID) {
    //   appendSw("line-sys", LAB_VERIFY_INSTRUCTIONS_MSG);
    //   return;
    // }
    // Add similar blocks per step (router-id token, ip ospf pid, priority, VLAN id, etc.).

    if (LAB_STEPS[stepIndex].test(line)) {
      stepIndex += 1;
      swPromptOverride = null;
      if (stepIndex >= LAB_STEPS.length) {
        swPrompt.textContent = promptForMode(SWITCH_HOST, "exec");
        appendSw("line-sys", BASELINE_SW_STEPS_OK_MSG);
      } else {
        setSwPrompt();
      }
    } else {
      appendSw("line-bad", invalidInputMsgForNormalizedCmd(u));
    }
  }

  /*
   * submitSw2 — mirror submitSw() for the second device:
   * - Elements: sw2Prompt, sw2Cmdline, sw2Scrollback (appendSw2), sw2Terminal for flash, sw2CliOverlay / sw2CliDialog.
   * - State: stepIndexSw2, sw2PromptOverride (if used), nvramSavedSw2, lab-specific SWITCH2_SHOW_RUNNING_SNAPSHOT.
   * - Echo: var echoLine = expandInterfaceEcho(trimmed); (required; do not omit or Enter will throw ReferenceError.)
   * - History + Enter (order matters): bindLocalHistory(sw2Cmdline) first, then:
   *   sw2Cmdline.addEventListener("keydown", function (e) {
   *     if (e.key === "Enter") { e.preventDefault(); submitSw2(); }
   *   });
   * Full dual-device example: templates/labs/cli-lab-baseline.html (submitSw2, openSw2Cli, Escape stack).
   */
</script>
