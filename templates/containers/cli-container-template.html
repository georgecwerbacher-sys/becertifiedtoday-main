<!--
  Reusable CLI container markup for lab pages.

  Stack:
    /css/cli-lab-container.css
    /js/cli-lab-container.js
    /js/cli-ios-mode.js
    /js/cli-lab-engine.js (optional — or hand-roll submit handlers)

  Lab author workflow: copy an existing lab under public/CCNA-Study/CCNA_labs/ or
  public/CCNP-ENCOR-Study/CCNP-ENCOR-Labs/, or start from templates/labs/cli-lab-baseline.html.

  Reference: public/CCNA-Study/CCNA_labs/cli-lab-static-routing.html (router sample)
  Reference: public/CCNA-Study/CCNA_labs/cli-lab-vlan-sim.html (switch sample)

  Engine API (cli-lab-engine.js):
  - createIosDevice({ host, deviceType, elements, steps, showRunningConfig, … })
  - createPcSession({ host, elements, handlers })
  - wireFloatingModal / openModal / closeModal
  - normalizeIosCmd, matchShowRun, MSG.*, cliLabContainer.COPY_RUN_START_OK_MSG
  - cliLabContainer.initCcnaLabTopChrome() — logo → CCNA_Training_Portal.html, Next lab top-right

  IOS `?` help (cli-lab-container.js — required in <head> before lab script):
  - DEFAULT_ROUTER_CLI_HELP — baseline for all routers (sample: cli-lab-static-routing.html)
  - DEFAULT_SWITCH_CLI_HELP — baseline for all switches (sample: cli-lab-vlan-sim.html)
  - tryAppendIosHelp(line, appendFn, cliLabContainer.iosHelpOpts("router"|"switch", promptText, labHelp))
  - ROUTER_CLI_HELP / SWITCH_CLI_HELP: null uses defaults; override keys per lab
  - Router keys: exec, show, configGlobal, configIf, ip, ipRoute, …
  - Switch keys: exec, show, configGlobal, configIf, interface, interfaceEthernet, switchport,
    switchportMode, switchportAccess, lldp, username, usernameName, usernamePrivilege, usernamePrivilegeLevel

  CLI login banner (auto on CCNA lab pages when a modal opens):
  - BCT_CLI_HELP_NOTICE / EXAM_SIM_CLI_BANNER_TEXT — context-sensitive help limited to scenario
  - initBctCliBanner() runs from cli-lab-container.js on load; PC sessions use CLI_HELP_UNAVAILABLE_MSG

  DOM shape: overlay → dialog → header → body → .terminal → .scrollback-area + .input-row
-->
<div id="swCliOverlay" class="cli-modal-overlay" aria-hidden="true">
  <div
    id="swCliDialog"
    class="cli-modal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="swCliTitle"
    tabindex="-1"
  >
    <header class="cli-modal-header">
      <h2 id="swCliTitle">SW1 — CLI</h2>
      <button type="button" class="cli-modal-close" id="swCliClose" aria-label="Close CLI window">×</button>
    </header>
    <div class="cli-modal-body">
      <div class="terminal" id="swTerminal" aria-label="Simulated SW1 CLI">
        <div id="swScrollback" class="scrollback-area"></div>
        <div class="input-row">
          <span id="swPrompt" class="prompt-el">SW1#</span>
          <input
            id="swCmdline"
            class="cmdline-input"
            type="text"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="none"
            aria-label="SW1 command line"
          />
        </div>
      </div>
    </div>
    <footer class="cli-modal-footer">
      <p class="cli-hint" style="margin:0;font-size:0.82rem;color:#9fb0cc;">
        Wire with <code>cliLabEngine.createIosDevice()</code> or hand-rolled <code>submit*()</code>
      </p>
    </footer>
  </div>
</div>

<!-- Optional second IOS device (R1, SW2, …): duplicate block with unique ids; second createIosDevice(). -->
