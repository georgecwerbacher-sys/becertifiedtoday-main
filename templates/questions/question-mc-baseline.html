<!doctype html>
<!--
  Multiple-choice question baseline — link nav + instant feedback on select.

  Copy to public/CCNA-Study/CCNA_questions/ or public/CCNP-ENCOR-Study/ENCOR_Questions/ as needed.

  Replace:
  - <title> and <h1> question stem
  - question-link-nav hrefs (Back / Home / Next) — see templates/questions/question-link-nav.html
  - INPUT_NAME, CORRECT, CORRECT_MSG in the script
  - Four <label class="choice"> lines (A–D) and input name/value
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REPLACE: Question title | Be Certified Today</title>
  <link rel="stylesheet" href="/css/bcc-question-link-nav.css" />
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #e6edf3;
      padding: 16px;
      box-sizing: border-box;
    }
    .card {
      width: min(900px, 100%);
      background: #121a2b;
      border: 1px solid #2d3b5a;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.35;
    }
    .choice {
      display: block;
      margin: 10px 0;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1a253b;
      border: 1px solid #2c3f62;
      font-size: 1.02rem;
      cursor: pointer;
    }
    .choice input {
      margin-right: 10px;
      transform: translateY(1px);
    }
    .answer {
      margin-top: 18px;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      display: none;
      line-height: 1.45;
    }
    .answer.correct {
      background: #113e2d;
      border: 1px solid #1f7a58;
    }
    .answer.incorrect {
      background: #442020;
      border: 1px solid #8c3434;
    }
  </style>
  <link rel="stylesheet" href="/CCNA-Study/CCNA_Samples/ccna-sample-touch.css" />
</head>
<body>
  <script src="/js/sample-url-mask-apply.js"></script>
  <script src="/CCNA-Study/js/ccna-practice-100-nav.js" defer></script>
  <main class="card">
    <nav class="question-nav" aria-label="Question navigation">
      <div class="question-nav-links">
        <span class="nav-link nav-prev nav-link--disabled" aria-hidden="true">Back</span>
        <a class="nav-link nav-home" href="/index.html">Home</a>
        <a class="nav-link nav-next next-link" href="/REPLACE-next-slug.html">Next</a>
      </div>
    </nav>
    <h1>REPLACE: Full question stem goes here?</h1>
    <label class="choice"><input type="radio" name="q1" value="A" />A. REPLACE: first distractor</label>
    <label class="choice"><input type="radio" name="q1" value="B" />B. REPLACE: second distractor (correct)</label>
    <label class="choice"><input type="radio" name="q1" value="C" />C. REPLACE: third distractor</label>
    <label class="choice"><input type="radio" name="q1" value="D" />D. REPLACE: fourth distractor</label>
    <div id="answerBox" class="answer" aria-live="polite"></div>
  </main>
  <script>
    (function () {
      var INPUT_NAME = "q1";
      var CORRECT = "B";
      var CORRECT_MSG = "REPLACE: Short correct explanation (include letter if useful).";

      var answerBox = document.getElementById("answerBox");
      document.querySelectorAll('input[name="' + INPUT_NAME + '"]').forEach(function (option) {
        option.addEventListener("change", function () {
          answerBox.style.display = "block";
          if (option.value === CORRECT) {
            answerBox.className = "answer correct";
            answerBox.textContent = "Correct. " + CORRECT_MSG;
          } else {
            answerBox.className = "answer incorrect";
            answerBox.textContent = "Incorrect.";
          }
        });
      });
    })();
  </script>
</body>
</html>
